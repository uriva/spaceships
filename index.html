<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Command - 3D Space Strategy</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            overflow: hidden;
            background: #0a0a14;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }
        
        /* CRT Monitor Effect */
        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 100;
            background: 
                linear-gradient(
                    rgba(18, 16, 16, 0) 50%,
                    rgba(0, 0, 0, 0.1) 50%
                );
            background-size: 100% 4px;
            box-shadow: 
                inset 0 0 100px rgba(0,0,0,0.9),
                inset 0 0 20px rgba(0,255,255,0.1);
        }
        
        .crt-overlay::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            animation: scanlines 0.1s linear infinite;
        }
        
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                ellipse at center,
                transparent 0%,
                transparent 60%,
                rgba(0,0,0,0.4) 100%
            );
        }
        
        @keyframes scanlines {
            0% { transform: translateY(0); }
            100% { transform: translateY(2px); }
        }
        
        /* UI Panel */
        .hud-panel {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 50;
            padding: 20px 30px;
            background: rgba(10, 12, 20, 0.85);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 8px;
            backdrop-filter: blur(10px);
            box-shadow: 
                0 0 30px rgba(0, 255, 255, 0.2),
                inset 0 0 20px rgba(0, 255, 255, 0.05);
        }
        
        .mode-btn {
            padding: 12px 24px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border: 2px solid rgba(0, 255, 255, 0.3);
            background: transparent;
            color: rgba(0, 255, 255, 0.6);
            border-radius: 4px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .mode-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(0, 255, 255, 0.3),
                transparent
            );
            transition: left 0.5s ease;
        }
        
        .mode-btn:hover::before {
            left: 100%;
        }
        
        .mode-btn:hover {
            border-color: rgba(0, 255, 255, 0.8);
            color: rgba(0, 255, 255, 0.9);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }
        
        .mode-btn.active {
            border-color: #00ffff;
            color: #00ffff;
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 
                0 0 30px rgba(0, 255, 255, 0.4),
                inset 0 0 20px rgba(0, 255, 255, 0.1);
        }
        
        .mode-btn.attack {
            border-color: rgba(255, 0, 80, 0.3);
            color: rgba(255, 0, 80, 0.6);
        }
        
        .mode-btn.attack:hover {
            border-color: rgba(255, 0, 80, 0.8);
            color: rgba(255, 0, 80, 0.9);
            box-shadow: 0 0 20px rgba(255, 0, 80, 0.3);
        }
        
        .mode-btn.attack.active {
            border-color: #ff0050;
            color: #ff0050;
            background: rgba(255, 0, 80, 0.1);
            box-shadow: 
                0 0 30px rgba(255, 0, 80, 0.4),
                inset 0 0 20px rgba(255, 0, 80, 0.1);
        }
        
        /* Top Status Display */
        .status-display {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 50;
            padding: 15px 25px;
            background: rgba(10, 12, 20, 0.85);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 8px;
            backdrop-filter: blur(10px);
            font-family: 'Orbitron', sans-serif;
        }
        
        .status-value {
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 2px;
        }
        
        /* Ship Selector HUD */
        .ship-hud {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        .ship-selector {
            display: flex;
            gap: 12px;
        }
        
        .ship-dot {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid rgba(0, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 14px;
            color: rgba(0, 255, 255, 0.6);
            background: rgba(10, 12, 20, 0.6);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .ship-dot:hover {
            border-color: rgba(0, 255, 255, 0.8);
            color: rgba(0, 255, 255, 0.9);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }
        
        .ship-dot.active {
            border-color: #00ffff;
            color: #00ffff;
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }
        
        .ship-dot.inactive {
            opacity: 0.4;
        }
        
        .ship-name {
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .ship-name.no-ship {
            color: rgba(255, 255, 255, 0.3);
        }
        
        /* Selection Ring */
        .selection-indicator {
            position: absolute;
            pointer-events: none;
            z-index: 40;
            display: none;
        }
        
        /* Box Selection */
        .selection-box {
            position: fixed;
            border: 1px solid rgba(68, 170, 255, 0.8);
            background: rgba(68, 170, 255, 0.1);
            pointer-events: none;
            z-index: 45;
            display: none;
        }
        
        .selection-ring {
            width: 60px;
            height: 60px;
            border: 2px solid #00ffff;
            border-radius: 50%;
            box-shadow: 
                0 0 20px rgba(0, 255, 255, 0.5),
                inset 0 0 20px rgba(0, 255, 255, 0.1);
        }
        
        /* Target Marker */
        .target-marker {
            position: absolute;
            pointer-events: none;
            z-index: 39;
            display: none;
        }
        
        .target-cross {
            width: 40px;
            height: 40px;
            position: relative;
        }
        
        .target-cross::before,
        .target-cross::after {
            content: '';
            position: absolute;
            background: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.8);
        }
        
        .target-cross::before {
            width: 2px;
            height: 100%;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .target-cross::after {
            width: 100%;
            height: 2px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .target-marker.attack .target-cross::before,
        .target-marker.attack .target-cross::after {
            background: #ff0050;
            box-shadow: 0 0 10px rgba(255, 0, 80, 0.8);
        }
        
        /* Instructions */
        .instructions {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 50;
            padding: 20px 25px;
            background: rgba(10, 12, 20, 0.85);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 8px;
            backdrop-filter: blur(10px);
            max-width: 280px;
        }
        
        .instructions h3 {
            font-family: 'Orbitron', sans-serif;
            color: #00ffff;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        
        .instructions p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 8px;
        }
        
        .instructions .scroll {
            color: #ffaa00;
            font-size: 12px;
            margin-top: 12px;
            padding-top: 8px;
            border-top: 1px solid rgba(0,255,255,0.2);
        }
        
        .instructions .key {
            color: #00ffff;
            font-weight: bold;
        }
        
        /* Laser Effect */
        .laser-blast {
            position: absolute;
            pointer-events: none;
            z-index: 35;
        }
        
        .laser-line {
            height: 3px;
            background: linear-gradient(
                90deg,
                rgba(255, 0, 80, 1),
                rgba(255, 100, 150, 0.8),
                transparent
            );
            box-shadow: 0 0 20px rgba(255, 0, 80, 0.8);
            transform-origin: left center;
            animation: laser-fade 0.3s ease-out forwards;
        }
        
        @keyframes laser-fade {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }
        
        /* Starfleet Computer Chat Panel */
        .chat-panel {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 500px;
            max-height: 400px;
            z-index: 50;
            background: rgba(10, 12, 20, 0.92);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 8px;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            font-family: 'Share Tech Mono', monospace;
        }
        
        .chat-header {
            padding: 8px 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            letter-spacing: 2px;
            color: #00ffff;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            text-transform: uppercase;
        }
        
        .chat-log {
            flex: 1;
            overflow-y: auto;
            padding: 10px 15px;
            max-height: 220px;
            font-size: 12px;
            line-height: 1.5;
        }
        
        .chat-log::-webkit-scrollbar {
            width: 4px;
        }
        .chat-log::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 255, 0.3);
            border-radius: 2px;
        }
        
        .chat-msg {
            margin-bottom: 8px;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        
        .chat-msg.user {
            color: rgba(255, 255, 255, 0.9);
        }
        
        .chat-msg.user::before {
            content: '> ';
            color: #00ffff;
        }
        
        .chat-msg.computer {
            color: rgba(0, 255, 200, 0.9);
        }
        
        .chat-msg.computer::before {
            content: 'COMPUTER: ';
            color: rgba(0, 255, 255, 0.6);
            font-size: 10px;
        }
        
        .chat-msg.dsl {
            color: rgba(255, 170, 0, 0.8);
            font-size: 11px;
            padding: 4px 8px;
            background: rgba(255, 170, 0, 0.05);
            border-left: 2px solid rgba(255, 170, 0, 0.3);
            margin: 4px 0;
        }
        
        .chat-msg.error {
            color: rgba(255, 80, 80, 0.9);
        }
        
        .chat-msg.report {
            color: rgba(180, 180, 220, 0.75);
            font-size: 11px;
            padding: 3px 8px;
            border-left: 2px solid rgba(100, 140, 255, 0.25);
            margin: 2px 0;
        }
        
        .chat-input-row {
            display: flex;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
        }
        
        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            padding: 10px 15px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            outline: none;
        }
        
        .chat-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        
        .chat-send {
            background: transparent;
            border: none;
            color: #00ffff;
            padding: 10px 15px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            letter-spacing: 1px;
        }
        
        .chat-send:hover {
            color: #fff;
        }
        /* Toast notifications */
        #toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            padding: 8px 18px;
            border-radius: 4px;
            border: 1px solid;
            opacity: 0;
            animation: toastIn 0.3s ease forwards, toastOut 0.4s ease 2.6s forwards;
            white-space: nowrap;
        }
        .toast.warning {
            background: rgba(255, 80, 0, 0.15);
            border-color: rgba(255, 80, 0, 0.5);
            color: #ff5000;
        }
        .toast.danger {
            background: rgba(255, 0, 0, 0.15);
            border-color: rgba(255, 0, 0, 0.5);
            color: #ff3333;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes toastOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="toast-container"></div>
    <div class="crt-overlay"></div>
    
    <div class="status-display">
        <div class="status-value" id="mode-display">TACTICAL</div>
        <div style="margin-top: 10px; font-family: 'Orbitron', sans-serif; font-size: 9px; color: #888; letter-spacing: 1px;">
            <label for="gravity-slider">GRAVITY ×<span id="gravity-label">1e9</span></label>
            <input type="range" id="gravity-slider" min="0" max="24" step="0.5" value="4"
                style="width: 120px; display: block; margin-top: 4px; accent-color: #00ffff;">
        </div>
    </div>

    <div class="ship-hud">
        <div class="ship-selector">
            <div class="ship-dot" id="ship-0">1</div>
            <div class="ship-dot" id="ship-1">2</div>
            <div class="ship-dot" id="ship-2">3</div>
        </div>
        <div class="ship-name" id="ship-name">No Ship Selected</div>
    </div>
    
    <div class="instructions">
        <h3>Command Interface</h3>
        <p><span class="key">WASDZX</span> orbit camera</p>
        <p><span class="key">ALT</span> strafe fly</p>
        <p><span class="key">SHIFT</span> move crosshair</p>
        <p><span class="key">SPACE</span> look around</p>
        <p id="mode-label" style="margin-top: 6px; font-size: 12px; color: #aaddff; text-transform: uppercase; letter-spacing: 1px;">Orbit</p>
    </div>
    
    <div id="selection-indicators"></div>
    
    <div class="selection-box" id="selection-box"></div>
    
    <div class="target-marker" id="target-marker">
        <div class="target-cross"></div>
    </div>
    
    <div class="chat-panel" id="chat-panel">
        <div class="chat-header">Starfleet Computer</div>
        <div class="chat-log" id="chat-log">
            <div class="chat-msg computer">Systems online. Awaiting orders, Commander.</div>
        </div>
        <div class="chat-input-row">
            <input class="chat-input" id="chat-input" type="text" placeholder="Enter command..." autocomplete="off" />
            <button class="chat-send" onclick="submitChat()">EXEC</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Game State
        let scene, camera, renderer;
        let asteroids = [];
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();
        let starField;
        
        // 3D cursor beams — position stored as spherical coords
        let cursorBeamX, cursorBeamZ, cursorBeamY, cursorOrb, cursorOrbSurface, cursorOrbSurfaceBack, cursorOrbX, cursorOrbZ, cursorOrbY, cursorOrbXn, cursorOrbZn, cursorOrbYn, cursorSurfaceBeam, cursorPos3D = new THREE.Vector3();
        const WORLD_RADIUS = 5000;
        // Cursor direction (unit vector) + local up + radius — no spherical coords, no pole singularity
        let cursorDir = new THREE.Vector3(0, 0, 1).normalize();  // initial direction
        let cursorUp = new THREE.Vector3(0, 1, 0);               // local "up" for cursor — avoids pole lock
        let cursorRadius = 2500;          // half-way out
        let cursorRadialDir = 1;         // +1 or -1, flips at sphere boundary so Z/X wrap through
        let cursorKeyArrows = {};        // direction arrows on primary surface orb
        let cursorKeyArrowsBack = {};   // direction arrows on opposite surface orb
        let cursorKeyArrowsCross = {};  // Z/X arrows on crosshair orb
        
        // Ship data
        let spaceships = [];
        let selectedShipIndex = -1;
        let selectedObject = null;
        let selectedObjects = [];  // Multi-selection array
        let controlGroups = {};    // 1-9 control groups
        
        // Box selection state
        let isBoxSelecting = false;
        let boxStart = { x: 0, y: 0 };
        let boxEnd = { x: 0, y: 0 };
        
        // Scale: 1 game unit = 0.1 km (100m)
        // Ship (~3 units long) = ~300m - close to corvette scale
        // Formation spread (~30 units) = ~3 km
        // Engagement sphere (5000 units) = ~500 km
        const KM_PER_UNIT = 0.1;
        
        // Ship physics (corvette-class, ~200m, 50,000 tonnes)
        const MAX_FUEL = 500;               // 500 tonnes of propellant
        const FUEL_COST_PER_FRAME = 0.4;    // tonnes per thrust frame (accel or brake — same engine)
        const MAX_SPEED = 0.5;              // 0.5 units/frame = ~5 km/s
        const THRUST = 0.015;               // engine thrust as acceleration: ~0.15 km/s² (2 MN on 50kt)
        const SHIP_MASS = 50000;            // tonnes
        const WEAPON_CHARGES = 100;         // laser capacitor charges
        const G_REAL = 6.674e-11;           // real gravitational constant (m³/(kg·s²))
        // Convert to game units: gu for distance (1gu=100m), tonnes for mass, frames for time (60fps)
        // G_game = G_real × (1000 kg/t) / (100 m/gu)³ / (60 frames/s)²
        //        = G_real × 1000 / 1e6 / 3600 = G_real × 2.778e-7
        const G_GAME = G_REAL * 1000 / 1e6 / 3600;  // ~1.854e-17 in game units
        let gravityMultiplier = 100;         // ratio of effective G to real G (tunable via HUD)
        const ROCK_DENSITY = 2500;          // kg/m³ — typical stony asteroid
        
        // Ship movement
        let targetPosition = null;
        let isMoving = false;
        
        // Camera control
        let cameraPosition = new THREE.Vector3(400, 300, 400);
        let cameraTarget = new THREE.Vector3(0, 0, 0);
        let cameraUpVector = new THREE.Vector3(0, 1, 0);  // Track up vector separately
        // Camera sphere system — same pole-free approach as cursor
        let camOrbitCenter = new THREE.Vector3(0, 0, 0);                 // orbit around this point (updated by strafe/look)
        let camSphereDir = new THREE.Vector3(1, 0.6, 1).normalize();   // direction from orbit center
        let camSphereUp = new THREE.Vector3(0, 1, 0);                   // local up for camera sphere
        let camSphereRadius = new THREE.Vector3(400, 300, 400).length(); // distance from orbit center
        let targetCameraPosition = new THREE.Vector3(40, 30, 40);
        let targetCameraTarget = new THREE.Vector3(0, 0, 0);
        let isCameraTransitioning = false;
        const CAMERA_LERP_SPEED = 0.04;
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let cameraDistance = 60;
        
        
        
        // Keyboard controls
        let keys = { w: false, a: false, s: false, d: false, space: false, shift: false, alt: false, z: false, x: false };
        const CAMERA_MOVE_SPEED_MIN = 0.2;
        const CAMERA_MOVE_SPEED_MAX = 10.0;
        const CAMERA_ACCEL_FRAMES = 45;  // frames to reach max speed
        let cameraMoveHeldFrames = 0;
        const WORLD_BOUNDARY = 5000;
        
        // Double-tap tracking for L key
        let lastLPressTime = 0;
        let lastCPressTime = 0;
        const DOUBLE_TAP_THRESHOLD = 400; // milliseconds
        
        // Animation
        let engineParticles = [];
        const particlePool = [];           // reusable dead particles
        const sharedParticleGeo = new THREE.SphereGeometry(0.1, 4, 4);
        const particleMaterialCache = {};  // keyed by color hex
        let lasers = [];
        
        function init() {
            // Wire up gravity slider (log scale: slider value = log10(multiplier) * 2)
            const gravSlider = document.getElementById('gravity-slider');
            const gravLabel = document.getElementById('gravity-label');
            function updateGravityFromSlider() {
                const exp = parseFloat(gravSlider.value) / 2; // slider 0-24 → exponent 0-12
                gravityMultiplier = Math.pow(10, exp);
                // Format label
                if (exp === 0) gravLabel.textContent = '1';
                else if (exp % 1 === 0) gravLabel.textContent = '1e' + exp;
                else gravLabel.textContent = (gravityMultiplier).toExponential(1);
            }
            gravSlider.addEventListener('input', updateGravityFromSlider);
            gravSlider.addEventListener('keydown', (e) => e.stopPropagation());
            gravSlider.addEventListener('keyup', (e) => e.stopPropagation());
            updateGravityFromSlider();
            
            // Scene setup
            scene = new THREE.Scene();
            // A bit more dense fog to give a sense of scale and depth
            scene.fog = new THREE.FogExp2(0x0a0a14, 0.0003);
            
            // Camera
            camera = new THREE.PerspectiveCamera(
                60,
                window.innerWidth / window.innerHeight,
                0.1,
                100000
            );
            updateCameraPosition();
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ 
                antialias: true,
                alpha: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            // Lighting
            const ambientLight = new THREE.AmbientLight(0x666666, 1.5);
            scene.add(ambientLight);
            
            const sunLight = new THREE.DirectionalLight(0xffffff, 2);
            sunLight.position.set(50, 50, 50);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 2048;
            sunLight.shadow.mapSize.height = 2048;
            scene.add(sunLight);

                varying vec3 vNormal;

                    float n_ = 0.142857142857;
                    vec3 ns = n_ * D.wyz - D.xzx;
                    vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
                    vec4 x_ = floor(j * ns.z);
                    vec4 y_ = floor(j - 7.0 * x_);
                    vec4 x = x_ * ns.x + ns.yyyy;
                    vec4 y = y_ * ns.x + ns.yyyy;
                    vec4 h = 1.0 - abs(x) - abs(y);
                    vec4 b0 = vec4(x.xy, y.xy);
                    vec4 b1 = vec4(x.zw, y.zw);
                    vec4 s0 = floor(b0)*2.0 + 1.0;
                    vec4 s1 = floor(b1)*2.0 + 1.0;
                    vec4 sh = -step(h, vec4(0.0));
                    vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;

                    vec3 p1 = vec3(a0.zw, h.y);
                    vec3 p2 = vec3(a1.xy, h.z);
                    vec3 p3 = vec3(a1.zw, h.w);
                    vec4 norm = taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
                    p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
                    vec4 m = max(0.6 - vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)), 0.0);

        // Check if a position overlaps with any occupied position
        function isPositionFree(pos, radius) {
            for (const occ of window.occupiedPositions) {
                const dist = pos.distanceTo(occ.pos);
                if (dist < radius + occ.radius) {
                    return false;
                }
            }
            return true;

        function registerPosition(pos, radius) {

        function createSpaceships() {
            const shipCount = 15;
            
            // 3D spherical shell formation
            let shipIndex = 0;
            
            const shells = [
                { radius: 0, count: 1 },
                { radius: 15, count: 6 },
                { radius: 30, count: 8 }
            ];
            
            for (const shell of shells) {
                const count = Math.min(shell.count, shipCount - shipIndex);
                
                for (let i = 0; i < count; i++) {
                    let x, y, z;
                    
                    if (shell.radius === 0) {
                        x = 0; y = 0; z = 0;
                    } else {
                        // Fibonacci sphere distribution
                        const goldenRatio = (1 + Math.sqrt(5)) / 2;
                        const theta = 2 * Math.PI * i / goldenRatio;
                        const phi = Math.acos(1 - 2 * (i + 0.5) / count);
                        
                        x = shell.radius * Math.sin(phi) * Math.cos(theta);
                        y = shell.radius * Math.cos(phi);
                        z = shell.radius * Math.sin(phi) * Math.sin(theta);
                    }
                    
                    // Jitter
                    x += (Math.random() - 0.5) * 2;
                    y += (Math.random() - 0.5) * 2;
                    z += (Math.random() - 0.5) * 2;
                    
                    const config = {
                        x: x,
                        z: z,
                        y: y,
                        color: 0x44aaff,
                        name: `Ship-${String(shipIndex + 1).padStart(2, '0')}`
                    };
                    
                    const ship = createSingleSpaceship(config, shipIndex);
                    ship.position.set(config.x, config.y, config.z);
                    
                    // Register position to prevent asteroid overlap
                    registerPosition(new THREE.Vector3(config.x, config.y, config.z), 3);
                    
                    // Face outward from center
                    if (shell.radius > 0) {
                        ship.lookAt(0, 0, 0);
                    }
                    
                    spaceships.push(ship);
                    scene.add(ship);
                    
                    // Create motion trail
                    const TRAIL_LENGTH = 60; // number of trail points
                    const trailPositions = new Float32Array(TRAIL_LENGTH * 3);
                    const trailColors = new Float32Array(TRAIL_LENGTH * 4); // RGBA
                    const trailGeometry = new THREE.BufferGeometry();
                    trailGeometry.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
                    trailGeometry.setAttribute('color', new THREE.BufferAttribute(trailColors, 4));
                    const trailMaterial = new THREE.ShaderMaterial({
                        vertexShader: `
                            attribute vec4 color;
                            varying vec4 vColor;
                            void main() {
                                vColor = color;
                                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                            }
                        `,
                        fragmentShader: `
                            varying vec4 vColor;
                            void main() {
                                gl_FragColor = vColor;
                            }
                        `,
                        transparent: true,
                        depthWrite: false,
                    });
                    const trailLine = new THREE.Line(trailGeometry, trailMaterial);
                    trailLine.frustumCulled = false;
                    scene.add(trailLine);
                    ship.userData.trail = {
                        line: trailLine,
                        positions: [], // array of Vector3
                        maxLength: TRAIL_LENGTH,
                    };
                    
                    shipIndex++;
                }
            }
            
            // Select first ship by default
            if (spaceships.length > 0) {
                selectShip(0);
            }
        }

        function createAsteroids() {
            const asteroidCount = 40;
            
            // Helper function for Gaussian random (Box-Muller transform)
            function gaussianRandom(mean = 0, stdDev = 1) {
                let u = 0, v = 0;
                while (u === 0) u = Math.random();
                while (v === 0) v = Math.random();
                const num = Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
                return num * stdDev + mean;
            }
            
            for (let i = 0; i < asteroidCount; i++) {
                // Chance for different shape types
                const shapeType = Math.random();
                
                // All asteroids use high-detail icosahedron with multi-octave displacement
                // Detail level scales with asteroid index (first few get extra detail)
                const detail = i < 3 ? 4 : (i < 10 ? 3 : 2);
                let geometry = new THREE.IcosahedronGeometry(1, detail);
                const positions = geometry.attributes.position;
                
                // Unique seed per asteroid for varied terrain
                const seed1 = Math.random() * 100;
                const seed2 = Math.random() * 100;
                
                for (let j = 0; j < positions.count; j++) {
                    let x = positions.getX(j);
                    let y = positions.getY(j);
                    let z = positions.getZ(j);
                    const angle1 = Math.atan2(z, x);
                    const angle2 = Math.acos(y / Math.sqrt(x*x + y*y + z*z + 0.001));
                    // Multi-octave displacement: ridges, craters, coarse + fine noise
                    const ridge = Math.abs(Math.sin(angle1 * 5 + angle2 * 3 + seed1)) * 0.3;
                    const crater = Math.max(0, Math.sin(angle1 * 8 + seed2) * Math.sin(angle2 * 6 + seed1)) * 0.2;
                    const coarse = (Math.sin(angle1 * 2.7 + seed1) * Math.cos(angle2 * 3.1 + seed2)) * 0.15;
                    const fine = (Math.random() - 0.5) * 0.08;
                    const displacement = 1.0 + ridge - crater + coarse + fine;
                    positions.setXYZ(j, x * displacement, y * displacement, z * displacement);
                }
                geometry.computeVertexNormals();
                
                // Realistic asteroid colors - based on spectral types
                // C-type (carbonaceous): dark gray/charcoal - most common ~75%
                // S-type (silicaceous): brownish/olive - ~17%
                // M-type (metallic): silver/iron gray - ~8%
                const asteroidType = Math.random();
                let baseR, baseG, baseB, metalness;
                
                if (asteroidType < 0.75) {
                    // C-type: dark carbonaceous (charcoal, dark brown-gray)
                    const shade = 0.08 + Math.random() * 0.12;
                    baseR = shade + Math.random() * 0.03;
                    baseG = shade + Math.random() * 0.02;
                    baseB = shade + Math.random() * 0.02;
                    metalness = 0.05;
                } else if (asteroidType < 0.92) {
                    // S-type: silicaceous (olive, tan, brownish)
                    baseR = 0.25 + Math.random() * 0.15;
                    baseG = 0.2 + Math.random() * 0.1;
                    baseB = 0.12 + Math.random() * 0.08;
                    metalness = 0.15;
                } else {
                    // M-type: metallic (iron gray, slight silver sheen)
                    const shade = 0.25 + Math.random() * 0.15;
                    baseR = shade;
                    baseG = shade;
                    baseB = shade + Math.random() * 0.03;
                    metalness = 0.6;
                }
                
                const asteroidColor = new THREE.Color(baseR, baseG, baseB);
                const material = new THREE.MeshStandardMaterial({
                    color: asteroidColor,
                    emissive: asteroidColor,
                    emissiveIntensity: 0.1,
                    roughness: 0.85 + Math.random() * 0.15,
                    metalness: metalness
                });
                
                const asteroid = new THREE.Mesh(geometry, material);
                
                // Random position - retry until no overlap
                let asteroidPos;
                let attempts = 0;
                const maxAttempts = 30;
                let distance, theta, phi;
                
                do {
                    // Uniform distribution inside sphere — even spread, not clustered in center
                    // Use cube-root of uniform [0,1] to get uniform volume distribution
                    distance = Math.cbrt(Math.random()) * WORLD_RADIUS * 0.9;
                    distance = Math.max(200, distance); // not too close to origin
                    theta = Math.random() * Math.PI * 2;
                    phi = Math.acos(2 * Math.random() - 1);
                    
                    asteroidPos = new THREE.Vector3(
                        distance * Math.sin(phi) * Math.cos(theta),
                        distance * Math.cos(phi) * 0.8,
                        distance * Math.sin(phi) * Math.sin(theta)
                    );
                    attempts++;
                } while (!isPositionFree(asteroidPos, 60) && attempts < maxAttempts);
                
                asteroid.position.copy(asteroidPos);
                
                // Continuous power-law distribution
                // 1 unit = 100m, so 1000 units = 100km
                // Formula tuned so ~1 in 40 asteroids reaches near 400-500 units
                // Some shapes elongate up to 2-3x, so a 500 scale asteroid can be 100km+ wide
                const u = Math.random();
                let scale = 15 / Math.pow(u + 0.015, 1.2);
                scale = Math.max(15, Math.min(500, scale)); // clamp max scale to 500
                
                // Apply non-uniform scaling based on shape type
                if (shapeType < 0.15) {
                    // Potato shape: random elongation in all axes
                    const scaleX = scale * (1.2 + Math.random() * 0.8);
                    const scaleY = scale * (0.6 + Math.random() * 0.6);
                    const scaleZ = scale * (0.8 + Math.random() * 0.6);
                    asteroid.scale.set(scaleX, scaleY, scaleZ);
                } else if (shapeType < 0.30) {
                    // Cigar shape: long on Y axis
                    const scaleX = scale * (0.5 + Math.random() * 0.3);
                    const scaleY = scale * (2.0 + Math.random() * 1.0);
                    const scaleZ = scale * (0.5 + Math.random() * 0.3);
                    asteroid.scale.set(scaleX, scaleY, scaleZ);
                } else if (shapeType < 0.40) {
                    // Lumpy: slightly irregular
                    const scaleX = scale * (0.8 + Math.random() * 0.4);
                    const scaleY = scale * (0.8 + Math.random() * 0.4);
                    const scaleZ = scale * (0.8 + Math.random() * 0.4);
                    asteroid.scale.set(scaleX, scaleY, scaleZ);
                } else {
                    // Normal: mostly spherical
                    const variation = 0.9 + Math.random() * 0.2;
                    asteroid.scale.set(scale * variation, scale, scale * variation);
                }
                
                // Random rotation
                asteroid.rotation.set(
                    Math.random() * Math.PI,
                    Math.random() * Math.PI,
                    Math.random() * Math.PI
                );
                
                asteroid.castShadow = true;
                asteroid.receiveShadow = true;
                
                // Realistic mass: treat as ellipsoid, volume = (4/3)π × rx × ry × rz
                // Scale is in game units (1 gu = 100m), density = ROCK_DENSITY kg/m³
                const rx = asteroid.scale.x * 100; // meters
                const ry = asteroid.scale.y * 100;
                const rz = asteroid.scale.z * 100;
                const volumeM3 = (4 / 3) * Math.PI * rx * ry * rz;
                const asteroidMass = volumeM3 * ROCK_DENSITY / 1000; // tonnes
                
                asteroid.userData = { 
                    type: 'asteroid', 
                    selectable: true,
                    shapeType: shapeType,
                    rotationSpeed: {
                        x: (Math.random() - 0.5) * 0.01,
                        y: (Math.random() - 0.5) * 0.01,
                        z: (Math.random() - 0.5) * 0.01
                    },
                    mass: asteroidMass,
                    velocity: new THREE.Vector3(0, 0, 0)
                };
                
                asteroids.push(asteroid);
                scene.add(asteroid);
                
                // Register asteroid position to prevent future overlaps
                registerPosition(asteroidPos, scale * 1.5);
            }
            
        }
        
        function createBoundarySphere() {
            const R = 5000;
            const segments = 64;
            // Much brighter blue and less transparent to stand out against bright suns
            // Using custom exclusion blending so they invert against bright backgrounds
            const mat = new THREE.LineBasicMaterial({ 
                color: 0x66ffff, 
                transparent: true, 
                opacity: 0.5, 
                premultipliedAlpha: true,
                fog: false,
                blending: THREE.CustomBlending,
                blendEquation: THREE.AddEquation,
                blendSrc: THREE.OneMinusDstColorFactor,
                blendDst: THREE.OneMinusSrcColorFactor
            });
            const group = new THREE.Group();
            group.name = 'boundarySphere';
            
            // Longitude lines (meridians) — circles around Y axis
            const lonCount = 24;
            for (let i = 0; i < lonCount; i++) {
                const phi = (i / lonCount) * Math.PI * 2;
                const pts = [];
                for (let j = 0; j <= segments; j++) {
                    const theta = (j / segments) * Math.PI;
                    pts.push(new THREE.Vector3(
                        R * Math.sin(theta) * Math.sin(phi),
                        R * Math.cos(theta),
                        R * Math.sin(theta) * Math.cos(phi)
                    ));
                }
                group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat));
            }
            
            // Latitude lines (parallels) — horizontal rings
            const latCount = 12;
            for (let i = 1; i < latCount; i++) {
                const theta = (i / latCount) * Math.PI;
                const r = R * Math.sin(theta);
                const y = R * Math.cos(theta);
                const pts = [];
                for (let j = 0; j <= segments; j++) {
                    const phi = (j / segments) * Math.PI * 2;
                    pts.push(new THREE.Vector3(r * Math.sin(phi), y, r * Math.cos(phi)));
                }
                group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat));
            }
            
            scene.add(group);
        }

        // Keyboard state
        
        function updateModeLabel() {
            const el = document.getElementById('mode-label');
            if (keys.shift) { el.textContent = 'Marking Target'; el.style.color = '#ff6644'; }
            else if (keys.space) { el.textContent = 'Looking Around'; el.style.color = '#44aaff'; }

            else { el.textContent = 'Orbit'; el.style.color = '#aaddff'; }

        function onKeyDown(event) {
            const key = event.key.toLowerCase();
            const code = event.code;
            
            // When typing in chat input, only handle Escape (to blur) — skip all game keys
            const ae = document.activeElement;
            if (ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA' || ae.tagName === 'SELECT')) {
                if (key === 'escape') {
                    ae.blur();
                    clearAllKeys();
                }
                return;
            }
            
            // Prevent default for Tab and Space immediately
            if (code === 'Tab' || code === 'Space' || key === ' ') {
                event.preventDefault();
            }
            
            if (code === 'Space' || key === ' ' || key === 'spacebar') {
                keys.space = true;
            }
            if (event.shiftKey) keys.shift = true;
            if (event.altKey) { keys.alt = true; event.preventDefault(); }
            updateModeLabel();
            
            if (key === 'w' || code === 'KeyW' || key === 'arrowup') keys.w = true;
            if (key === 'a' || code === 'KeyA' || key === 'arrowleft') keys.a = true;
            if (key === 's' || code === 'KeyS' || key === 'arrowdown') keys.s = true;
            if (key === 'd' || code === 'KeyD' || key === 'arrowright') keys.d = true;
            
            // Number keys: Ctrl+N saves control group, plain N recalls group
            const num = parseInt(key);
            if (num >= 1 && num <= 9) {
                if (event.ctrlKey || event.metaKey) {
                    event.preventDefault();
                    // Save current selection to control group
                    if (selectedObjects.length > 0) {
                        controlGroups[num] = selectedObjects.slice(); // copy array
                    }
                } else {
                    // Recall control group
                    if (controlGroups[num] && controlGroups[num].length > 0) {
                        // Filter out any destroyed/removed objects
                        controlGroups[num] = controlGroups[num].filter(obj => obj.parent);
                        if (controlGroups[num].length > 0) {
                            deselectAll();
                            controlGroups[num].forEach(obj => addToSelection(obj));
                        }
                    }
                }
            }
            
            // L key to focus camera on selected ship (works with or without shift, and any keyboard layout)
            // Double-tap L to zoom in closer
            if (key === 'l' || event.key === 'L' || code === 'KeyL') {
                const now = Date.now();
                const timeSinceLastPress = now - lastLPressTime;
                
                if (timeSinceLastPress < DOUBLE_TAP_THRESHOLD) {
                    // Double-tap detected - zoom in very close (6 units)
                    focusOnSelected(true);
                } else {
                    focusOnSelected(false);
                }
                
                lastLPressTime = now;
            }
            
            // C key to focus camera on crosshair
            // Double-tap C to zoom in close to crosshair
            if (key === 'c' || event.key === 'C' || code === 'KeyC') {
                const now = Date.now();
                const timeSinceLastPress = now - lastCPressTime;
                
                if (timeSinceLastPress < DOUBLE_TAP_THRESHOLD) {
                    focusOnCrosshair(true);
                } else {
                    focusOnCrosshair(false);
                }
                
                lastCPressTime = now;
            }
            
            if (key === 'z' || code === 'KeyZ') keys.z = true;
            if (key === 'x' || code === 'KeyX') keys.x = true;
            
            // TAB to cycle through ships, SHIFT+TAB to cycle back
            if (code === 'Tab') {
                cycleSelection(event.shiftKey ? -1 : 1);
            }
            
            // P to cycle through asteroids (closest to farthest), SHIFT+P to cycle back
            if (key === 'p' || code === 'KeyP') {
                cycleAsteroids(event.shiftKey ? -1 : 1);
            }
            
            // / to focus chat input
            if (key === '/' || code === 'Slash') {
                event.preventDefault();
                clearAllKeys();
                document.getElementById('chat-input').focus();
            }
        }
        
        function cycleSelection(direction = 1) {
            const allObjects = [...spaceships];
            if (allObjects.length === 0) return;
            
            // Sort by distance to camera (recalculated each time)
            const sorted = allObjects
                .map(obj => ({ obj, dist: obj.position.distanceTo(cameraPosition) }))
                .sort((a, b) => a.dist - b.dist);
            
            let next;
            if (!selectedObject) {
                // Nothing selected - pick closest
                next = sorted[0].obj;
            } else {
                // Find current in freshly sorted list
                const currentIndex = sorted.findIndex(s => s.obj === selectedObject);
                const nextIndex = ((currentIndex + direction) % sorted.length + sorted.length) % sorted.length;
                next = sorted[nextIndex].obj;
            }
            
            deselectAll();
            addToSelection(next);
            focusOnSelected(false);
        }
        
        function cycleAsteroids(direction = 1) {
            if (asteroids.length === 0) return;
            
            const sorted = asteroids
                .map(obj => ({ obj, dist: obj.position.distanceTo(cameraPosition) }))
                .sort((a, b) => a.dist - b.dist);
            
            let next;
            if (!selectedObject || selectedObject.userData.type !== 'asteroid') {
                next = sorted[0].obj;
            } else {
                const currentIndex = sorted.findIndex(s => s.obj === selectedObject);
                const nextIndex = ((currentIndex + direction) % sorted.length + sorted.length) % sorted.length;
                next = sorted[nextIndex].obj;
            }
            
            deselectAll();
            addToSelection(next);
            focusOnSelected(false);
        }
        
        function onKeyUp(event) {
            const key = event.key.toLowerCase();
            const code = event.code;
            
            // When typing in input, don't touch game key state
            const ae = document.activeElement;
            if (ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA' || ae.tagName === 'SELECT')) {
                return;
            }
            
            if (code === 'Space' || key === ' ' || key === 'spacebar') {
                keys.space = false;
            }
            if (!event.shiftKey) keys.shift = false;
            if (!event.altKey) keys.alt = false;
            updateModeLabel();
            
            if (key === 'w' || code === 'KeyW' || key === 'arrowup') keys.w = false;
            if (key === 'a' || code === 'KeyA' || key === 'arrowleft') keys.a = false;
            if (key === 's' || code === 'KeyS' || key === 'arrowdown') keys.s = false;
            if (key === 'd' || code === 'KeyD' || key === 'arrowright') keys.d = false;
            if (key === 'z' || code === 'KeyZ') keys.z = false;

        function onMouseDown(event) {
            // Only handle left mouse button (0)
            if (event.button !== 0) return;
            
            isDragging = true;
            dragStart.x = event.clientX;
            dragStart.y = event.clientY;
            
            if (keys.space) {
                // Space held: camera pan mode
                isBoxSelecting = false;
            } else {
                // Default: selection mode
                boxStart.x = event.clientX;
                boxStart.y = event.clientY;
                isBoxSelecting = false;  // Will become true if mouse moves enough
            }
        }
        
        function onMouseUp(event) {
            if (event.button !== 0) {
                isDragging = false;
                return;
            }
            
            const box = document.getElementById('selection-box');
            
            if (isBoxSelecting) {
                // Finish box selection
                box.style.display = 'none';
                
                // Get box bounds in screen coords
                const left = Math.min(boxStart.x, boxEnd.x);
                const right = Math.max(boxStart.x, boxEnd.x);
                const top = Math.min(boxStart.y, boxEnd.y);
                const bottom = Math.max(boxStart.y, boxEnd.y);
                
                // Find all ships inside the box (box select = ships only)
                if (!event.ctrlKey && !event.metaKey) deselectAll();
                
                spaceships.forEach(obj => {
                    const screenPos = obj.position.clone().project(camera);
                    const sx = (screenPos.x * 0.5 + 0.5) * window.innerWidth;
                    const sy = (-screenPos.y * 0.5 + 0.5) * window.innerHeight;
                    
                    // Check if object is in front of camera and inside box
                    if (screenPos.z < 1 && sx >= left && sx <= right && sy >= top && sy <= bottom) {
                        addToSelection(obj);
                    }
                });
                
                isBoxSelecting = false;
            } else {
                // Regular click (no drag) - do raycast selection
                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
                
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(scene.children, true);
                
                let clickedObject = null;
                for (let intersect of intersects) {
                    let obj = intersect.object;
                    while (obj.parent && obj.parent !== scene) {
                        if (obj.userData.selectable) {
                            clickedObject = obj;
                            break;
                        }
                        obj = obj.parent;
                    }
                    if (obj.userData.selectable) {
                        clickedObject = obj;
                    }
                    if (clickedObject) break;
                }
                
                if (clickedObject) {
                    if (event.ctrlKey || event.metaKey) {
                        // Ctrl+click: toggle in selection
                        toggleInSelection(clickedObject);
                    } else {
                        // Normal click: select only this
                        deselectAll();
                        addToSelection(clickedObject);
                    }
                } else {
                    deselectAll();
                }
            }
            
            isDragging = false;
        }
        
        function addToSelection(obj) {
            if (selectedObjects.includes(obj)) return;
            selectedObjects.push(obj);
            
            // Set primary selection to last added
            selectedObject = obj;
            if (obj.userData.type === 'spaceship') {
                selectedShipIndex = obj.userData.shipIndex;
            }
            
            // Show selection ring
            if (obj.userData.type === 'spaceship') {
                const ring = obj.getObjectByName('selectionRing');
                if (ring) ring.material.opacity = 0.8;
            } else if (obj.userData.type === 'asteroid') {
                // Add ring if not already there
                if (!obj.getObjectByName('selectionRing')) {
                    obj.geometry.computeBoundingSphere();
                    const geoRadius = obj.geometry.boundingSphere.radius;
                    const ringGeometry = new THREE.TorusGeometry(geoRadius * 1.3, geoRadius * 0.03, 8, 32);
                    const ringMaterial = new THREE.MeshBasicMaterial({
                        color: 0x44aaff, transparent: true, opacity: 0.8
                    });
                    const ring = new THREE.Mesh(ringGeometry, ringMaterial);
                    ring.rotation.x = Math.PI / 2;
                    ring.name = 'selectionRing';
                    obj.add(ring);
                }
                if (obj.material) {
                    obj.userData.origEmissiveIntensity = obj.material.emissiveIntensity;
                    obj.material.emissiveIntensity = 0.5;
                }
            }
            
            updateSelectionIndicator();
            updateFuelDisplay();
        }
        
        function toggleInSelection(obj) {
            const idx = selectedObjects.indexOf(obj);
            if (idx >= 0) {
                // Remove from selection
                removeFromSelection(obj);
            } else {
                addToSelection(obj);
            }
        }
        
        function removeFromSelection(obj) {
            const idx = selectedObjects.indexOf(obj);
            if (idx < 0) return;
            selectedObjects.splice(idx, 1);
            
            // Hide selection ring
            if (obj.userData.type === 'spaceship') {
                const ring = obj.getObjectByName('selectionRing');
                if (ring) ring.material.opacity = 0;
            } else if (obj.userData.type === 'asteroid') {
                const ring = obj.getObjectByName('selectionRing');
                if (ring) obj.remove(ring);
                if (obj.material) {
                    obj.material.emissiveIntensity = obj.userData.origEmissiveIntensity || 0.1;
                }
            }
            
            // Update primary selection
            if (selectedObjects.length > 0) {
                selectedObject = selectedObjects[selectedObjects.length - 1];
                if (selectedObject.userData.type === 'spaceship') {
                    selectedShipIndex = selectedObject.userData.shipIndex;
                }
            } else {
                selectedObject = null;
                selectedShipIndex = -1;
            }
            
            updateSelectionIndicator();
            updateFuelDisplay();
        }
        
        function onRightClick(event) {
            event.preventDefault();
            
            // Update mouse coordinates
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            // Raycast
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);
            
            let clickedObject = null;
            for (let intersect of intersects) {
                let obj = intersect.object;
                while (obj.parent && obj.parent !== scene) {
                    if (obj.userData.selectable) {
                        clickedObject = obj;
                        break;
                    }
                    obj = obj.parent;
                }
                if (obj.userData.selectable) {
                    clickedObject = obj;
                }
                if (clickedObject) break;
            }
            
            if (!clickedObject) {
                // Right-clicked on empty space - move command
                if (selectedShipIndex >= 0) {
                    const planeIntersects = raycaster.intersectObject(createInvisiblePlane());
                    if (planeIntersects.length > 0) {
                        const point = planeIntersects[0].point;
                        moveShipTo(point);
                        showTargetMarker(point, 'move');
                    }
                }
            } else if (clickedObject.userData.type === 'asteroid' && selectedShipIndex >= 0) {
                // Right-clicked on asteroid - attack
                fireLaser(clickedObject);
            }
        }
        
        function createInvisiblePlane() {
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
            const planeHelper = new THREE.PlaneHelper(plane, 200, 0x00ffff);
            const geometry = new THREE.PlaneGeometry(200, 200);
            const material = new THREE.MeshBasicMaterial({ visible: false });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.rotation.x = -Math.PI / 2;
            return mesh;
        }
        
        function onMouseMove(event) {
            if (isDragging) {
                const deltaX = event.clientX - dragStart.x;
                const deltaY = event.clientY - dragStart.y;
                const dragDist = Math.sqrt(
                    (event.clientX - boxStart.x) * (event.clientX - boxStart.x) +
                    (event.clientY - boxStart.y) * (event.clientY - boxStart.y)
                );
                
                if (keys.space) {
                    // Space held: rotate look direction only (no position change)
                    const rotateSpeed = 0.003;
                    const lookDir = new THREE.Vector3().subVectors(cameraTarget, cameraPosition).normalize();
                    
                    // Yaw: rotate lookDir around cameraUpVector
                    lookDir.applyAxisAngle(cameraUpVector, -deltaX * rotateSpeed);
                    
                    // Pitch: rotate lookDir and cameraUpVector around local right axis
                    const right = new THREE.Vector3().crossVectors(lookDir, cameraUpVector).normalize();
                    if (right.length() > 0.001) {
                        lookDir.applyAxisAngle(right, -deltaY * rotateSpeed);
                        cameraUpVector.applyAxisAngle(right, -deltaY * rotateSpeed);
                    }
                    
                    cameraTarget.copy(cameraPosition).add(lookDir);
                    updateCameraPosition();
                    
                    dragStart.x = event.clientX;
                    dragStart.y = event.clientY;
                } else {
                    // Default: box selection
                    if (dragDist > 5 && !isBoxSelecting) {
                        isBoxSelecting = true;
                    }
                    
                    if (isBoxSelecting) {
                        boxEnd.x = event.clientX;
                        boxEnd.y = event.clientY;
                        
                        const box = document.getElementById('selection-box');
                        box.style.display = 'block';
                        box.style.left = Math.min(boxStart.x, boxEnd.x) + 'px';
                        box.style.top = Math.min(boxStart.y, boxEnd.y) + 'px';
                        box.style.width = Math.abs(boxEnd.x - boxStart.x) + 'px';
                        box.style.height = Math.abs(boxEnd.y - boxStart.y) + 'px';
                    }
                }
            }
            
            updateSelectionIndicator();
        }
        
        function onWheel(event) {
            isCameraTransitioning = false;  // Cancel any L transition
            const zoomSpeed = 0.1;
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const zoomAmount = event.deltaY * zoomSpeed;
            
            cameraPosition.add(forward.multiplyScalar(zoomAmount));
            updateCameraPosition();
        }
        
        
        function selectShip(index) {
            deselectAll();
            addToSelection(spaceships[index]);
        }
        
        function selectAsteroid(asteroid) {
            deselectAll();
            addToSelection(asteroid);
        }
        
        function focusOnCrosshair(zoomed = false) {
            const crosshairPos = cursorDir.clone().multiplyScalar(cursorRadius);
            
            if (zoomed) {
                // Double-tap: zoom in close to crosshair (8 units away)
                const dirToCrosshair = new THREE.Vector3().subVectors(cameraPosition, crosshairPos).normalize();
                targetCameraPosition.copy(crosshairPos).add(dirToCrosshair.multiplyScalar(8));
                targetCameraTarget.copy(crosshairPos);
            } else {
                // Single tap: just look at crosshair, keep position
                targetCameraPosition.copy(cameraPosition);
                targetCameraTarget.copy(crosshairPos);
            }
            
            isCameraTransitioning = true;
        }
        
        function focusOnSelected(zoomed = false) {
            if (!selectedObject) return;
            
            const targetPos = selectedObject.position.clone();
            
            if (zoomed) {
                const dirToObj = new THREE.Vector3().subVectors(cameraPosition, targetPos).normalize();
                const closeDistance = selectedObject.userData.type === 'asteroid' ? 
                    Math.max(10, selectedObject.scale.x * 3) : 8;
                
                targetCameraPosition.copy(targetPos).add(dirToObj.multiplyScalar(closeDistance));
                targetCameraTarget.copy(targetPos);
            } else {
                targetCameraPosition.copy(cameraPosition);
                targetCameraTarget.copy(targetPos);
            }
            
            isCameraTransitioning = true;
        }
        
        function applyCameraTransition() {
            if (!isCameraTransitioning) return;
            
            // Lerp camera position toward target
            cameraPosition.lerp(targetCameraPosition, CAMERA_LERP_SPEED);
            cameraTarget.lerp(targetCameraTarget, CAMERA_LERP_SPEED);
            
            // Check if we're close enough to stop
            const posDiff = cameraPosition.distanceTo(targetCameraPosition);
            const targetDiff = cameraTarget.distanceTo(targetCameraTarget);
            
            if (posDiff < 0.1 && targetDiff < 0.1) {
                cameraPosition.copy(targetCameraPosition);
                cameraTarget.copy(targetCameraTarget);
                isCameraTransitioning = false;
            }
            
            // Keep orbit system in sync so orbit mode picks up from here
            camOrbitCenter.copy(cameraTarget);
            camSphereRadius = cameraPosition.distanceTo(camOrbitCenter) || 1;
            camSphereDir.copy(cameraPosition).sub(camOrbitCenter).normalize();
            
            updateCameraPosition();
        }
        
        function deselectAll() {
            // Hide all ship selection rings
            spaceships.forEach(ship => {
                const ring = ship.getObjectByName('selectionRing');
                if (ring) {
                    ring.material.opacity = 0;
                }
            });
            
            // Remove asteroid selection rings and restore emissive
            selectedObjects.forEach(obj => {
                if (obj.userData.type === 'asteroid') {
                    const ring = obj.getObjectByName('selectionRing');
                    if (ring) obj.remove(ring);
                    if (obj.material) {
                        obj.material.emissiveIntensity = obj.userData.origEmissiveIntensity || 0.1;
                    }
                }
            });
            
            selectedShipIndex = -1;
            selectedObject = null;
            selectedObjects = [];
            document.getElementById('selection-indicators').innerHTML = '';
        }
        
        function updateSelectionIndicator() {
            const container = document.getElementById('selection-indicators');
            
            // Ensure we have the right number of indicator divs
            while (container.children.length < selectedObjects.length) {
                const div = document.createElement('div');
                div.className = 'selection-indicator';
                div.innerHTML = '<div class="selection-ring"></div>';
                container.appendChild(div);
            }
            while (container.children.length > selectedObjects.length) {
                container.removeChild(container.lastChild);
            }
            
            selectedObjects.forEach((obj, i) => {
                const indicator = container.children[i];
                const vector = obj.position.clone();
                vector.project(camera);
                
                if (vector.z < 1) {
                    const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
                    const y = (-vector.y * 0.5 + 0.5) * window.innerHeight;
                    indicator.style.display = 'block';
                    indicator.style.left = (x - 30) + 'px';
                    indicator.style.top = (y - 30) + 'px';
                } else {
                    indicator.style.display = 'none';
                }
            });
        }
        
        function moveShipTo(position) {
            if (selectedShipIndex < 0) return;
            const ship = spaceships[selectedShipIndex];
            ship.userData.behavior = {
                type: 'move',
                target: position.clone()
            };
            showTargetMarker(position, 'move');

        function showTargetMarker(position, type) {
            const marker = document.getElementById('target-marker');
            const vector = position.clone();
            vector.project(camera);
            
            const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
            const y = (-vector.y * 0.5 + 0.5) * window.innerHeight;
            
            marker.style.display = 'block';
            marker.style.left = (x - 20) + 'px';
            marker.style.top = (y - 20) + 'px';
            marker.className = 'target-marker ' + type;
            
            setTimeout(() => {
                marker.style.display = 'none';
            }, 1000);
