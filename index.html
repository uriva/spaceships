        function createAsteroids() {
            const asteroidCount = 40;
            
            // Helper function for Gaussian random (Box-Muller transform)
            function gaussianRandom(mean = 0, stdDev = 1) {
                let u = 0, v = 0;
                while (u === 0) u = Math.random();
                while (v === 0) v = Math.random();
                const num = Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
                return num * stdDev + mean;
            }
            
            for (let i = 0; i < asteroidCount; i++) {
                // Chance for different shape types
                const shapeType = Math.random();
                
                // Realistic asteroid colors - based on spectral types
                // C-type (carbonaceous): dark gray/charcoal - most common ~75%
                // S-type (silicaceous): brownish/olive - ~17%
                // M-type (metallic): silver/iron gray - ~8%
                const asteroidType = Math.random();
                let baseR, baseG, baseB, metalness;
                
                if (asteroidType < 0.75) {
                    // C-type: dark carbonaceous (charcoal, dark brown-gray)
                    const shade = 0.08 + Math.random() * 0.12;
                    baseR = shade + Math.random() * 0.03;
                    baseG = shade + Math.random() * 0.02;
                    baseB = shade + Math.random() * 0.02;
                    metalness = 0.05;
                } else if (asteroidType < 0.92) {
                    // S-type: silicaceous (olive, tan, brownish)
                    baseR = 0.25 + Math.random() * 0.15;
                    baseG = 0.2 + Math.random() * 0.1;
                    baseB = 0.12 + Math.random() * 0.08;
                    metalness = 0.15;
                } else {
                    // M-type: metallic (iron gray, slight silver sheen)
                    const shade = 0.25 + Math.random() * 0.15;
                    baseR = shade;
                    baseG = shade;
                    baseB = shade + Math.random() * 0.03;
                    metalness = 0.6;
                }
                
                const asteroidColor = new THREE.Color(baseR, baseG, baseB);
                
                // All asteroids use high-detail icosahedron with multi-octave displacement
                // Detail level scales with asteroid index (first few get extra detail)
                // x2 polygons: increased detail levels
                const detail = i < 3 ? 5 : (i < 10 ? 4 : 3);
                let geometry = new THREE.IcosahedronGeometry(1, detail);
                const positions = geometry.attributes.position;
                const colors = new Float32Array(positions.count * 3);
                
                // Unique seed per asteroid for varied terrain
                const seed1 = Math.random() * 100;
                const seed2 = Math.random() * 100;
                
                for (let j = 0; j < positions.count; j++) {
                    let x = positions.getX(j);
                    let y = positions.getY(j);
                    let z = positions.getZ(j);
                    const angle1 = Math.atan2(z, x);
                    const angle2 = Math.acos(y / Math.sqrt(x*x + y*y + z*z + 0.001));
                    // Multi-octave displacement: ridges, craters, coarse + fine noise
                    // Note: multipliers on angle1 MUST be integers to prevent seam cracks when wrapping around
                    const ridge = Math.abs(Math.sin(angle1 * 5 + angle2 * 3 + seed1)) * 0.3;
                    const crater = Math.max(0, Math.sin(angle1 * 8 + seed2) * Math.sin(angle2 * 6 + seed1)) * 0.2;
                    const coarse = (Math.sin(angle1 * 3 + seed1) * Math.cos(angle2 * 3 + seed2)) * 0.15;
                    const fine = (Math.sin(x * 15.3 + seed1) * Math.cos(y * 13.7 + seed2) * Math.sin(z * 17.1)) * 0.04;
                    const displacement = 1.0 + ridge - crater + coarse + fine;
                    positions.setXYZ(j, x * displacement, y * displacement, z * displacement);
                    
                    // Vary vertex color based on displacement (craters darker, ridges lighter, plus noise)
                    const colorVariation = (displacement - 1.0) * 0.4 + (Math.random() - 0.5) * 0.15;
                    colors[j * 3] = Math.max(0, Math.min(1, asteroidColor.r + colorVariation));
                    colors[j * 3 + 1] = Math.max(0, Math.min(1, asteroidColor.g + colorVariation));
                    colors[j * 3 + 2] = Math.max(0, Math.min(1, asteroidColor.b + colorVariation));
                }
                geometry.computeVertexNormals();
                geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                
                const material = new THREE.MeshStandardMaterial({
                    vertexColors: true,
                    emissive: asteroidColor,
                    emissiveIntensity: 0.05,
                    roughness: 0.85 + Math.random() * 0.15,
                    metalness: metalness,
                    flatShading: true // Gives a nice defined rocky look
                });
                
                const asteroid = new THREE.Mesh(geometry, material);
                
                // Random position - retry until no overlap
                let asteroidPos;
                let attempts = 0;
                const maxAttempts = 30;
                let distance, theta, phi;
                
                do {
                    // Uniform distribution inside sphere — even spread, not clustered in center
                    // Use cube-root of uniform [0,1] to get uniform volume distribution
                    distance = Math.cbrt(Math.random()) * WORLD_RADIUS * 0.9;
                    distance = Math.max(200, distance); // not too close to origin
                    theta = Math.random() * Math.PI * 2;
                    phi = Math.acos(2 * Math.random() - 1);
                    
                    asteroidPos = new THREE.Vector3(
                        distance * Math.sin(phi) * Math.cos(theta),
                        distance * Math.cos(phi) * 0.8,
                        distance * Math.sin(phi) * Math.sin(theta)
                    );
                    attempts++;
                } while (!isPositionFree(asteroidPos, 60) && attempts < maxAttempts);
                
                asteroid.position.copy(asteroidPos);
                
                // Continuous power-law distribution
                // 1 unit = 100m, so 1000 units = 100km
                // Formula tuned so ~1 in 40 asteroids reaches 800-1200 units, while most stay small
                const u = Math.random();
                let scale = 15 / Math.pow(u + 0.012, 1.2);
                scale = Math.max(15, Math.min(1200, scale)); // clamp max scale to 1200
                
                // Apply non-uniform scaling based on shape type
                if (shapeType < 0.15) {
                    // Potato shape: random elongation in all axes
                    const scaleX = scale * (1.2 + Math.random() * 0.8);
                    const scaleY = scale * (0.6 + Math.random() * 0.6);
                    const scaleZ = scale * (0.8 + Math.random() * 0.6);
                    asteroid.scale.set(scaleX, scaleY, scaleZ);
                } else if (shapeType < 0.30) {
                    // Cigar shape: long on Y axis
                    const scaleX = scale * (0.5 + Math.random() * 0.3);
                    const scaleY = scale * (2.0 + Math.random() * 1.0);
                    const scaleZ = scale * (0.5 + Math.random() * 0.3);
                    asteroid.scale.set(scaleX, scaleY, scaleZ);
                } else if (shapeType < 0.40) {
                    // Lumpy: slightly irregular
                    const scaleX = scale * (0.8 + Math.random() * 0.4);
                    const scaleY = scale * (0.8 + Math.random() * 0.4);
                    const scaleZ = scale * (0.8 + Math.random() * 0.4);
                    asteroid.scale.set(scaleX, scaleY, scaleZ);
                } else {
                    // Normal: mostly spherical
                    const variation = 0.9 + Math.random() * 0.2;
                    asteroid.scale.set(scale * variation, scale, scale * variation);
                }
                
                // Random rotation
                asteroid.rotation.set(
                    Math.random() * Math.PI,
                    Math.random() * Math.PI,
                    Math.random() * Math.PI
                );
                
                asteroid.castShadow = true;
                asteroid.receiveShadow = true;
                
                // Realistic mass: treat as ellipsoid, volume = (4/3)π × rx × ry × rz
                // Scale is in game units (1 gu = 100m), density = ROCK_DENSITY kg/m³
                const rx = asteroid.scale.x * 100; // meters
                const ry = asteroid.scale.y * 100;
                const rz = asteroid.scale.z * 100;
                const volumeM3 = (4 / 3) * Math.PI * rx * ry * rz;
                const asteroidMass = volumeM3 * ROCK_DENSITY / 1000; // tonnes
                
                asteroid.userData = { 
                    type: 'asteroid', 
                    selectable: true,
                    shapeType: shapeType,
                    rotationSpeed: {
                        x: (Math.random() - 0.5) * 0.01,
                        y: (Math.random() - 0.5) * 0.01,
                        z: (Math.random() - 0.5) * 0.01
                    },
                    mass: asteroidMass,
                    velocity: new THREE.Vector3(0, 0, 0)
                };
                
                asteroids.push(asteroid);
                scene.add(asteroid);
                
                // Register asteroid position to prevent future overlaps
                registerPosition(asteroidPos, scale * 1.5);

        // Create a single asteroid with explicit options
        function createSingleAsteroid(opts = {}) {
            const shapeType = opts.shapeType !== undefined ? opts.shapeType : Math.random();
            
            // Spectral type coloring
            const asteroidType = Math.random();
            let baseR, baseG, baseB, metalness;
            if (asteroidType < 0.75) {
                const shade = 0.08 + Math.random() * 0.12;
                baseR = shade + Math.random() * 0.03;
                baseG = shade + Math.random() * 0.02;
                baseB = shade + Math.random() * 0.02;
                metalness = 0.05;
            } else if (asteroidType < 0.92) {
                baseR = 0.25 + Math.random() * 0.15;
                baseG = 0.2 + Math.random() * 0.1;
                baseB = 0.12 + Math.random() * 0.08;
                metalness = 0.15;
            } else {
                const shade = 0.25 + Math.random() * 0.15;
                baseR = shade; baseG = shade; baseB = shade + Math.random() * 0.03;
                metalness = 0.6;
            }
            const asteroidColor = new THREE.Color(baseR, baseG, baseB);
            
            const detail = 5;
            let geometry = new THREE.IcosahedronGeometry(1, detail);
            const positions = geometry.attributes.position;
            const colors = new Float32Array(positions.count * 3);
            const seed1 = Math.random() * 100;
            const seed2 = Math.random() * 100;
            
            for (let j = 0; j < positions.count; j++) {
                let x = positions.getX(j);
                let y = positions.getY(j);
                let z = positions.getZ(j);
                const angle1 = Math.atan2(z, x);
                const angle2 = Math.acos(y / Math.sqrt(x*x + y*y + z*z + 0.001));
                const ridge = Math.abs(Math.sin(angle1 * 5 + angle2 * 3 + seed1)) * 0.3;
                const crater = Math.max(0, Math.sin(angle1 * 8 + seed2) * Math.sin(angle2 * 6 + seed1)) * 0.2;
                const coarse = (Math.sin(angle1 * 3 + seed1) * Math.cos(angle2 * 3 + seed2)) * 0.15;
                const fine = (Math.sin(x * 15.3 + seed1) * Math.cos(y * 13.7 + seed2) * Math.sin(z * 17.1)) * 0.04;
                const displacement = 1.0 + ridge - crater + coarse + fine;
                positions.setXYZ(j, x * displacement, y * displacement, z * displacement);
                const colorVariation = (displacement - 1.0) * 0.4 + (Math.random() - 0.5) * 0.15;
                colors[j * 3] = Math.max(0, Math.min(1, asteroidColor.r + colorVariation));
                colors[j * 3 + 1] = Math.max(0, Math.min(1, asteroidColor.g + colorVariation));
                colors[j * 3 + 2] = Math.max(0, Math.min(1, asteroidColor.b + colorVariation));
            }
            geometry.computeVertexNormals();
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            const material = new THREE.MeshStandardMaterial({
                vertexColors: true,
                emissive: asteroidColor,
                emissiveIntensity: 0.05,
                roughness: 0.85 + Math.random() * 0.15,
                metalness: metalness,
                flatShading: true
            });
            
            const asteroid = new THREE.Mesh(geometry, material);
            const scale = opts.scale || 100;
            const pos = opts.position || new THREE.Vector3(0, 0, 0);
            
            asteroid.position.copy(pos);
            
            // Apply scale with slight variation
            const variation = 0.9 + Math.random() * 0.2;
            asteroid.scale.set(scale * variation, scale, scale * variation);
            
            asteroid.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
            asteroid.castShadow = true;
            asteroid.receiveShadow = true;
            
            const rx = asteroid.scale.x * 100;
            const ry = asteroid.scale.y * 100;
            const rz = asteroid.scale.z * 100;
            const volumeM3 = (4 / 3) * Math.PI * rx * ry * rz;
            const asteroidMass = volumeM3 * ROCK_DENSITY / 1000;
            
            asteroid.userData = {
                type: 'asteroid',
                selectable: true,
                shapeType: shapeType,
                rotationSpeed: {
                    x: (Math.random() - 0.5) * 0.003,
                    y: (Math.random() - 0.5) * 0.003,
                    z: (Math.random() - 0.5) * 0.003
                },
                mass: asteroidMass,
                velocity: new THREE.Vector3(0, 0, 0)
            };
            
            asteroids.push(asteroid);
            scene.add(asteroid);
            registerPosition(pos, scale * 1.5);
            
            return asteroid;
        }
        
        function createBoundarySphere() {
            const R = WORLD_RADIUS;
            const segments = 64;
            // Much brighter blue and less transparent to stand out against bright suns
            // Using custom exclusion blending so they invert against bright backgrounds
            const mat = new THREE.LineBasicMaterial({ 
                color: 0x66ffff, 
                transparent: true, 
                opacity: 0.5, 
                premultipliedAlpha: true,
                fog: false,
                blending: THREE.CustomBlending,
                blendEquation: THREE.AddEquation,
                blendSrc: THREE.OneMinusDstColorFactor,
                blendDst: THREE.OneMinusSrcColorFactor
            });
            const group = new THREE.Group();
            group.name = 'boundarySphere';
            
            // Longitude lines (meridians) — circles around Y axis
            const lonCount = 24;
            for (let i = 0; i < lonCount; i++) {
                const phi = (i / lonCount) * Math.PI * 2;
                const pts = [];
                for (let j = 0; j <= segments; j++) {
                    const theta = (j / segments) * Math.PI;
                    pts.push(new THREE.Vector3(
                        R * Math.sin(theta) * Math.sin(phi),
                        R * Math.cos(theta),
                        R * Math.sin(theta) * Math.cos(phi)
                    ));
                }
                group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat));
            }
            
            // Latitude lines (parallels) — horizontal rings
            const latCount = 12;
            for (let i = 1; i < latCount; i++) {
                const theta = (i / latCount) * Math.PI;
                const r = R * Math.sin(theta);
                const y = R * Math.cos(theta);
                const pts = [];
                for (let j = 0; j <= segments; j++) {
                    const phi = (j / segments) * Math.PI * 2;
                    pts.push(new THREE.Vector3(r * Math.sin(phi), y, r * Math.cos(phi)));
                }
                group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat));
            }
            
            scene.add(group);
        }

        function updateModeLabel() {
            const el = document.getElementById('mode-label');

            else if (keys.space) { el.textContent = 'Looking Around'; el.style.color = '#44aaff'; }

        function onKeyDown(event) {
            const key = event.key.toLowerCase();
            const code = event.code;
            
            // When typing in chat input, only handle Escape (to blur) — skip all game keys
            const ae = document.activeElement;
            if (ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA' || ae.tagName === 'SELECT')) {
                if (key === 'escape') {
                    ae.blur();
                    clearAllKeys();
                }
                return;
            }
            
            // Prevent default for Tab and Space immediately
            if (code === 'Tab' || code === 'Space' || key === ' ') {
                event.preventDefault();
            }
            
            if (code === 'Space' || key === ' ' || key === 'spacebar') {
                keys.space = true;
            }
            if (event.shiftKey) keys.shift = true;
            if (event.altKey) { keys.alt = true; event.preventDefault(); }
            updateModeLabel();
            
            if (key === 'w' || code === 'KeyW' || key === 'arrowup') keys.w = true;
            if (key === 'a' || code === 'KeyA' || key === 'arrowleft') keys.a = true;
            if (key === 's' || code === 'KeyS' || key === 'arrowdown') keys.s = true;
            if (key === 'd' || code === 'KeyD' || key === 'arrowright') keys.d = true;
            
            // Number keys: Ctrl+N saves control group, plain N recalls group
            const num = parseInt(key);
            if (num >= 1 && num <= 9) {
                if (event.ctrlKey || event.metaKey) {
                    event.preventDefault();
                    // Save current selection to control group
                    if (selectedObjects.length > 0) {
                        controlGroups[num] = selectedObjects.slice(); // copy array
                    }
                } else {
                    // Recall control group
                    if (controlGroups[num] && controlGroups[num].length > 0) {
                        // Filter out any destroyed/removed objects
                        controlGroups[num] = controlGroups[num].filter(obj => obj.parent);
                        if (controlGroups[num].length > 0) {
                            deselectAll();
                            controlGroups[num].forEach(obj => addToSelection(obj));
                        }
                    }
                }
            }
            
            // L key to focus camera on selected ship (works with or without shift, and any keyboard layout)
            // Double-tap L to zoom in closer
            if (!event.ctrlKey && !event.metaKey && (key === 'l' || event.key === 'L' || code === 'KeyL')) {
                const now = Date.now();
                const timeSinceLastPress = now - lastLPressTime;
                
                if (timeSinceLastPress < DOUBLE_TAP_THRESHOLD) {
                    // Double-tap detected - zoom in very close (6 units)
                    focusOnSelected(true);
                } else {
                    focusOnSelected(false);
                }
                
                lastLPressTime = now;
            }
            
            // C key to focus camera on crosshair
            // Double-tap C to zoom in close to crosshair
            if (!event.ctrlKey && !event.metaKey && (key === 'c' || event.key === 'C' || code === 'KeyC')) {
                const now = Date.now();
                const timeSinceLastPress = now - lastCPressTime;
                
                if (timeSinceLastPress < DOUBLE_TAP_THRESHOLD) {
                    focusOnCrosshair(true);
                } else {
                    focusOnCrosshair(false);
                }
                
                lastCPressTime = now;
            }
            
            // F key to follow/unfollow target
            if (!event.ctrlKey && !event.metaKey && (key === 'f' || code === 'KeyF')) {
                toggleFollowTarget();
            }
            
            if (key === 'z' || code === 'KeyZ') keys.z = true;
            if (key === 'x' || code === 'KeyX') keys.x = true;
            
            // TAB to cycle through ships, SHIFT+TAB to cycle back
            if (code === 'Tab') {
                cycleSelection(event.shiftKey ? -1 : 1);
            }
            
            // P to cycle through asteroids (closest to farthest), SHIFT+P to cycle back
            if (key === 'p' || code === 'KeyP') {
                cycleAsteroids(event.shiftKey ? -1 : 1);
            }
            
            // / to focus chat input
            if (key === '/' || code === 'Slash') {
                event.preventDefault();
                clearAllKeys();
                document.getElementById('chat-input').focus();
            }
        }
        
        function cycleSelection(direction = 1) {
            const allObjects = [...spaceships];
            if (allObjects.length === 0) return;
            
            // Sort by distance to camera (recalculated each time)
            const sorted = allObjects
                .map(obj => ({ obj, dist: obj.position.distanceTo(cameraPosition) }))
                .sort((a, b) => a.dist - b.dist);
            
            let next;
            if (!selectedObject) {
                // Nothing selected - pick closest
                next = sorted[0].obj;
            } else {
                // Find current in freshly sorted list
                const currentIndex = sorted.findIndex(s => s.obj === selectedObject);
                const nextIndex = ((currentIndex + direction) % sorted.length + sorted.length) % sorted.length;
                next = sorted[nextIndex].obj;
            }
            
            deselectAll();
            addToSelection(next);
            focusOnSelected(false);
        }
        
        function cycleAsteroids(direction = 1) {
            if (asteroids.length === 0) return;
            
            const sorted = asteroids
                .map(obj => ({ obj, dist: obj.position.distanceTo(cameraPosition) }))
                .sort((a, b) => a.dist - b.dist);
            
            let next;
            if (!selectedObject || selectedObject.userData.type !== 'asteroid') {
                next = sorted[0].obj;
            } else {
                const currentIndex = sorted.findIndex(s => s.obj === selectedObject);
                const nextIndex = ((currentIndex + direction) % sorted.length + sorted.length) % sorted.length;
                next = sorted[nextIndex].obj;
            }
            
            deselectAll();
            addToSelection(next);
            focusOnSelected(false);
        }

                return;
            }
            
            if (code === 'Space' || key === ' ' || key === 'spacebar') {
                keys.space = false;
            }
            if (!event.shiftKey) keys.shift = false;
            if (!event.altKey) keys.alt = false;
            updateModeLabel();
            
            if (key === 'w' || code === 'KeyW' || key === 'arrowup') keys.w = false;
            if (key === 'a' || code === 'KeyA' || key === 'arrowleft') keys.a = false;
            if (key === 's' || code === 'KeyS' || key === 'arrowdown') keys.s = false;
            if (key === 'd' || code === 'KeyD' || key === 'arrowright') keys.d = false;

        // Clear all stuck keys when window loses focus

        function onMouseDown(event) {
            // Only handle left mouse button (0)

            isDragging = true;
            dragStart.x = event.clientX;
            dragStart.y = event.clientY;
            
            if (keys.space) {
                // Space held: camera pan mode
                isBoxSelecting = false;
            } else {
                // Default: selection mode
                boxStart.x = event.clientX;
                boxStart.y = event.clientY;

        function onMouseUp(event) {
            if (event.button !== 0) {
                isDragging = false;
                return;
            }
            
            const box = document.getElementById('selection-box');
            
            if (isBoxSelecting) {
                // Finish box selection
                box.style.display = 'none';
                
                // Get box bounds in screen coords
                const left = Math.min(boxStart.x, boxEnd.x);
                const right = Math.max(boxStart.x, boxEnd.x);
                const top = Math.min(boxStart.y, boxEnd.y);
                const bottom = Math.max(boxStart.y, boxEnd.y);
                
                // Find all ships inside the box (box select = ships only)
                if (!event.ctrlKey && !event.metaKey) deselectAll();
                
                spaceships.forEach(obj => {
                    const screenPos = obj.position.clone().project(camera);
                    const sx = (screenPos.x * 0.5 + 0.5) * window.innerWidth;
                    const sy = (-screenPos.y * 0.5 + 0.5) * window.innerHeight;
                    
                    // Check if object is in front of camera and inside box
                    if (screenPos.z < 1 && sx >= left && sx <= right && sy >= top && sy <= bottom) {
                        addToSelection(obj);
                    }
                });
                
                isBoxSelecting = false;
            } else {
                // Regular click (no drag) - do raycast selection
                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
                
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(scene.children, true);
                
                let clickedObject = null;
                for (let intersect of intersects) {
                    let obj = intersect.object;
                    while (obj.parent && obj.parent !== scene) {
                        if (obj.userData.selectable) {
                            clickedObject = obj;
                            break;
                        }
                        obj = obj.parent;
                    }
                    if (obj.userData.selectable) {
                        clickedObject = obj;
                    }
                    if (clickedObject) break;
                }
                
                if (clickedObject) {
                    if (event.ctrlKey || event.metaKey) {
                        // Ctrl+click: toggle in selection
                        toggleInSelection(clickedObject);
                    } else {
                        // Normal click: select only this
                        deselectAll();
                        addToSelection(clickedObject);
                    }
                } else {
                    deselectAll();
                }
            }
            
            isDragging = false;
        }
        
        function addToSelection(obj) {
            if (selectedObjects.includes(obj)) return;
            selectedObjects.push(obj);
            
            // Set primary selection to last added
            selectedObject = obj;
            if (obj.userData.type === 'spaceship') {
                selectedShipIndex = obj.userData.shipIndex;
            }
            
            // Show selection ring
            if (obj.userData.type === 'spaceship') {
                const ring = obj.getObjectByName('selectionRing');
                if (ring) ring.material.opacity = 0.8;
            } else if (obj.userData.type === 'asteroid') {
                if (obj.material) {
                    obj.userData.origEmissiveIntensity = obj.material.emissiveIntensity;
                    obj.material.emissiveIntensity = 0.5;
                }
            }
            
            updateSelectionIndicator();
            updateFuelDisplay();
        }
        
        function toggleInSelection(obj) {
            const idx = selectedObjects.indexOf(obj);
            if (idx >= 0) {
                // Remove from selection
                removeFromSelection(obj);
            } else {
                addToSelection(obj);
            }
        }
        
        function removeFromSelection(obj) {
            const idx = selectedObjects.indexOf(obj);
            if (idx < 0) return;
            selectedObjects.splice(idx, 1);
            
            // Hide selection ring
            if (obj.userData.type === 'spaceship') {
                const ring = obj.getObjectByName('selectionRing');
                if (ring) ring.material.opacity = 0;
            } else if (obj.userData.type === 'asteroid') {
                if (obj.material) {
                    obj.material.emissiveIntensity = obj.userData.origEmissiveIntensity || 0.1;
                }
            }
            
            // Update primary selection
            if (selectedObjects.length > 0) {
                selectedObject = selectedObjects[selectedObjects.length - 1];
                if (selectedObject.userData.type === 'spaceship') {
                    selectedShipIndex = selectedObject.userData.shipIndex;
                }
            } else {
                selectedObject = null;
                selectedShipIndex = -1;
            }
            
            updateSelectionIndicator();
            updateFuelDisplay();
        }
        
        function onRightClick(event) {

            // Update mouse coordinates

            // Raycast
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);
            
            let clickedObject = null;
            for (let intersect of intersects) {
                let obj = intersect.object;

                    }

        function createInvisiblePlane() {
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
            const planeHelper = new THREE.PlaneHelper(plane, 200, 0x00ffff);
            const geometry = new THREE.PlaneGeometry(200, 200);
            const material = new THREE.MeshBasicMaterial({ visible: false });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.rotation.x = -Math.PI / 2;

        function onMouseMove(event) {
            if (isDragging) {
                const deltaX = event.clientX - dragStart.x;
                const deltaY = event.clientY - dragStart.y;
                const dragDist = Math.sqrt(
                    (event.clientX - boxStart.x) * (event.clientX - boxStart.x) +
                    (event.clientY - boxStart.y) * (event.clientY - boxStart.y)
                );
                
                if (keys.space) {
                    // Space held: rotate look direction only (no position change)
                    const rotateSpeed = 0.003;
                    const lookDir = new THREE.Vector3().subVectors(cameraTarget, cameraPosition).normalize();
                    
                    // Yaw: rotate lookDir around cameraUpVector
                    lookDir.applyAxisAngle(cameraUpVector, -deltaX * rotateSpeed);
                    
                    // Pitch: rotate lookDir and cameraUpVector around local right axis
                    const right = new THREE.Vector3().crossVectors(lookDir, cameraUpVector).normalize();
                    if (right.length() > 0.001) {
                        lookDir.applyAxisAngle(right, -deltaY * rotateSpeed);
                        cameraUpVector.applyAxisAngle(right, -deltaY * rotateSpeed);
                    }
                    
                    cameraTarget.copy(cameraPosition).add(lookDir);
                    updateCameraPosition();
                    
                    dragStart.x = event.clientX;
                    dragStart.y = event.clientY;
                } else {
                    // Default: box selection
                    if (dragDist > 5 && !isBoxSelecting) {
                        isBoxSelecting = true;
                    }
                    
                    if (isBoxSelecting) {
                        boxEnd.x = event.clientX;
                        boxEnd.y = event.clientY;
                        
                        const box = document.getElementById('selection-box');
                        box.style.display = 'block';
                        box.style.left = Math.min(boxStart.x, boxEnd.x) + 'px';
                        box.style.top = Math.min(boxStart.y, boxEnd.y) + 'px';
                        box.style.width = Math.abs(boxEnd.x - boxStart.x) + 'px';
                        box.style.height = Math.abs(boxEnd.y - boxStart.y) + 'px';
                    }
                }
            }
            
            updateSelectionIndicator();
        }
        
        function onWheel(event) {
            isCameraTransitioning = false;  // Cancel any L transition
            const zoomSpeed = 0.1;
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const zoomAmount = event.deltaY * zoomSpeed;
            
            cameraPosition.add(forward.multiplyScalar(zoomAmount));
            // Sync orbit system
            camSphereRadius = cameraPosition.distanceTo(camOrbitCenter) || 1;
            camSphereDir.copy(cameraPosition).sub(camOrbitCenter).normalize();
            updateCameraPosition();
        }

        function focusOnCrosshair(zoomed = false) {

            if (zoomed) {
                // Double-tap: zoom in close to crosshair (8 units away)
                const dirToCrosshair = new THREE.Vector3().subVectors(cameraPosition, crosshairPos).normalize();
                targetCameraPosition.copy(crosshairPos).add(dirToCrosshair.multiplyScalar(8));
                targetCameraTarget.copy(crosshairPos);
            } else {
                // Single tap: just look at crosshair, keep position

                targetCameraTarget.copy(crosshairPos);

            isCameraTransitioning = true;

        function focusOnSelected(zoomed = false) {
            if (!selectedObject) return;
            
            const targetPos = selectedObject.position.clone();
            
            if (zoomed) {
                const dirToObj = new THREE.Vector3().subVectors(cameraPosition, targetPos).normalize();
                const closeDistance = selectedObject.userData.type === 'asteroid' ? 
                    Math.max(10, selectedObject.scale.x * 3) : 8;
                
                targetCameraPosition.copy(targetPos).add(dirToObj.multiplyScalar(closeDistance));
                targetCameraTarget.copy(targetPos);
            } else {
                targetCameraPosition.copy(cameraPosition);
                targetCameraTarget.copy(targetPos);
            }
            
            isCameraTransitioning = true;
        }
        
        function applyCameraTransition() {
            if (!isCameraTransitioning) return;
            
            // Lerp camera position toward target
            cameraPosition.lerp(targetCameraPosition, CAMERA_LERP_SPEED);
            cameraTarget.lerp(targetCameraTarget, CAMERA_LERP_SPEED);
            
            // Check if we're close enough to stop
            const posDiff = cameraPosition.distanceTo(targetCameraPosition);
            const targetDiff = cameraTarget.distanceTo(targetCameraTarget);
            
            if (posDiff < 0.1 && targetDiff < 0.1) {
                cameraPosition.copy(targetCameraPosition);
                cameraTarget.copy(targetCameraTarget);
                isCameraTransitioning = false;
            }
            
            // Keep orbit system in sync so orbit mode picks up from here
            camOrbitCenter.copy(cameraTarget);
            camSphereRadius = cameraPosition.distanceTo(camOrbitCenter) || 1;
            camSphereDir.copy(cameraPosition).sub(camOrbitCenter).normalize();
            
            updateCameraPosition();
        }
        
        function deselectAll() {
            // Hide all ship selection rings
            spaceships.forEach(ship => {
                const ring = ship.getObjectByName('selectionRing');
                if (ring) {
                    ring.material.opacity = 0;
                }
            });
            
            // Remove asteroid selection rings and restore emissive
            selectedObjects.forEach(obj => {
                if (obj.userData.type === 'asteroid') {
                    if (obj.material) {
                        obj.material.emissiveIntensity = obj.userData.origEmissiveIntensity || 0.1;
                    }
                }
            });
            
            selectedShipIndex = -1;
            selectedObject = null;
            selectedObjects = [];
            document.getElementById('selection-indicators').innerHTML = '';
        }
        
        function updateSelectionIndicator() {
            const container = document.getElementById('selection-indicators');
            
            // Ensure we have the right number of indicator divs
            while (container.children.length < selectedObjects.length) {
                const div = document.createElement('div');
                div.className = 'selection-indicator';
                div.innerHTML = '<div class="selection-ring"></div>';
                container.appendChild(div);
            }
            while (container.children.length > selectedObjects.length) {
                container.removeChild(container.lastChild);
            }
            
            selectedObjects.forEach((obj, i) => {
                const indicator = container.children[i];
                const ring = indicator.querySelector('.selection-ring');
                
                let r = 0, g = 255, b = 255; // Default cyan
                if (obj.userData.type === 'spaceship') {
                    if (obj.userData.team === 'enemy') {
                        r = 255; g = 50; b = 50; // Red
                    } else if (obj.userData.teamColor) {
                        r = (obj.userData.teamColor >> 16) & 255;
                        g = (obj.userData.teamColor >> 8) & 255;
                        b = obj.userData.teamColor & 255;
                    }
                } else if (obj.userData.type === 'asteroid') {
                    r = 170; g = 170; b = 170; // Gray
                }
                
                ring.style.borderColor = `rgb(${r}, ${g}, ${b})`;
                ring.style.boxShadow = `0 0 20px rgba(${r}, ${g}, ${b}, 0.5), inset 0 0 20px rgba(${r}, ${g}, ${b}, 0.1)`;

                const vector = obj.position.clone();
                vector.project(camera);
                
                if (vector.z < 1) {
                    const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
                    const y = (-vector.y * 0.5 + 0.5) * window.innerHeight;
                    indicator.style.display = 'block';
                    indicator.style.left = (x - 30) + 'px';
                    indicator.style.top = (y - 30) + 'px';
                } else {
                    indicator.style.display = 'none';
                }
            });
        }
        
        function moveShipTo(position) {
            if (selectedShipIndex < 0) return;
            const ship = spaceships[selectedShipIndex];
            if (ship.userData.team === 'enemy') return;
            ship.userData.behavior = {
                type: 'move',
                target: position.clone()
            };
            showTargetMarker(position, 'move');
        }
        
        function toggleFollowTarget() {
            // If already following, unfollow
            if (cameraFollowTarget) {
                addChatMsg('Camera follow off', 'system');
                cameraFollowTarget = null;
                return;
            }
            
            // Follow the selected object (ship or asteroid)
            if (!selectedObject) {
                addChatMsg('Nothing selected to follow', 'system');
                return;
            }
            
            cameraFollowTarget = selectedObject;
            const name = selectedObject.userData.name || 'object';
            addChatMsg(`Camera following ${name}`, 'system');

        function showTargetMarker(position, type) {
            const marker = document.getElementById('target-marker');
            const vector = position.clone();
            vector.project(camera);
            
            const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
            const y = (-vector.y * 0.5 + 0.5) * window.innerHeight;

        // Overloaded function to handle both player clicking and AI firing
        function fireLaser(shooterOrTarget, optionalTarget) {
            let ship, target;
            if (optionalTarget) {
                ship = shooterOrTarget;
                target = optionalTarget;
            } else {
                if (selectedShipIndex < 0 || !spaceships[selectedShipIndex]) return;
                ship = spaceships[selectedShipIndex];
                target = shooterOrTarget;
            }
            
            const shipData = ship.userData;
            
            // Check if ship has enough battery to fire
            const WEAPON_COST = 8;
            if (shipData.battery < WEAPON_COST) {
                return;
            }
            
            shipData.battery = Math.max(0, shipData.battery - WEAPON_COST);
            if (shipData.battery <= 0 && !shipData.weaponsDepleted && shipData.team !== 'enemy') {
                shipData.weaponsDepleted = true;
                showToast(`${shipData.name} — BATTERY DEPLETED`, 'danger');
            }
            
            // Damage calculation — battery (shields) absorbs first, then hull
            if (target.userData && target.userData.type === 'spaceship') {
                const LASER_DAMAGE = 20;
                const td = target.userData;
                if (td.battery > 0) {
                    // Shield absorbs the hit
                    td.battery = Math.max(0, td.battery - LASER_DAMAGE);
                    td.shieldFlash = 12; // show shield for 12 frames (~0.2s)
                } else {
                    // Battery depleted — hull takes damage
                    td.hp -= LASER_DAMAGE; // Takes 5 unshielded shots to kill
                }
                
                if (td.hp <= 0) {
                    // Destroy ship
                    createShipExplosion(target.position);
                    
                    if (target.userData.name) {
                        if (target.userData.team === 'enemy') {
                            showToast(`ENEMY DESTROYED: ${target.userData.name}`, 'success');
                        } else {
                            showToast(`MAYDAY: ${target.userData.name} DESTROYED`, 'danger');
                        }
                    }
                    
                    // Remove from scene and arrays
                    scene.remove(target);
                    if (target.userData.trail && target.userData.trail.line) {
                        scene.remove(target.userData.trail.line);
                    }
                    
                    const idx = spaceships.indexOf(target);
                    if (idx >= 0) spaceships.splice(idx, 1);
                    
                    removeFromSelection(target);
                    if (target === selectedObject) {
                        selectedObject = null;
                        if (spaceships.length > 0) selectShip(0);
                    }
                }
            }
            
            const startPos = ship.position.clone();
            const endPos = target.position.clone();
            const distance = startPos.distanceTo(endPos);
            
            // Create laser geometry
            const laserGeometry = new THREE.CylinderGeometry(0.08, 0.08, distance, 6);
            const laserMaterial = new THREE.MeshBasicMaterial({
                color: 0xff0050,
                transparent: true,
                opacity: 0.4,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const laser = new THREE.Mesh(laserGeometry, laserMaterial);
            
            // Position and orient laser
            const midPoint = startPos.clone().add(endPos).multiplyScalar(0.5);
            laser.position.copy(midPoint);
            laser.lookAt(endPos);
            laser.rotateX(Math.PI / 2);
            
            scene.add(laser);
            lasers.push({ mesh: laser, created: Date.now() });
            
            // Muzzle flash
            const flashGeometry = new THREE.SphereGeometry(0.4, 8, 8);
            const flashMaterial = new THREE.MeshBasicMaterial({
                color: 0xff0050,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const flash = new THREE.Mesh(flashGeometry, flashMaterial);
            flash.position.copy(startPos);
            scene.add(flash);
            lasers.push({ mesh: flash, created: Date.now(), isFlash: true });
            
            // No recoil for laser weapons - they don't have kickback
            
            // Target hit effect
            setTimeout(() => {
                const hitFlash = new THREE.Mesh(
                    new THREE.SphereGeometry(1, 8, 8),
                    new THREE.MeshBasicMaterial({
                        color: 0xffaa00,
                        transparent: true,
                        opacity: 0.8
                    })
                );
                hitFlash.position.copy(endPos);
                scene.add(hitFlash);
                lasers.push({ mesh: hitFlash, created: Date.now(), isFlash: true });
            }, distance * 5);
            
            // Update HUD to show weapons depletion
            updateShipHUD();
        }
        
        function updateSpaceships() {
            spaceships.forEach((ship, index) => {
                if (!ship) return;
                
                const data = ship.userData;
                const isSelected = index === selectedShipIndex;
                const hasFuel = data.fuel > 0;
                
                // Slowly regenerate battery (shields + weapons)
                if (data.battery < data.maxBattery) {
                    data.battery = Math.min(data.maxBattery, data.battery + 0.15);
                    if (data.battery > 8 && data.weaponsDepleted) {
                        data.weaponsDepleted = false; // Recovered enough to shoot
                    }
                }
                
                // Decay shield flash
                if (data.shieldFlash > 0) data.shieldFlash--;
                
                // Update shield bubble visual
                const shieldChild = ship.getObjectByName('shield');
                if (shieldChild) {
                    shieldChild.material.opacity = data.shieldFlash > 0
                        ? (data.shieldFlash / 12) * 0.6
                        : 0;
                    shieldChild.visible = data.shieldFlash > 0;
                }
                
                // ── LANDED: stay attached to asteroid surface, skip all physics ──
                if (data.behavior && data.behavior.type === 'landed') {
                    const b = data.behavior;
                    if (!b.asteroid || !b.asteroid.parent) {
                        // Asteroid destroyed — liftoff into idle drift
                        data.behavior = null;
                        return;
                    }
                    // Convert local surface position back to world space
                    // (tracks asteroid rotation automatically)
                    const worldPos = b.surfaceLocalPos.clone();
                    b.asteroid.localToWorld(worldPos);
                    ship.position.copy(worldPos);
                    // Orient ship: nose aligned with surface normal (standing on surface)
                    const worldNormal = b.surfaceNormal.clone()
                        .applyQuaternion(b.asteroid.quaternion).normalize();
                    // Place ship slightly above surface along normal
                    ship.position.add(worldNormal.clone().multiplyScalar(1.5));
                    // Face outward from asteroid
                    ship.lookAt(ship.position.clone().add(worldNormal));
                    data.velocity.set(0, 0, 0);
                    data.gravityMag = 0;
                    data.isAccelerating = false;
                    data.isBraking = false;
                    return; // skip all other physics
                }
                
                // Get current velocity magnitude
                const speed = data.velocity.length();
                const targetSpeed = data.targetVelocity.length();
                
                // Determine if ship is changing velocity (accelerating or braking)
                const isChangingVelocity = data.isAccelerating || data.isBraking;
                // Engine particles only when actively thrusting (not gravity drift)
                if (isChangingVelocity && hasFuel) {
                    // Reuse pooled particle or create new (shared geo + cached material)
                    let particle;
                    if (particlePool.length > 0) {
                        particle = particlePool.pop();
                        // Swap material if color changed
                        if (particle.material.color.getHex() !== data.teamColor) {
                            if (!particleMaterialCache[data.teamColor]) {
                                particleMaterialCache[data.teamColor] = new THREE.MeshBasicMaterial({
                                    color: data.teamColor, transparent: true, opacity: 0.6
                                });
                            }
                            particle.material = particleMaterialCache[data.teamColor];
                        }
                        particle.material.opacity = 0.6;
                        particle.scale.setScalar(1);
                        particle.visible = true;
                    } else {
                        if (!particleMaterialCache[data.teamColor]) {
                            particleMaterialCache[data.teamColor] = new THREE.MeshBasicMaterial({
                                color: data.teamColor, transparent: true, opacity: 0.6
                            });
                        }
                        particle = new THREE.Mesh(sharedParticleGeo, particleMaterialCache[data.teamColor]);
                        scene.add(particle);
                    }
                    
                    // Get ship's forward direction
                    const forward = new THREE.Vector3(0, 0, 1).applyAxisAngle(
                        new THREE.Vector3(0, 1, 0), 
                        ship.rotation.y
                    );
                    
                    particle.position.copy(ship.position);
                    particle.position.sub(forward.multiplyScalar(2.5));
                    
                    // Particle initial velocity: inherit ship's velocity, then eject backward
                    const ejectSpeed = 0.2 + speed * 0.5; // faster ship = faster tail ejection
                    const particleVelocity = data.velocity.clone();
                    particleVelocity.sub(forward.multiplyScalar(ejectSpeed));
                    particleVelocity.x += (Math.random() - 0.5) * 0.1;
                    particleVelocity.y += (Math.random() - 0.5) * 0.1;
                    particleVelocity.z += (Math.random() - 0.5) * 0.1;
                    
                    // Tail length (life) proportional to speed (max 1.5, min 0.5)
                    const particleLife = 0.5 + Math.min(1.0, speed * 2.0);

                    particle.userData = {
                        velocity: particleVelocity,
                        life: particleLife,
                        maxLife: particleLife
                    };
                    engineParticles.push(particle);
                }
                
                
                // Apply gravity from all asteroids (free — no fuel cost)
                const G_eff = G_GAME * gravityMultiplier;
                const gravAccel = new THREE.Vector3(0, 0, 0);
                asteroids.forEach(asteroid => {
                    const toBody = asteroid.position.clone().sub(ship.position);
                    const distSq = toBody.lengthSq();
                    const dist = Math.sqrt(distSq);
                    if (dist < 3) return; // avoid singularity at overlap
                    // F = G * M / r², applied as acceleration (ship mass cancels)
                    const strength = G_eff * asteroid.userData.mass / distSq;
                    gravAccel.add(toBody.normalize().multiplyScalar(strength));
                });
                data.gravityMag = gravAccel.length(); // Save for HUD
                data.velocity.add(gravAccel);
                
                // Apply physics: accelerate toward target velocity
                if (data.isAccelerating && hasFuel) {
                    // Check if we actually need thrust (not already at cruise speed)
                    const velDiff = data.targetVelocity.clone().sub(data.velocity);
                    if (velDiff.length() > THRUST * 0.5) {
                        // Thrust toward target velocity — burns fuel
                        const acceleration = velDiff.normalize();
                        // Make XZ acceleration much stronger than Y (vertical) acceleration
                        // Ships are built to thrust forwards/backwards/sideways much faster than strictly up/down
                        acceleration.x *= 2.5;
                        acceleration.z *= 2.5;
                        acceleration.normalize().multiplyScalar(THRUST);
                        
                        data.velocity.add(acceleration);
                        if (data.velocity.length() > MAX_SPEED) {
                            data.velocity.normalize().multiplyScalar(MAX_SPEED);
                        }
                        data.fuel = Math.max(0, data.fuel - FUEL_COST_PER_FRAME);
                    } else {
                        // At cruise speed — coast for free (no fuel burn, no engine particles)
                        data.velocity.copy(data.targetVelocity);
                        data.isAccelerating = false;
                    }
                } else if (data.isBraking && hasFuel) {
                    // Reverse thrust — same engine, same power, same fuel cost
                    if (speed <= THRUST) {
                        // Would overshoot zero — clamp (physically correct: cut engines at zero)
                        data.velocity.set(0, 0, 0);
                    } else {
                        const brakeDir = data.velocity.clone().normalize();
                        brakeDir.x *= 2.5;
                        brakeDir.z *= 2.5;
                        brakeDir.normalize().multiplyScalar(-THRUST);
                        
                        data.velocity.add(brakeDir);
                    }
                    data.fuel = Math.max(0, data.fuel - FUEL_COST_PER_FRAME);
                } else {
                    // No thrust — in space, velocity is preserved (no drag)
                }
                
                // Toast when fuel runs out
                if (data.fuel <= 0 && !data.fuelDepleted) {
                    data.fuelDepleted = true;
                    showToast(`${data.name} — FUEL DEPLETED`, 'danger');
                }
                
                // Move ship based on velocity
                if (speed > 0.001) {
                    ship.position.add(data.velocity);
                    
                    // Face direction of movement
                    if (speed > 0.05) {
                        const moveDir = data.velocity.clone().normalize();
                        const targetRotation = Math.atan2(moveDir.x, moveDir.z);
                        ship.rotation.y = targetRotation;
                    }
                }
                
                // Elastic collision with asteroids — compound shapes or ellipsoid fallback
                // Speed thresholds determine outcome: land / bounce / crash
                const LAND_SPEED = 0.03;   // below this: soft landing (~300 m/s)
                const CRASH_SPEED = 0.15;  // above this: fatal impact (~1.5 km/s)
                const shipRadius = 2;      // ~200m ship collision radius
                for (const asteroid of asteroids) {
                    // Vector from asteroid center to ship (world space)
                    const toShip = ship.position.clone().sub(asteroid.position);
                    // Rotate into asteroid's local frame (rotation only — NOT scale)
                    const invQuat = asteroid.quaternion.clone().invert();
                    const localPos = toShip.applyQuaternion(invQuat);
                    
                    // ── Compound collision shapes (torus + cylinder) ──
                    // Used for complex objects like the station where a single
                    // ellipsoid can't represent the hollow torus geometry.
                    const shapes = asteroid.userData.collisionShapes;
                    if (shapes) {
                        let hit = false;
                        let bestPen = 0;         // deepest penetration
                        let bestNormalLocal = null;
                        let bestSurfaceLocal = null;
                        
                        for (const shape of shapes) {
                            if (shape.type === 'torus') {
                                // Torus lies in XZ plane (center circle at Y=0, radius R).
                                // Tube cross-section radius r. Ship collides when distance
                                // to nearest point on center circle < r + shipRadius.
                                const R = shape.R, r = shape.r;
                                const dxz = Math.sqrt(localPos.x * localPos.x + localPos.z * localPos.z);
                                // Nearest point on center circle (in XZ plane at radius R)
                                let nearX, nearZ;
                                if (dxz > 0.001) {
                                    nearX = localPos.x * R / dxz;
                                    nearZ = localPos.z * R / dxz;
                                } else {
                                    nearX = R; nearZ = 0; // degenerate: at axis center
                                }
                                // Distance from ship to that nearest point on circle
                                const dx = localPos.x - nearX;
                                const dy = localPos.y; // center circle is at Y=0
                                const dz = localPos.z - nearZ;
                                const distToTube = Math.sqrt(dx * dx + dy * dy + dz * dz);
                                const threshold = r + shipRadius;
                                
                                if (distToTube < threshold) {
                                    const pen = threshold - distToTube;
                                    if (pen > bestPen) {
                                        bestPen = pen;
                                        // Normal: from nearest circle point toward ship
                                        if (distToTube > 0.001) {
                                            bestNormalLocal = new THREE.Vector3(dx / distToTube, dy / distToTube, dz / distToTube);
                                        } else {
                                            bestNormalLocal = new THREE.Vector3(0, 1, 0);
                                        }
                                        // Surface point: on tube surface along normal from circle point
                                        bestSurfaceLocal = new THREE.Vector3(
                                            nearX + bestNormalLocal.x * threshold,
                                            bestNormalLocal.y * threshold,
                                            nearZ + bestNormalLocal.z * threshold
                                        );
                                        hit = true;
                                    }
                                }
                            } else if (shape.type === 'cylinder') {
                                // Cylinder along Y axis: radius in XZ, halfHeight in Y
                                const cR = shape.radius + shipRadius;
                                const cH = shape.halfHeight + shipRadius;
                                const dxz = Math.sqrt(localPos.x * localPos.x + localPos.z * localPos.z);
                                
                                if (dxz < cR && Math.abs(localPos.y) < cH) {
                                    // Inside cylinder — find shallowest escape
                                    const penRadial = cR - dxz;
                                    const penAxial = cH - Math.abs(localPos.y);
                                    const pen = Math.min(penRadial, penAxial);
                                    
                                    if (pen > bestPen) {
                                        bestPen = pen;
                                        if (penRadial < penAxial) {
                                            // Push outward radially
                                            if (dxz > 0.001) {
                                                bestNormalLocal = new THREE.Vector3(localPos.x / dxz, 0, localPos.z / dxz);
                                            } else {
                                                bestNormalLocal = new THREE.Vector3(1, 0, 0);
                                            }
                                            bestSurfaceLocal = new THREE.Vector3(
                                                bestNormalLocal.x * cR, localPos.y, bestNormalLocal.z * cR
                                            );
                                        } else {
                                            // Push out through cap
                                            const capSign = localPos.y >= 0 ? 1 : -1;
                                            bestNormalLocal = new THREE.Vector3(0, capSign, 0);
                                            bestSurfaceLocal = new THREE.Vector3(localPos.x, capSign * cH, localPos.z);
                                        }
                                        hit = true;
                                    }
                                }
                            }
                        }
                        
                        if (hit && bestNormalLocal) {
                            // Rotate normal back to world space
                            const worldNormal = bestNormalLocal.clone().applyQuaternion(asteroid.quaternion).normalize();
                            const vDotN = data.velocity.dot(worldNormal);
                            
                            if (vDotN < 0) { // only act if moving into the surface
                                const impactSpeed = Math.abs(vDotN);
                                
                                // Push ship to compound surface
                                ship.position.copy(asteroid.position).add(
                                    bestSurfaceLocal.clone().applyQuaternion(asteroid.quaternion)
                                );
                                
                                if (impactSpeed > CRASH_SPEED) {
                                    createShipExplosion(ship.position);
                                    const astName = asteroid.userData.name || 'asteroid';
                                    showToast(`${data.name} CRASHED into ${astName}`, 'danger');
                                    scene.remove(ship);
                                    if (data.trail && data.trail.line) scene.remove(data.trail.line);
                                    const idx = spaceships.indexOf(ship);
                                    if (idx >= 0) spaceships.splice(idx, 1);
                                    removeFromSelection(ship);
                                    if (ship === selectedObject) {
                                        selectedObject = null;
                                        if (spaceships.length > 0) selectShip(0);
                                    }
                                    break;
                                } else if (impactSpeed < LAND_SPEED) {
                                    data.velocity.set(0, 0, 0);
                                    data.behavior = {
                                        type: 'landed',
                                        asteroid: asteroid,
                                        surfaceLocalPos: bestSurfaceLocal.clone(),
                                        surfaceNormal: worldNormal.clone(),
                                    };
                                    const astName = asteroid.userData.name || 'asteroid';
                                    shipReport(data, 'landed', `Landed on ${astName}`);
                                    break;
                                } else {
                                    data.velocity.sub(worldNormal.clone().multiplyScalar(2 * vDotN));
                                    data.velocity.multiplyScalar(0.7);
                                    if (data.behavior && data.behavior.type === 'move') {
                                        data.behavior = null;
                                    }
                                }
                            }
                        }
                        continue; // skip ellipsoid fallback for this asteroid
                    }
                    
                    // ── Ellipsoid fallback (normal asteroids) ──
                    // In local frame, asteroid is ellipsoid with semi-axes = scale (game units)
                    // Groups can override with userData.collisionSize
                    // Pad by shipRadius so we detect when the ship surface touches
                    const cs = asteroid.userData.collisionSize;
                    const sx = (cs ? cs.x : asteroid.scale.x) + shipRadius;
                    const sy = (cs ? cs.y : asteroid.scale.y) + shipRadius;
                    const sz = (cs ? cs.z : asteroid.scale.z) + shipRadius;
                    // Ellipsoid test: (x/sx)² + (y/sy)² + (z/sz)² < 1 means inside
                    const ex = localPos.x / sx;
                    const ey = localPos.y / sy;
                    const ez = localPos.z / sz;
                    const ellipDist = ex * ex + ey * ey + ez * ez;
                    
                    if (ellipDist < 1 && ellipDist > 0.0001) {
                        // Ellipsoid surface normal in local frame: gradient (x/sx²,y/sy²,z/sz²)
                        const localNormal = new THREE.Vector3(
                            localPos.x / (sx * sx),
                            localPos.y / (sy * sy),
                            localPos.z / (sz * sz)
                        ).normalize();
                        
                        // Rotate normal back to world space
                        const worldNormal = localNormal.applyQuaternion(asteroid.quaternion).normalize();
                        
                        const vDotN = data.velocity.dot(worldNormal);
                        if (vDotN < 0) { // only act if moving into the surface
                            const impactSpeed = Math.abs(vDotN);
                            
                            // Push ship to ellipsoid surface
                            const pushFactor = 1 / Math.sqrt(ellipDist);
                            const surfaceLocal = localPos.clone().multiplyScalar(pushFactor);
                            ship.position.copy(asteroid.position).add(surfaceLocal.clone().applyQuaternion(asteroid.quaternion));
                            
                            if (impactSpeed > CRASH_SPEED) {
                                // ── CRASH: ship destroyed ──
                                createShipExplosion(ship.position);
                                const astName = asteroid.userData.name || 'asteroid';
                                showToast(`${data.name} CRASHED into ${astName}`, 'danger');
                                
                                scene.remove(ship);
                                if (data.trail && data.trail.line) {
                                    scene.remove(data.trail.line);
                                }
                                const idx = spaceships.indexOf(ship);
                                if (idx >= 0) spaceships.splice(idx, 1);
                                removeFromSelection(ship);
                                if (ship === selectedObject) {
                                    selectedObject = null;
                                    if (spaceships.length > 0) selectShip(0);
                                }
                                break; // ship is gone
                                
                            } else if (impactSpeed < LAND_SPEED) {
                                // ── LAND: gentle touchdown ──
                                data.velocity.set(0, 0, 0);
                                data.behavior = {
                                    type: 'landed',
                                    asteroid: asteroid,
                                    surfaceLocalPos: surfaceLocal.clone(), // position on asteroid in local frame
                                    surfaceNormal: worldNormal.clone(),
                                };
                                const astName = asteroid.userData.name || 'asteroid';
                                shipReport(data, 'landed', `Landed on ${astName}`);
                                break;
                                
                            } else {
                                // ── BOUNCE: elastic collision ──
                                data.velocity.sub(worldNormal.clone().multiplyScalar(2 * vDotN));
                                data.velocity.multiplyScalar(0.7); // 30% energy loss
                                if (data.behavior && data.behavior.type === 'move') {
                                    data.behavior = null;
                                }
                            }
                        }
                    }
                }
                
                // Update motion trail
                const trail = data.trail;
                if (trail) {
                    const currentSpeed = data.velocity.length();
                    // Only record trail points when actually moving. 50m/s = 0.05 km/s.
                    // Scale KM_PER_UNIT = 100 -> 1 unit = 100km. 60fps.
                    // 50m/s = 0.05 km/s = 0.0005 units/s = 0.0000083 units/frame
                    if (currentSpeed > 0.000005) {
                        trail.positions.push(ship.position.clone());
                        
                        // Calculate desired trail length based on speed.
                        // At very low speeds, we want a shorter trail so it doesn't look like a long static string.
                        // Multiply by 50000 so 0.00001 (low speed) gives some points, 0.001 gives max points
                        const dynamicMaxLength = Math.max(5, Math.min(trail.maxLength, Math.floor(currentSpeed * 50000 + 5)));
                        
                        while (trail.positions.length > dynamicMaxLength) {
                            trail.positions.shift();
                        }
                    } else if (trail.positions.length > 0) {
                        // Fade out: remove oldest point each frame when stopped
                        trail.positions.shift();
                    }
                    
                    // Update trail geometry
                    const posAttr = trail.line.geometry.getAttribute('position');
                    const colAttr = trail.line.geometry.getAttribute('customColor');
                    const len = trail.positions.length;
                    
                    // Extract team color components
                    const r = ((data.teamColor >> 16) & 0xFF) / 255;
                    const g = ((data.teamColor >> 8) & 0xFF) / 255;
                    const b = (data.teamColor & 0xFF) / 255;
                    
                    for (let j = 0; j < trail.maxLength; j++) {
                        if (j < len) {
                            const p = trail.positions[j];
                            posAttr.array[j * 3] = p.x;
                            posAttr.array[j * 3 + 1] = p.y;
                            posAttr.array[j * 3 + 2] = p.z;
                            // Fade: oldest = 0 opacity, newest = 0.6 opacity
                            const alpha = (j / len) * 0.6;
                            colAttr.array[j * 4] = r;
                            colAttr.array[j * 4 + 1] = g;
                            colAttr.array[j * 4 + 2] = b;
                            colAttr.array[j * 4 + 3] = alpha;
                        } else {
                            // Hide unused points by zeroing alpha
                            colAttr.array[j * 4 + 3] = 0;
                        }
                    }
                    posAttr.needsUpdate = true;
                    colAttr.needsUpdate = true;
                    trail.line.geometry.setDrawRange(0, len);
                }
                
                // Reset flags for next frame
                data.isAccelerating = false;
                data.isBraking = false;
                data.targetVelocity.set(0, 0, 0);
                
                // Hover animation (only when stopped) - offset from base Y, don't overwrite
                if (!data.baseY && data.baseY !== 0) {
                    data.baseY = ship.position.y;  // Store initial Y on first frame
                }
                if (speed < 0.01) {
                    ship.position.y = data.baseY + Math.sin(Date.now() * 0.002 + index) * 0.2;
                }
                
                // Nav light pulsation - soft smooth glow
                const navNames = ['navTop', 'navBottom', 'navRight', 'navLeft', 'navFront', 'navRear'];
                const time = Date.now() * 0.001;
                
                navNames.forEach((name, lightIndex) => {
                    const mesh = ship.getObjectByName(name);
                    if (mesh) {
                        // Each light has unique phase and slow frequency
                        const phase = index * 0.37 + lightIndex * 0.83;
                        const freq = 0.3 + lightIndex * 0.07;  // Very slow: 0.3-0.72 Hz
                        
                        // Smooth sine wave pulsation
                        const glow = (Math.sin(time * freq * Math.PI * 2 + phase) + 1) * 0.5;  // 0 to 1
                        
                        mesh.material.opacity = 0.1 + glow * 0.5; // lower base opacity for additive glow
                        mesh.scale.setScalar(0.8 + glow * 1.5);
                        
                        // Also pulse the inner core opacity slightly
                        if (mesh.children && mesh.children.length > 0) {
                            mesh.children[0].material.opacity = 0.6 + glow * 0.4;
                        }
                    }
                });
            });
            
            // Update engine particles
            for (let i = engineParticles.length - 1; i >= 0; i--) {
                const p = engineParticles[i];
                p.position.add(p.userData.velocity);
                p.userData.life -= 0.02;
                p.material.opacity = p.userData.life * 0.6;
                p.scale.multiplyScalar(0.95);
                
                if (p.userData.life <= 0) {
                    p.visible = false;
                    particlePool.push(p);
                    engineParticles.splice(i, 1);
                }
            }
            
            // Update fuel display
            updateFuelDisplay();
        }

            const km = Math.round(units * KM_PER_UNIT);
            if (km >= 10000) return (km / 1000).toFixed(1) + 'Kkm';
            return km + 'km';
        }
