        // Ship autonomous reporting — throttled per ship, per reason
        const _shipReportCooldowns = {};
        function shipReport(shipData, reason, message) {
            const key = shipData.name + ':' + reason;
            const now = Date.now();
            if (_shipReportCooldowns[key] && now - _shipReportCooldowns[key] < 10000) return; // 10s cooldown per ship per reason
            _shipReportCooldowns[key] = now;
            addChatMsg(`${shipData.name}: ${message}`, 'report');
        }
        
        function addChatDSL(text) {
            const log = document.getElementById('chat-log');
            const msg = document.createElement('div');
            msg.className = 'chat-msg dsl';
            msg.textContent = text;
            log.appendChild(msg);
            log.scrollTop = log.scrollHeight;
        }
        
        // Find ship by name (case-insensitive, partial match)
        function findShip(name) {
            const lower = name.toLowerCase().replace(/[^a-z0-9]/g, '');
            return spaceships.find(s => {
                const sName = s.userData.name.toLowerCase().replace(/[^a-z0-9]/g, '');
                return sName === lower || sName.includes(lower);
            });
        }
        
        // Find ships by range (e.g. "1-5" or "1,3,5")
        function findShips(spec) {
            const results = [];
            // Range: "1-5"
            const rangeMatch = spec.match(/^(\d+)-(\d+)$/);
            if (rangeMatch) {
                const start = parseInt(rangeMatch[1]);
                const end = parseInt(rangeMatch[2]);
                for (let i = start; i <= end && i <= spaceships.length; i++) {
                    results.push(spaceships[i - 1]);
                }
                return results;
            }
            // Comma-separated list: "Ship-01, Ship-02, Ship-03" or "1,3,5"
            if (spec.includes(',')) {
                spec.split(',').forEach(s => {
                    s = s.trim();
                    // Try as number first
                    const num = parseInt(s);
                    if (!isNaN(num) && num >= 1 && num <= spaceships.length) {
                        results.push(spaceships[num - 1]);
                    } else {
                        // Try as ship name
                        const ship = findShip(s);
                        if (ship && !results.includes(ship)) results.push(ship);
                    }
                });
                return results;
            }
            // "all" or "all ships"
            if (spec.toLowerCase() === 'all' || spec.toLowerCase() === 'all ships') return [...spaceships];
            // "selected"
            if (spec.toLowerCase() === 'selected' || spec.toLowerCase() === 'selected ships') return selectedObjects.filter(o => o.userData.type === 'spaceship');
            // Single name/number
            const num = parseInt(spec);
            if (!isNaN(num) && num >= 1 && num <= spaceships.length) {
                return [spaceships[num - 1]];
            }
            const ship = findShip(spec);
            if (ship) return [ship];
            return [];
        }
        
        // Parse a position: [x,y,z] in km, or "Ship-01" or "nearest_asteroid"
        function parsePosition(str) {
            str = str.trim();
            // [x, y, z] - Assume input is in km, convert to game units
            const arrMatch = str.match(/\[?\s*(-?[\d.]+)\s*,\s*(-?[\d.]+)\s*,\s*(-?[\d.]+)\s*\]?/);
            if (arrMatch) {
                // LLM outputs coordinates in km. 1 unit = 0.1 km, so 1 km = 10 units.
                // Divide by KM_PER_UNIT (0.1) to convert back to game units.
                return new THREE.Vector3(
                    parseFloat(arrMatch[1]) / KM_PER_UNIT, 
                    parseFloat(arrMatch[2]) / KM_PER_UNIT, 
                    parseFloat(arrMatch[3]) / KM_PER_UNIT
                );
            }
            // "nearest_asteroid"
            if (str.toLowerCase().includes('nearest_asteroid')) {
                // Find nearest asteroid to first selected ship or camera
                const ref = (selectedObjects.length > 0) ? selectedObjects[0].position : cameraPosition;
                let nearest = null, nearestDist = Infinity;
                asteroids.forEach(a => {
                    const d = a.position.distanceTo(ref);
                    if (d < nearestDist) { nearestDist = d; nearest = a; }
                });
                return nearest ? nearest.position.clone() : new THREE.Vector3(0, 0, 0);
            }
            // Ship name
            const ship = findShip(str);
            if (ship) return ship.position.clone();
            return null;
        }
        
        // ===== DSL COMMAND PARSER AND EXECUTOR =====
        
        function parseDSL(line) {
            const tokens = line.trim().split(/\s+/);
            if (tokens.length === 0) return null;
            
            const cmd = tokens[0].toUpperCase();
            
            switch (cmd) {
                case 'MOVE': {
                    // MOVE <ships> TO <position> — TO is optional
                    let toIdx = tokens.findIndex(t => t.toUpperCase() === 'TO');
                    if (toIdx < 0) {
                        // No TO keyword — find where the position starts (first '[' or coordinate)
                        toIdx = tokens.findIndex((t, i) => i > 0 && (t.startsWith('[') || t.startsWith('(')));
                        if (toIdx < 0) return { error: 'MOVE: no target position found' };
                        toIdx--; // offset so slice(toIdx+1) grabs the position
                    }
                    const shipsSpec = tokens.slice(1, toIdx + 1).join(' ').replace(/\bto\b/i, '').trim() || 'selected';
                    const posStr = tokens.slice(toIdx + 1).join(' ');
                    
                    const pos = parsePosition(posStr);
                    if (!pos) return { error: `Invalid position: "${posStr}"` };

                    if (shipsSpec.toLowerCase() === 'cursor' || shipsSpec.toLowerCase() === 'crosshair') {
                        return { cmd: 'CURSOR', target: pos };
                    }
                    
                    const ships = findShips(shipsSpec);
                    if (ships.length === 0) return { error: `No ships found: "${shipsSpec}"` };
                    return { cmd: 'MOVE', ships, target: pos };
                }
                case 'STOP': {
                    // STOP <ships>
                    const shipsSpec = tokens.slice(1).join(' ');
                    const ships = findShips(shipsSpec || 'selected');
                    if (ships.length === 0) return { error: 'No ships to stop' };
                    return { cmd: 'STOP', ships };
                }
                case 'ORBIT': {
                    // ORBIT <ships> AROUND <position> RADIUS <n>
                    const aroundIdx = tokens.findIndex(t => t.toUpperCase() === 'AROUND');
                    const radiusIdx = tokens.findIndex(t => t.toUpperCase() === 'RADIUS');
                    if (aroundIdx < 0) return { error: 'ORBIT requires AROUND keyword' };
                    const shipsSpec = tokens.slice(1, aroundIdx).join(' ');
                    const posEnd = radiusIdx > 0 ? radiusIdx : tokens.length;
                    const posStr = tokens.slice(aroundIdx + 1, posEnd).join(' ');
                    const radius = radiusIdx > 0 ? parseFloat(tokens[radiusIdx + 1]) / KM_PER_UNIT : null;

                    if (shipsSpec.toLowerCase() === 'cursor' || shipsSpec.toLowerCase() === 'crosshair') {
                        const targetObj = findShip(posStr);
                        if (targetObj) {
                            return { cmd: 'CURSOR', target: targetObj.position.clone() };
                        } else {
                            const pos = parsePosition(posStr);
                            if (pos) return { cmd: 'CURSOR', target: pos };
                            return { error: `Invalid cursor target: "${posStr}"` };
                        }
                    }

                    const ships = findShips(shipsSpec);
                    const pos = parsePosition(posStr);
                    if (ships.length === 0) return { error: `No ships found: "${shipsSpec}"` };
                    if (!pos) return { error: `Invalid position: "${posStr}"` };
                    return { cmd: 'ORBIT', ships, center: pos, radius };
                }
                case 'PATROL': {
                    // PATROL <ships> BETWEEN <pos1> AND <pos2>
                    const betweenIdx = tokens.findIndex(t => t.toUpperCase() === 'BETWEEN');
                    const andIdx = tokens.findIndex(t => t.toUpperCase() === 'AND');
                    if (betweenIdx < 0 || andIdx < 0) return { error: 'PATROL requires BETWEEN ... AND ...' };
                    const shipsSpec = tokens.slice(1, betweenIdx).join(' ');
                    const pos1Str = tokens.slice(betweenIdx + 1, andIdx).join(' ');
                    const pos2Str = tokens.slice(andIdx + 1).join(' ');

                    if (shipsSpec.toLowerCase() === 'cursor' || shipsSpec.toLowerCase() === 'crosshair') {
                        const targetObj = findShip(pos1Str);
                        if (targetObj) {
                            return { cmd: 'CURSOR', target: targetObj.position.clone() };
                        } else {
                            const pos = parsePosition(pos1Str);
                            if (pos) return { cmd: 'CURSOR', target: pos };
                            return { error: `Invalid cursor target: "${pos1Str}"` };
                        }
                    }

                    const ships = findShips(shipsSpec);
                    const pos1 = parsePosition(pos1Str);
                    const pos2 = parsePosition(pos2Str);
                    if (ships.length === 0) return { error: `No ships found: "${shipsSpec}"` };
                    if (!pos1 || !pos2) return { error: 'Invalid patrol positions' };
                    return { cmd: 'PATROL', ships, pointA: pos1, pointB: pos2 };
                }
                case 'FOLLOW': {
                    // FOLLOW <ships> TARGET <ship_or_position_or_CAMERA> DISTANCE <n>
                    const targetIdx = tokens.findIndex(t => t.toUpperCase() === 'TARGET');
                    const distIdx = tokens.findIndex(t => t.toUpperCase() === 'DISTANCE');
                    if (targetIdx < 0) return { error: 'FOLLOW requires TARGET keyword' };
                    const shipsSpec = tokens.slice(1, targetIdx).join(' ');
                    const targetSpec = tokens.slice(targetIdx + 1, distIdx > 0 ? distIdx : tokens.length).join(' ');
                    const distance = distIdx > 0 ? parseFloat(tokens[distIdx + 1]) : 10;
                    
                    if (shipsSpec.toLowerCase() === 'cursor' || shipsSpec.toLowerCase() === 'crosshair') {
                        const targetObj = findShip(targetSpec);
                        if (targetObj) {
                            return { cmd: 'CURSOR', target: targetObj.position.clone() };
                        } else {
                            const pos = parsePosition(targetSpec);
                            if (pos) return { cmd: 'CURSOR', target: pos };
                            return { error: `Invalid cursor target: "${targetSpec}"` };
                        }
                    }

                    const ships = findShips(shipsSpec);
                    if (ships.length === 0) return { error: `No ships found: "${shipsSpec}"` };
                    
                    // Check for CAMERA target
                    if (targetSpec.toLowerCase() === 'camera' || targetSpec.toLowerCase() === 'me') {
                        return { cmd: 'FOLLOW', ships, followCamera: true, distance };
                    }
                    // Check for CROSSHAIR / CURSOR target
                    if (['crosshair', 'cursor', 'marker', 'pointer'].includes(targetSpec.toLowerCase())) {
                        return { cmd: 'FOLLOW', ships, followCrosshair: true, distance };
                    }
                    // Check for ship target
                    const targetShip = findShip(targetSpec);
                    if (targetShip) {
                        return { cmd: 'FOLLOW', ships, targetShip, distance };
                    }
                    // Check for position target
                    const targetPos = parsePosition(targetSpec);
                    if (targetPos) {
                        return { cmd: 'MOVE', ships, target: targetPos };
                    }
                    return { error: `Target not found: "${targetSpec}"` };
                }
                case 'ATTACK': {
                    // ATTACK <ships> TARGET <target> or ATTACK <target> for selected ships
                    let targetIdx = tokens.findIndex(t => t.toUpperCase() === 'TARGET');
                    let shipsSpec = 'selected';
                    let targetSpec = '';

                    if (targetIdx < 0) {
                        if (tokens.length === 2) {
                            shipsSpec = 'selected';
                            targetSpec = tokens[1];
                        } else if (tokens.length >= 3) {
                            shipsSpec = tokens[1];
                            targetSpec = tokens.slice(2).join(' ');
                        } else {
                            return { error: 'ATTACK requires a target' };
                        }
                    } else {
                        shipsSpec = tokens.slice(1, targetIdx).join(' ');
                        if (!shipsSpec) shipsSpec = 'selected';
                        targetSpec = tokens.slice(targetIdx + 1).join(' ');
                    }

                    if (shipsSpec.toLowerCase() === 'cursor' || shipsSpec.toLowerCase() === 'crosshair') {
                        const targetObj = findShip(targetSpec);
                        if (targetObj) {
                            return { cmd: 'CURSOR', target: targetObj.position.clone() };
                        } else {
                            const pos = parsePosition(targetSpec);
                            if (pos) return { cmd: 'CURSOR', target: pos };
                            return { error: `Invalid cursor target: "${targetSpec}"` };
                        }
                    }

                    const ships = findShips(shipsSpec);
                    
                    if (ships.length === 0) return { error: `No ships found: "${shipsSpec}"` };

                    let targetObj = findShip(targetSpec);

                    if (!targetObj) {
                        const pos = parsePosition(targetSpec);
                        if (pos) {
                            let nearestEnemy = null;
                            let minDist = Infinity;
                            spaceships.forEach(s => {
                                if (s.userData.team === 'enemy') {
                                    const d = s.position.distanceTo(pos);
                                    if (d < minDist) {
                                        minDist = d;
                                        nearestEnemy = s;
                                    }
                                }
                            });
                            if (nearestEnemy) {
                                targetObj = nearestEnemy;
                            }
                        } else {
                            // If target is just "enemy" or "nearest_enemy", or a typo like "enmy"
                            if (targetSpec.match(/en.*m/i) || targetSpec.match(/hostile/i) || targetSpec.match(/target/i) || targetSpec.match(/all/i)) {
                                // Find nearest enemy to the selected ships
                                const ref = ships.length > 0 ? ships[0].position : (selectedObjects.length > 0 ? selectedObjects[0].position : cameraPosition);
                                let nearestEnemy = null;
                                let minDist = Infinity;
                                spaceships.forEach(s => {
                                    if (s.userData.team === 'enemy') {
                                        const d = s.position.distanceTo(ref);
                                        if (d < minDist) {
                                            minDist = d;
                                            nearestEnemy = s;
                                        }
                                    }
                                });
                                if (nearestEnemy) {
                                    targetObj = nearestEnemy;
                                }
                            }
                        }
                    }

                    if (!targetObj) return { error: `Invalid or missing attack target: "${targetSpec}"` };
                    
                    return { cmd: 'ATTACK', ships, target: targetObj };
                }
                case 'CURSOR': {
                    const posStr = tokens.slice(1).join(' ').trim();
                    if (!posStr) return { error: 'CURSOR requires a position or object' };
                    const pos = parsePosition(posStr);
                    if (!pos) return { error: `Invalid position: "${posStr}"` };
                    return { cmd: 'CURSOR', target: pos };
                }
                default:
                    return { error: `Unknown command: ${cmd}` };
            }
        }
        
        function executeDSL(parsed) {
            if (parsed.error) {
                addChatMsg(parsed.error, 'error');
                return;
            }

            if (parsed.cmd === 'CURSOR') {
                const target = parsed.target;
                const len = target.length();
                cursorRadius = Math.max(0.001, Math.min(WORLD_RADIUS, len));
                if (len > 0.0001) {
                    cursorDir.copy(target).normalize();
                    // Generate a valid 'up' vector for the cursor to prevent pole lock issues when the user takes over
                    const worldUp = new THREE.Vector3(0, 1, 0);
                    if (Math.abs(cursorDir.dot(worldUp)) > 0.99) {
                        cursorUp.set(1, 0, 0);
                    } else {
                        const right = new THREE.Vector3().crossVectors(cursorDir, worldUp).normalize();
                        cursorUp.crossVectors(right, cursorDir).normalize();
                    }
                } else {
                    cursorDir.set(0, 0, 1);
                    cursorUp.set(0, 1, 0);
                }
                cursorPos3D.copy(cursorDir).multiplyScalar(cursorRadius);
                addChatMsg(`Cursor moved to [${(target.x * KM_PER_UNIT).toFixed(1)},${(target.y * KM_PER_UNIT).toFixed(1)},${(target.z * KM_PER_UNIT).toFixed(1)}] km`);
                return;
            }
            
            parsed.ships.forEach((ship, i) => {
                const data = ship.userData;
                if (data.team === 'enemy') return; // Cannot command enemy ships
                
                switch (parsed.cmd) {
                    case 'MOVE':
                        data.behavior = {
                            type: 'move',
                            target: parsed.target.clone()
                        };
                        break;
                    case 'STOP':
                        data.behavior = {
                            type: 'brake'
                        };
                        break;
                    case 'ORBIT': {
                        // Find nearest asteroid to the specified center position
                        let nearestAst = null;
                        let nearestDist = Infinity;
                        asteroids.forEach(a => {
                            const d = a.position.distanceTo(parsed.center);
                            if (d < nearestDist) { nearestDist = d; nearestAst = a; }
                        });
                        if (!nearestAst) {
                            addChatMsg('No asteroids found to orbit.', 'system');
                            break;
                        }
                        // Default radius: slightly larger than asteroid's average scale
                        const avgScale = (nearestAst.scale.x + nearestAst.scale.y + nearestAst.scale.z) / 3;
                        const orbitRadius = parsed.radius || (avgScale * 1.2);
                        data.behavior = {
                            type: 'orbit',
                            body: nearestAst,
                            radius: orbitRadius,
                            phase: 'approach',  // approach → inject → freefall
                        };
                        const bodyName = nearestAst.userData.name || 'asteroid';
                        addChatMsg(`${data.name}: orbital injection to ${bodyName} at r=${Math.round(orbitRadius)}`, 'system');
                        break;
                    }
                    case 'PATROL':
                        data.behavior = {
                            type: 'patrol',
                            pointA: parsed.pointA.clone(),
                            pointB: parsed.pointB.clone(),
                            goingToB: true
                        };
                        break;
                    case 'FOLLOW':
                        data.behavior = {
                            type: 'follow',
                            targetShip: parsed.targetShip || null,
                            followCamera: parsed.followCamera || false,
                            followCrosshair: parsed.followCrosshair || false,
                            distance: parsed.distance
                        };
                        break;
                    case 'ATTACK':
                        data.behavior = {
                            type: 'attack',
                            target: parsed.target
                        };
                        break;
                }
            });
            
            addChatMsg(`Executing ${parsed.cmd} for ${parsed.ships.length} ship${parsed.ships.length > 1 ? 's' : ''}`);
        }
        
        // ===== BEHAVIOR ENGINE (runs per frame per ship) =====
        // Behaviors set targetVelocity + isAccelerating/isBraking flags.
        // The physics engine in updateSpaceships() handles actual acceleration,
        // fuel consumption, and engine particle effects.
        
        // ── Formation offset helper ──
        // When multiple ships converge on the same target, spread them out
        // in a disc perpendicular to the approach direction.
        function computeFormationOffset(ship, targetPos) {
            const FORMATION_SPACING = 6; // units between ships in formation
            const TARGET_MATCH_THRESHOLD = 15; // consider same target if within this distance
            
            // Find other ships heading to a similar target
            const peers = [];
            let myIndex = 0;
            for (const other of spaceships) {
                if (other === ship) continue;
                const ob = other.userData.behavior;
                if (!ob) continue;
                let otherTarget = null;
                if (ob.type === 'move') otherTarget = ob.target;
                else if (ob.type === 'follow') {
                    if (ob.followCrosshair) otherTarget = cursorPos3D;
                    else if (ob.followCamera) otherTarget = cameraPosition;
                    else if (ob.targetShip) otherTarget = ob.targetShip.position;
                }
                if (otherTarget && otherTarget.distanceTo(targetPos) < TARGET_MATCH_THRESHOLD) {
                    peers.push(other);
                }
            }
            if (peers.length === 0) return targetPos.clone();
            
            // Sort peers + self by name for consistent ordering
            const allShips = [ship, ...peers].sort((a, b) =>
                a.userData.name.localeCompare(b.userData.name));
            myIndex = allShips.indexOf(ship);
            const total = allShips.length;
            
            // Spread in a disc perpendicular to the approach direction
            const approach = targetPos.clone().sub(ship.position);
            if (approach.length() < 0.1) return targetPos.clone();
            approach.normalize();
            
            // Build perpendicular axes
            const up = new THREE.Vector3(0, 1, 0);
            let right = new THREE.Vector3().crossVectors(approach, up);
            if (right.length() < 0.01) right.crossVectors(approach, new THREE.Vector3(1, 0, 0));
            right.normalize();
            const perpUp = new THREE.Vector3().crossVectors(right, approach).normalize();
            
            // Arrange in a circle (or line for 2)
            if (total <= 1) return targetPos.clone();
            const angle = (myIndex / total) * Math.PI * 2;
            const radius = FORMATION_SPACING * Math.ceil(total / 6); // grow radius for larger groups
            const offset = right.clone().multiplyScalar(Math.cos(angle) * radius)
                .add(perpUp.clone().multiplyScalar(Math.sin(angle) * radius));
            return targetPos.clone().add(offset);
        }
        
        function updateShipBehaviors() {
            const BEHAVIOR_SPEED = 0.15;
            const ARRIVAL_THRESHOLD = 2;
            const EFFECTIVE_BRAKE = THRUST;  // braking is same engine as acceleration
            
            // First process AI for ships that don't have user orders
            spaceships.forEach(ship => {
                const data = ship.userData;
                // If ship doesn't have a specific manual order or is an enemy, let it fight
                if (!data.behavior || data.behavior.type === 'orbit' || data.behavior.type === 'idle' || (data.team === 'enemy' && data.behavior.type !== 'landed')) {
                    // Find closest enemy
                    let nearestEnemy = null;
                    let nearestDist = Infinity;
                    
                    spaceships.forEach(otherShip => {
                        if (otherShip.userData.team !== data.team) {
                            const d = ship.position.distanceTo(otherShip.position);
                            if (d < nearestDist) {
                                nearestDist = d;
                                nearestEnemy = otherShip;
                            }
                        }
                    });
                    
                    if (nearestEnemy) {
                        const distKm = nearestDist * KM_PER_UNIT;
                        
                        // If enemy is within 200km (~2000 units), attack
                        if (distKm < 200) {
                            data.behavior = {
                                type: 'attack',
                                target: nearestEnemy
                            };
                        } else if (data.team === 'enemy' && !data.behavior) {
                            // Enemy ships naturally drift towards players if too far
                            data.behavior = {
                                type: 'move',
                                target: nearestEnemy.position.clone()
                            };
                        }
                    }
                }
            });
            
            spaceships.forEach(ship => {
                const data = ship.userData;
                const speed = data.velocity.length();
                const fuelPct = data.fuel / data.maxFuel;
                
                // ── AUTONOMOUS: fuel self-preservation ──
                // Critical fuel (< 5%): cut all thrust, drift only
                if (fuelPct < 0.05 && data.fuel > 0) {
                    if (data.behavior && data.behavior.type !== 'fuelCritical' && data.behavior.type !== 'landed') {
                        shipReport(data, 'fuelCritical', 'FUEL CRITICAL — cutting engines, drifting');
                        data.behavior = { type: 'fuelCritical' };
                    }
                }
                // Low fuel (< 20%): seek orbit around nearest heavy asteroid (mass >= 1e9)
                else if (fuelPct < 0.20 && data.behavior && data.behavior.type !== 'orbit' && data.behavior.type !== 'fuelSeekOrbit' && data.behavior.type !== 'brake' && data.behavior.type !== 'landed') {
                    // Find nearest heavy asteroid
                    let nearestHeavy = null, nearestDist = Infinity;
                    asteroids.forEach(a => {
                        if (a.userData.mass < 1e9) return;
                        const d = a.position.distanceTo(ship.position);
                        if (d < nearestDist) { nearestDist = d; nearestHeavy = a; }
                    });
                    if (nearestHeavy) {
                        const avgScale = (nearestHeavy.scale.x + nearestHeavy.scale.y + nearestHeavy.scale.z) / 3;
                        const orbitRadius = avgScale * 1.2;
                        const astName = nearestHeavy.userData.name || 'massive asteroid';
                        shipReport(data, 'fuelLow', `Fuel at ${Math.round(fuelPct * 100)}% — breaking off, seeking orbit around ${astName}`);
                        data.behavior = {
                            type: 'orbit',
                            body: nearestHeavy,
                            radius: orbitRadius,
                            phase: 'approach',
                            _autoFuel: true  // flag: this was an autonomous decision
                        };
                    }
                }
                
                // ── AUTONOMOUS: predictive collision avoidance ──
                if (speed > 0.02 && data.behavior && data.behavior.type !== 'fuelCritical') {
                    const lookAhead = Math.max(30, speed * 60); // ~1 second of travel at 60fps, min 30 units
                    const futurePos = ship.position.clone().add(data.velocity.clone().normalize().multiplyScalar(lookAhead));
                    for (const asteroid of asteroids) {
                        // Check if future position is inside asteroid
                        const toFuture = futurePos.clone().sub(asteroid.position);
                        const cs = asteroid.userData.collisionSize;
                        const maxScale = cs
                            ? Math.max(cs.x, cs.y, cs.z)
                            : Math.max(asteroid.scale.x, asteroid.scale.y, asteroid.scale.z);
                        const dangerRadius = maxScale + 5; // 5 units safety margin
                        if (toFuture.length() < dangerRadius) {
                            // We're heading into an asteroid — compute avoidance direction
                            const toAsteroid = asteroid.position.clone().sub(ship.position);
                            const forward = data.velocity.clone().normalize();
                            // Perpendicular avoidance: component of toAsteroid perpendicular to velocity
                            const avoidDir = toAsteroid.clone().sub(forward.clone().multiplyScalar(toAsteroid.dot(forward)));
                            if (avoidDir.length() > 0.01) {
                                avoidDir.normalize().negate(); // steer AWAY from asteroid
                            } else {
                                avoidDir.set(0, 1, 0); // edge case: head-on, dodge upward
                            }
                            // Blend avoidance into target velocity
                            const avoidVel = data.velocity.clone().add(avoidDir.multiplyScalar(THRUST * 5));
                            avoidVel.normalize().multiplyScalar(speed); // maintain current speed
                            data.targetVelocity.copy(avoidVel);
                            data.isAccelerating = true;
                            const astName = asteroid.userData.name || 'asteroid';
                            shipReport(data, 'avoidance', `Collision course — evading ${astName}`);
                            break; // handle one threat at a time
                        }
                    }
                }
                
                // ── AUTONOMOUS: ship-to-ship separation ──
                // Always-on repulsion to prevent clumping. Ships steer away from each other
                // when closer than SEPARATION_RADIUS. Stronger as distance decreases.
                const SEPARATION_RADIUS = 8;   // units — ships are ~3 units long
                const SEPARATION_FORCE = THRUST * 3;
                if (data.behavior && data.behavior.type !== 'fuelCritical') {
                    const sepAccum = new THREE.Vector3();
                    let sepCount = 0;
                    for (const other of spaceships) {
                        if (other === ship) continue;
                        const toSelf = ship.position.clone().sub(other.position);
                        const d = toSelf.length();
                        if (d < SEPARATION_RADIUS && d > 0.01) {
                            // Inverse-linear repulsion: stronger when closer
                            const strength = (SEPARATION_RADIUS - d) / SEPARATION_RADIUS;
                            sepAccum.add(toSelf.normalize().multiplyScalar(strength));
                            sepCount++;
                        }
                    }
                    if (sepCount > 0) {
                        sepAccum.normalize().multiplyScalar(SEPARATION_FORCE);
                        // Blend separation into current target velocity
                        data.targetVelocity.add(sepAccum);
                        data.isAccelerating = true;
                    }
                }
                
                if (!data.behavior) return;
                
                const b = data.behavior;
                // Distance needed to brake from current speed to zero
                const brakeDist = speed > 0.01 ? (speed * speed) / (2 * EFFECTIVE_BRAKE) + ARRIVAL_THRESHOLD : 0;
                
                switch (b.type) {
                    case 'fuelCritical': {
                        // Do nothing — no thrust, just drift. Physics preserves velocity.
                        break;
                    }
                    case 'move': {
                        const formationTarget = computeFormationOffset(ship, b.target);
                        const dir = formationTarget.clone().sub(ship.position);
                        const dist = dir.length();
                        if (dist < ARRIVAL_THRESHOLD && speed < 0.02) {
                            // Arrived — physics brought us to rest, clear behavior
                            data.behavior = null;
                        } else if (dist > brakeDist) {
                            // Accelerate toward target
                            data.targetVelocity.copy(dir.normalize().multiplyScalar(BEHAVIOR_SPEED));
                            data.isAccelerating = true;
                        } else {
                            // Close enough — brake to stop
                            data.isBraking = true;
                        }
                        break;
                    }
                    case 'brake': {
                        if (speed < 0.02) {
                            // Physics brought us to rest, clear behavior
                            data.behavior = null;
                        } else {
                            data.isBraking = true;
                        }
                        break;
                    }
                    case 'orbit': {
                        // Real orbital injection: approach target orbit altitude,
                        // thrust to reach circular orbit velocity, then coast on gravity.
                        const G_eff = G_GAME * gravityMultiplier;
                        const toBody = b.body.position.clone().sub(ship.position);
                        const distToBody = toBody.length();
                        const orbitR = b.radius;
                        
                        if (b.phase === 'approach') {
                            // Fly toward a point at orbit radius from the body
                            // Pick approach point: closest point on orbit circle to current position
                            const radialDir = ship.position.clone().sub(b.body.position);
                            radialDir.y = 0; // keep orbit in XZ plane
                            if (radialDir.length() < 0.1) radialDir.set(1, 0, 0);
                            radialDir.normalize();
                            const approachTarget = b.body.position.clone().add(radialDir.multiplyScalar(orbitR));
                            const toTarget = approachTarget.clone().sub(ship.position);
                            const distToTarget = toTarget.length();
                            
                            if (distToTarget < ARRIVAL_THRESHOLD + brakeDist && distToTarget < 5) {
                                // Close enough to orbit altitude — switch to injection
                                b.phase = 'inject';
                            } else if (distToTarget < brakeDist + 2) {
                                // Need to brake to arrive at orbit altitude
                                data.isBraking = true;
                            } else {
                                // Accelerate toward orbit altitude
                                data.targetVelocity.copy(toTarget.normalize().multiplyScalar(BEHAVIOR_SPEED));
                                data.isAccelerating = true;
                            }
                        } else if (b.phase === 'inject') {
                            // Compute circular orbit velocity: v = sqrt(G_eff * M / r)
                            const orbitalSpeed = Math.sqrt(G_eff * b.body.userData.mass / distToBody);
                            
                            // Tangent direction: perpendicular to radial, in XZ plane
                            const radial = ship.position.clone().sub(b.body.position).normalize();
                            const tangent = new THREE.Vector3(-radial.z, 0, radial.x); // 90° in XZ
                            const targetVel = tangent.multiplyScalar(orbitalSpeed);
                            
                            // How close is our velocity to the target orbital velocity?
                            const velError = targetVel.clone().sub(data.velocity);
                            
                            if (velError.length() < 0.005 || orbitalSpeed < 0.005) {
                                // Close enough — cut engines, enter freefall
                                b.phase = 'freefall';
                            } else if (orbitalSpeed > MAX_SPEED) {
                                // Orbital speed exceeds our max — can't achieve stable orbit here
                                // Fall through to freefall anyway, we'll be in an elliptical orbit
                                b.phase = 'freefall';
                            } else {
                                // Thrust toward orbital velocity
                                data.targetVelocity.copy(targetVel);
                                data.isAccelerating = true;
                            }
                        } else {
                            // freefall — engines off, gravity does the work
                            // Just monitor: if we drift too far, re-inject
                            const driftRatio = distToBody / orbitR;
                            if (driftRatio > 2.0 || driftRatio < 0.3) {
                                // Orbit has decayed or escaped — re-approach
                                b.phase = 'approach';
                            }
                            // Otherwise: do nothing. Pure gravity orbit.
                        }
                        break;
                    }
                    case 'patrol': {
                        const target = b.goingToB ? b.pointB : b.pointA;
                        const dir = target.clone().sub(ship.position);
                        const dist = dir.length();
                        if (dist < ARRIVAL_THRESHOLD && speed < 0.02) {
                            // At waypoint, flip direction
                            b.goingToB = !b.goingToB;
                        } else if (dist > brakeDist) {
                            // Accelerate toward waypoint
                            data.targetVelocity.copy(dir.normalize().multiplyScalar(BEHAVIOR_SPEED));
                            data.isAccelerating = true;
                        } else {
                            // Approaching waypoint — brake
                            data.isBraking = true;
                        }
                        break;
                    }
                    case 'follow': {
                        let targetPos;
                        if (b.followCrosshair) {
                            targetPos = cursorPos3D.clone();
                        } else if (b.followCamera) {
                            targetPos = cameraPosition.clone();
                        } else if (b.targetShip) {
                            targetPos = b.targetShip.position.clone();
                        } else {
                            data.behavior = null; break;
                        }
                        const formationTarget = computeFormationOffset(ship, targetPos);
                        const dir = formationTarget.clone().sub(ship.position);
                        const dist = dir.length();
                        if (dist > b.distance + brakeDist) {
                            // Too far — accelerate toward target
                            data.targetVelocity.copy(dir.normalize().multiplyScalar(BEHAVIOR_SPEED));
                            data.isAccelerating = true;
                        } else if (dist < b.distance && speed > 0.02) {
                            // Within distance but still moving — brake
                            data.isBraking = true;
                        }
                        // else: within distance and slow enough, coast
                        break;
                    }
                    case 'attack': {
                        if (!b.target || !b.target.parent) {
                            data.behavior = null; // target destroyed
                            break;
                        }
                        
                        const toTarget = b.target.position.clone().sub(ship.position);
                        const dist = toTarget.length();
                        
                        // Move to intercept (stay at ~50 units distance, which is ~5km)
                        if (dist > 50) {
                            data.targetVelocity.copy(toTarget.normalize().multiplyScalar(BEHAVIOR_SPEED));
                            data.isAccelerating = true;
                        } else if (dist < 30) {
                            // Too close, back away
                            data.targetVelocity.copy(toTarget.normalize().negate().multiplyScalar(BEHAVIOR_SPEED * 0.5));
                            data.isAccelerating = true;
                        } else {
                            data.isBraking = true; // Stay in range
                        }
                        
                        // Fire logic - must be within 80 units (8km) to fire
                        if (dist < 80 && (!b.lastFired || Date.now() - b.lastFired > 1000)) { // Fire every 1s
                            if (data.weapons >= 8) {
                                // Face target
                                ship.lookAt(b.target.position);
                                
                                // Actually fire
                                fireLaser(ship, b.target);
                                b.lastFired = Date.now();
                            }
                        }
                        break;
                    }
                    case 'landed': {
                        // Ship is on asteroid surface — do nothing here.
                        // Physics engine handles surface attachment.
                        // Any new command (move/orbit/etc.) will overwrite behavior → liftoff.
                        break;
                    }
                }
            });
        }
        
        // ===== LLM INTEGRATION =====
        
        const BACKEND_URL = 'https://spaceships.uriva.deno.net';
        
        function buildContext() {
            // Build a context string describing current game state
            let ctx = '';
            
            // Selected objects
            if (selectedObjects.length > 0) {
                const selNames = selectedObjects.map(o => {
                    if (o.userData.type === 'spaceship') return o.userData.name;
                    if (o.userData.name) return o.userData.name;
                    return 'Asteroid at [' + Math.round(o.position.x * KM_PER_UNIT) + ',' + Math.round(o.position.y * KM_PER_UNIT) + ',' + Math.round(o.position.z * KM_PER_UNIT) + ']';
                });
                ctx += `Currently selected: ${selNames.join(', ')}. `;
            } else {
                ctx += 'Nothing currently selected. ';
            }
            
            // Camera position
            ctx += `Player at [${Math.round(cursorPos3D.x * KM_PER_UNIT)},${Math.round(cursorPos3D.y * KM_PER_UNIT)},${Math.round(cursorPos3D.z * KM_PER_UNIT)}]. `;
            
            // Ship positions, states, speed, and bearing
            const shipStates = spaceships.map(s => {
                const p = s.position;
                const d = s.userData;
                const b = d.behavior ? d.behavior.type : 'idle';
                const landedOn = (d.behavior && d.behavior.type === 'landed' && d.behavior.asteroid)
                    ? ` on ${d.behavior.asteroid.userData.name || 'asteroid'}` : '';
                const spd = d.velocity.length();
                const spdKmS = Math.round(spd * KM_PER_UNIT * 60); // km/s assuming 60fps
                let bearing = '';
                if (spd > 0.01) {
                    const v = d.velocity;
                    // Compass bearing from velocity direction in XZ plane (0°=+Z/North, 90°=+X/East)
                    const deg = ((Math.atan2(v.x, v.z) * 180 / Math.PI) + 360) % 360;
                    bearing = ` hdg ${Math.round(deg)}°`;
                }
                const fuel = `${Math.round(d.fuel)}/${MAX_FUEL}t`;
                return `${d.name} [${Math.round(p.x * KM_PER_UNIT)},${Math.round(p.y * KM_PER_UNIT)},${Math.round(p.z * KM_PER_UNIT)}] ${b}${landedOn} ${spdKmS}km/s${bearing} fuel:${fuel}`;
            });
            ctx += `Ships: ${shipStates.join('; ')}. `;
            
            // Asteroid data — include all asteroids with position, size, mass, and name
            const fmtMass = (m) => m >= 1e12 ? (m/1e12).toFixed(1)+'Tt' :
                                   m >= 1e9  ? (m/1e9).toFixed(1)+'Gt' :
                                   m >= 1e6  ? (m/1e6).toFixed(1)+'Mt' :
                                   m >= 1000 ? (m/1000).toFixed(1)+'kt' : Math.round(m)+'t';
            const astData = asteroids.map(a => {
                const p = a.position;
                const avgScale = (a.scale.x + a.scale.y + a.scale.z) / 3;
                const sizeKm = Math.max(1, Math.round(avgScale * KM_PER_UNIT));
                const label = a.userData.name || ('asteroid@[' + Math.round(p.x * KM_PER_UNIT)+','+Math.round(p.y * KM_PER_UNIT)+','+Math.round(p.z * KM_PER_UNIT)+']');
                // Rotation: compute tumble rate as deg/s (rotationSpeed is rad/frame at 60fps)
                const rs = a.userData.rotationSpeed;
                const tumbleRate = rs ? Math.sqrt(rs.x*rs.x + rs.y*rs.y + rs.z*rs.z) * 60 * (180/Math.PI) : 0;
                const tumbleStr = tumbleRate > 0.1 ? ` tumbling ${tumbleRate.toFixed(1)}°/s` : ' stable';
                return `${label} [${Math.round(p.x * KM_PER_UNIT)},${Math.round(p.y * KM_PER_UNIT)},${Math.round(p.z * KM_PER_UNIT)}] radius~${sizeKm}km ${fmtMass(a.userData.mass)}${tumbleStr}`;
            });
            ctx += `Asteroids (${asteroids.length}): ${astData.join('; ')}`;
            
            return ctx;
        }
        
        async function queryLLM(userMessage) {
            try {
                const context = buildContext();
                const fullMessage = `[CONTEXT: ${context}]\n\nUser command: ${userMessage}`;
                
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: fullMessage })
                });
                
                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    return 'MSG: Backend error: ' + (err.error || response.statusText);
                }
                
                const data = await response.json();
                return data.dsl || 'MSG: Empty response from computer';
            } catch (e) {
                return 'MSG: Connection error: ' + e.message;
            }
        }
        
        async function submitChat() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;
            
            input.value = '';
            addChatMsg(text, 'user');
            
            // Check if it's a direct DSL command (starts with a known command)
            const firstWord = text.split(/\s+/)[0].toUpperCase();
            const DSL_COMMANDS = ['MOVE', 'STOP', 'ORBIT', 'PATROL', 'FOLLOW', 'ATTACK', 'CURSOR'];
            
            if (DSL_COMMANDS.includes(firstWord)) {
                // Direct DSL input
                addChatDSL(text);
                const parsed = parseDSL(text);
                executeDSL(parsed);
            } else {
                // Natural language - send to LLM with retry on errors
                await processNaturalLanguage(text, 0);
            }
        }
        
        async function processNaturalLanguage(text, retryCount) {
            const MAX_RETRIES = 2;
            
            addChatMsg('Processing...', 'computer');
            const dslResponse = await queryLLM(text);
            
            // Remove "Processing..." message
            const log = document.getElementById('chat-log');
            log.removeChild(log.lastChild);
            
            // Handle response — coalesce multi-line MSG blocks
            const rawLines = dslResponse.split('\n').filter(l => l.trim());
            const errors = [];
            let successCount = 0;
            
            // Pre-process: when a line starts with MSG:, join all following
            // non-command lines into that same message (LLM often returns
            // multi-line status reports as MSG: followed by plain-text lines).
            const lines = [];
            for (let i = 0; i < rawLines.length; i++) {
                const l = rawLines[i];
                if (l.startsWith('MSG:')) {
                    // Collect continuation lines (lines that don't look like a DSL command)
                    let msg = l.substring(4).trim();
                    while (i + 1 < rawLines.length) {
                        const next = rawLines[i + 1].trim();
                        // A DSL command starts with a known keyword
                        const firstWord = next.split(/\s+/)[0].toUpperCase();
                        const DSL_CMDS = ['MOVE','STOP','ORBIT','PATROL','FOLLOW','ATTACK','CURSOR','MSG:'];
                        if (DSL_CMDS.includes(firstWord) || next.startsWith('MSG:')) break;
                        msg += '\n' + next;
                        i++;
                    }
                    lines.push('MSG:' + msg);
                } else {
                    lines.push(l);
                }
            }
            
            for (const line of lines) {
                if (line.startsWith('MSG:')) {
                    addChatMsg(line.substring(4).trim(), 'computer');
                } else {
                    addChatDSL(line);
                    const parsed = parseDSL(line);
                    if (parsed && parsed.error) {
                        errors.push({ line, error: parsed.error });
                        addChatMsg(parsed.error, 'error');
                    } else if (parsed) {
                        executeDSL(parsed);
                        successCount++;
                    }
                }
            }
            
            // If there were parse errors and we haven't retried too many times,
            // send the errors back to the LLM for correction
            if (errors.length > 0 && retryCount < MAX_RETRIES) {
                const errorFeedback = `The following DSL commands had errors. Fix them and output ONLY the corrected DSL commands:\n` +
                    errors.map(e => `"${e.line}" -> Error: ${e.error}`).join('\n') +
                    `\n\nOriginal request was: "${text}"`;
                
                addChatMsg('Correcting errors...', 'computer');
                const retryResponse = await queryLLM(errorFeedback);
                
                // Remove "Correcting..." message
                log.removeChild(log.lastChild);
                
                const retryRaw = retryResponse.split('\n').filter(l => l.trim());
                const retryLines = [];
                for (let i = 0; i < retryRaw.length; i++) {
                    const l = retryRaw[i];
                    if (l.startsWith('MSG:')) {
                        let msg = l.substring(4).trim();
                        while (i + 1 < retryRaw.length) {
                            const next = retryRaw[i + 1].trim();
                            const firstWord = next.split(/\s+/)[0].toUpperCase();
                            const DSL_CMDS = ['MOVE','STOP','ORBIT','PATROL','FOLLOW','ATTACK','CURSOR','MSG:'];
                            if (DSL_CMDS.includes(firstWord) || next.startsWith('MSG:')) break;
                            msg += '\n' + next;
                            i++;
                        }
                        retryLines.push('MSG:' + msg);
                    } else {
                        retryLines.push(l);
                    }
                }
                for (const line of retryLines) {
                    if (line.startsWith('MSG:')) {
                        addChatMsg(line.substring(4).trim(), 'computer');
                    } else {
                        addChatDSL(line);
                        const parsed = parseDSL(line);
                        if (parsed && parsed.error) {
                            addChatMsg(parsed.error, 'error');
                        } else if (parsed) {
                            executeDSL(parsed);
                        }
                    }
                }
            }
        }
    </script>
