<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Command - 3D Space Strategy</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='8' fill='%23080818'/%3E%3Cpolygon points='32,8 22,44 32,38 42,44' fill='%2300ccff' opacity='0.9'/%3E%3Cpolygon points='32,38 22,44 18,48 32,44 46,48 42,44' fill='%230088bb' opacity='0.7'/%3E%3Ccircle cx='32' cy='28' r='2' fill='%23fff' opacity='0.9'/%3E%3Ccircle cx='14' cy='14' r='1' fill='%23fff' opacity='0.4'/%3E%3Ccircle cx='50' cy='10' r='1' fill='%23fff' opacity='0.3'/%3E%3Ccircle cx='52' cy='50' r='1' fill='%23fff' opacity='0.5'/%3E%3Ccircle cx='10' cy='54' r='1' fill='%23fff' opacity='0.3'/%3E%3C/svg%3E">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            overflow: hidden;
            background: #0a0a14;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }
        
        /* CRT Monitor Effect */
        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 100;
            background: 
                linear-gradient(
                    rgba(18, 16, 16, 0) 50%,
                    rgba(0, 0, 0, 0.1) 50%
                );
            background-size: 100% 4px;
            box-shadow: 
                inset 0 0 100px rgba(0,0,0,0.9),
                inset 0 0 20px rgba(0,255,255,0.1);
        }
        
        .crt-overlay::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            animation: scanlines 0.1s linear infinite;
        }
        
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                ellipse at center,
                transparent 0%,
                transparent 60%,
                rgba(0,0,0,0.4) 100%
            );
        }
        
        @keyframes scanlines {
            0% { transform: translateY(0); }
            100% { transform: translateY(2px); }
        }
        
        /* UI Panel */
        .hud-panel {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 50;
            padding: 20px 30px;
            background: rgba(10, 12, 20, 0.85);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 8px;
            backdrop-filter: blur(10px);
            box-shadow: 
                0 0 30px rgba(0, 255, 255, 0.2),
                inset 0 0 20px rgba(0, 255, 255, 0.05);
        }
        
        .mode-btn {
            padding: 12px 24px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border: 2px solid rgba(0, 255, 255, 0.3);
            background: transparent;
            color: rgba(0, 255, 255, 0.6);
            border-radius: 4px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .mode-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(0, 255, 255, 0.3),
                transparent
            );
            transition: left 0.5s ease;
        }
        
        .mode-btn:hover::before {
            left: 100%;
        }
        
        .mode-btn:hover {
            border-color: rgba(0, 255, 255, 0.8);
            color: rgba(0, 255, 255, 0.9);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }
        
        .mode-btn.active {
            border-color: #00ffff;
            color: #00ffff;
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 
                0 0 30px rgba(0, 255, 255, 0.4),
                inset 0 0 20px rgba(0, 255, 255, 0.1);
        }
        
        .mode-btn.attack {
            border-color: rgba(255, 0, 80, 0.3);
            color: rgba(255, 0, 80, 0.6);
        }
        
        .mode-btn.attack:hover {
            border-color: rgba(255, 0, 80, 0.8);
            color: rgba(255, 0, 80, 0.9);
            box-shadow: 0 0 20px rgba(255, 0, 80, 0.3);
        }
        
        .mode-btn.attack.active {
            border-color: #ff0050;
            color: #ff0050;
            background: rgba(255, 0, 80, 0.1);
            box-shadow: 
                0 0 30px rgba(255, 0, 80, 0.4),
                inset 0 0 20px rgba(255, 0, 80, 0.1);
        }
        
        /* Top Status Display */
        .status-display {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 50;
            padding: 15px 25px;
            background: rgba(10, 12, 20, 0.85);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 8px;
            backdrop-filter: blur(10px);
            font-family: 'Orbitron', sans-serif;
            min-width: 250px;
        }
        
        .status-value {
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
            line-height: 1.6;
        }
        
        /* Ship Selector HUD */
        .ship-hud {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        .ship-selector {
            display: flex;
            gap: 12px;
        }
        
        .ship-dot {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid rgba(0, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 14px;
            color: rgba(0, 255, 255, 0.6);
            background: rgba(10, 12, 20, 0.6);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .ship-dot:hover {
            border-color: rgba(0, 255, 255, 0.8);
            color: rgba(0, 255, 255, 0.9);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }
        
        .ship-dot.active {
            border-color: #00ffff;
            color: #00ffff;
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }
        
        .ship-dot.inactive {
            opacity: 0.4;
        }
        
        .ship-name {
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .ship-name.no-ship {
            color: rgba(255, 255, 255, 0.3);
        }
        
        /* Selection Ring */
        .selection-indicator {
            position: absolute;
            pointer-events: none;
            z-index: 40;
            display: none;
        }
        
        /* Box Selection */
        .selection-box {
            position: fixed;
            border: 1px solid rgba(68, 170, 255, 0.8);
            background: rgba(68, 170, 255, 0.1);
            pointer-events: none;
            z-index: 45;
            display: none;
        }
        
        .selection-ring {
            width: 60px;
            height: 60px;
            border: 2px solid #00ffff;
            border-radius: 50%;
            box-shadow: 
                0 0 20px rgba(0, 255, 255, 0.5),
                inset 0 0 20px rgba(0, 255, 255, 0.1);
        }
        
        /* Target Marker */
        .target-marker {
            position: absolute;
            pointer-events: none;
            z-index: 39;
            display: none;
        }
        
        .target-cross {
            width: 40px;
            height: 40px;
            position: relative;
        }
        
        .target-cross::before,
        .target-cross::after {
            content: '';
            position: absolute;
            background: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.8);
        }
        
        .target-cross::before {
            width: 2px;
            height: 100%;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .target-cross::after {
            width: 100%;
            height: 2px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .target-marker.attack .target-cross::before,
        .target-marker.attack .target-cross::after {
            background: #ff0050;
            box-shadow: 0 0 10px rgba(255, 0, 80, 0.8);
        }
        
        /* Instructions */
        .instructions {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 50;
            padding: 20px 25px;
            background: rgba(10, 12, 20, 0.85);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 8px;
            backdrop-filter: blur(10px);
            max-width: 280px;
        }
        
        .instructions h3 {
            font-family: 'Orbitron', sans-serif;
            color: #00ffff;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        
        .instructions p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 8px;
        }
        
        .instructions .scroll {
            color: #ffaa00;
            font-size: 12px;
            margin-top: 12px;
            padding-top: 8px;
            border-top: 1px solid rgba(0,255,255,0.2);
        }
        
        .instructions .key {
            color: #00ffff;
            font-weight: bold;
        }
        
        /* Laser Effect */
        .laser-blast {
            position: absolute;
            pointer-events: none;
            z-index: 35;
        }
        
        .laser-line {
            height: 3px;
            background: linear-gradient(
                90deg,
                rgba(255, 0, 80, 1),
                rgba(255, 100, 150, 0.8),
                transparent
            );
            box-shadow: 0 0 20px rgba(255, 0, 80, 0.8);
            transform-origin: left center;
            animation: laser-fade 0.3s ease-out forwards;
        }
        
        @keyframes laser-fade {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }
        
        /* Starfleet Computer Chat Panel */
        .chat-panel {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 500px;
            max-height: 400px;
            z-index: 50;
            background: rgba(10, 12, 20, 0.92);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 8px;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            font-family: 'Share Tech Mono', monospace;
            user-select: text; /* Allow text selection */
        }
        
        .chat-header {
            padding: 8px 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            letter-spacing: 2px;
            color: #00ffff;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            text-transform: uppercase;
        }
        
        .chat-log {
            flex: 1;
            overflow-y: auto;
            padding: 10px 15px;
            max-height: 220px;
            font-size: 12px;
            line-height: 1.5;
        }
        
        .chat-log::-webkit-scrollbar {
            width: 4px;
        }
        .chat-log::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 255, 0.3);
            border-radius: 2px;
        }
        
        .chat-msg {
            margin-bottom: 8px;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        
        .chat-msg.user {
            color: rgba(255, 255, 255, 0.9);
        }
        
        .chat-msg.user::before {
            content: '> ';
            color: #00ffff;
        }
        
        .chat-msg.computer {
            color: rgba(0, 255, 200, 0.9);
        }
        
        .chat-msg.computer::before {
            content: 'COMPUTER: ';
            color: rgba(0, 255, 255, 0.6);
            font-size: 10px;
        }
        
        .chat-msg.dsl {
            color: rgba(255, 170, 0, 0.8);
            font-size: 11px;
            padding: 4px 8px;
            background: rgba(255, 170, 0, 0.05);
            border-left: 2px solid rgba(255, 170, 0, 0.3);
            margin: 4px 0;
        }
        
        .chat-msg.error {
            color: rgba(255, 80, 80, 0.9);
        }
        
        .chat-msg.report {
            color: rgba(180, 180, 220, 0.75);
            font-size: 11px;
            padding: 3px 8px;
            border-left: 2px solid rgba(100, 140, 255, 0.25);
            margin: 2px 0;
        }
        
        .chat-input-row {
            display: flex;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
        }
        
        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            padding: 10px 15px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            outline: none;
        }
        
        .chat-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        
        .chat-send {
            background: transparent;
            border: none;
            color: #00ffff;
            padding: 10px 15px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            letter-spacing: 1px;
        }
        
        .chat-send:hover {
            color: #fff;
        }
        /* Toast notifications */
        #toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            padding: 8px 18px;
            border-radius: 4px;
            border: 1px solid;
            opacity: 0;
            animation: toastIn 0.3s ease forwards, toastOut 0.4s ease 2.6s forwards;
            white-space: nowrap;
        }
        .toast.warning {
            background: rgba(255, 80, 0, 0.15);
            border-color: rgba(255, 80, 0, 0.5);
            color: #ff5000;
        }
        .toast.danger {
            background: rgba(255, 0, 0, 0.15);
            border-color: rgba(255, 0, 0, 0.5);
            color: #ff3333;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes toastOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="toast-container"></div>
    <div class="crt-overlay"></div>
    
    <div class="status-display">
        <div class="status-value" id="mode-display">TACTICAL</div>
    </div>

    <div class="ship-hud">
        <div class="ship-selector">
            <div class="ship-dot" id="ship-0">1</div>
            <div class="ship-dot" id="ship-1">2</div>
            <div class="ship-dot" id="ship-2">3</div>
        </div>
        <div class="ship-name" id="ship-name">No Ship Selected</div>
    </div>
    
    <div class="instructions">
        <h3>Command Interface</h3>
        <div style="margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(0,255,255,0.2); font-family: 'Orbitron', sans-serif; font-size: 10px; color: #888; letter-spacing: 1px;">
            <label style="display: flex; justify-content: space-between;">
                <span>SCENE</span>
            </label>
            <select id="scene-selector" style="width: 100%; margin-top: 8px; background: rgba(0,10,20,0.9); color: #00ffff; border: 1px solid rgba(0,255,255,0.3); padding: 4px 8px; font-family: 'Orbitron', sans-serif; font-size: 10px; cursor: pointer; outline: none;">
                <option value="" disabled selected>— Select Scene —</option>
                <option value="team-vs-team">Team vs Team</option>
                <option value="solo-explorer">Solo Explorer</option>
                <option value="lunar-orbit">Lunar Orbit</option>
            </select>
        </div>
        <div style="margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(0,255,255,0.2); font-family: 'Orbitron', sans-serif; font-size: 10px; color: #888; letter-spacing: 1px;">
            <label for="gravity-slider" style="display: flex; justify-content: space-between;">
                <span>GRAVITY MULTIPLIER</span>
                <span id="gravity-label" style="color: #00ffff; font-weight: bold;">1e9</span>
            </label>
            <input type="range" id="gravity-slider" min="0" max="24" step="0.5" value="0"
                style="width: 100%; display: block; margin-top: 8px; accent-color: #00ffff; cursor: pointer;">
        </div>
        <p><span class="key">WASDZX</span> orbit camera</p>
        <p><span class="key">ALT</span> strafe fly</p>
        <p><span class="key">SHIFT</span> move crosshair</p>
        <p><span class="key">SPACE</span> look around</p>
        <p><span class="key">P</span> cycle asteroids</p>
        <p><span class="key">C</span> focus crosshair</p>
        <p><span class="key">F</span> camera follow</p>
        <p><span class="key">/</span> command input</p>
        <p id="mode-label" style="margin-top: 6px; font-size: 12px; color: #aaddff; text-transform: uppercase; letter-spacing: 1px;">Orbit</p>
    </div>
    
    <div id="selection-indicators"></div>
    <div id="proximity-labels" style="position: absolute; top: 0; left: 0; pointer-events: none; z-index: 30;"></div>
    
    <div class="selection-box" id="selection-box"></div>
    
    <div class="target-marker" id="target-marker">
        <div class="target-cross"></div>
    </div>
    
    <div class="chat-panel" id="chat-panel">
        <div class="chat-header">Starfleet Computer</div>
        <div class="chat-log" id="chat-log">
            <div class="chat-msg computer">Systems online. Awaiting orders, Commander.</div>
        </div>
        <div class="chat-input-row">
            <input class="chat-input" id="chat-input" type="text" placeholder="Enter command..." autocomplete="off" />
            <button class="chat-send" onclick="submitChat()">EXEC</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Game State
        let scene, camera, renderer;
        let asteroids = [];
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();
        let starField;
        
        // 3D cursor beams — position stored as spherical coords
        let cursorBeamX, cursorBeamZ, cursorBeamY, cursorOrb, cursorOrbSurface, cursorOrbSurfaceBack, cursorOrbX, cursorOrbZ, cursorOrbY, cursorOrbXn, cursorOrbZn, cursorOrbYn, cursorSurfaceBeam, cursorPos3D = new THREE.Vector3();
        let WORLD_RADIUS = 5000;
        // Cursor direction (unit vector) + local up + radius — no spherical coords, no pole singularity
        let cursorDir = new THREE.Vector3(0, 0, 1).normalize();  // initial direction
        let cursorUp = new THREE.Vector3(0, 1, 0);               // local "up" for cursor — avoids pole lock
        let cursorRadius = 2500;          // half-way out
        let cursorRadialDir = 1;         // +1 or -1, flips at sphere boundary so Z/X wrap through
        let cursorKeyArrows = {};        // direction arrows on primary surface orb
        let cursorKeyArrowsBack = {};   // direction arrows on opposite surface orb
        let cursorKeyArrowsCross = {};  // Z/X arrows on crosshair orb
        
        // Ship data
        let spaceships = [];
        let selectedShipIndex = -1;
        let selectedObject = null;
        let selectedObjects = [];  // Multi-selection array
        let controlGroups = {};    // 1-9 control groups
        
        // Box selection state
        let isBoxSelecting = false;
        let boxStart = { x: 0, y: 0 };
        let boxEnd = { x: 0, y: 0 };
        
        // Scale: 1 game unit = 0.1 km (100m)
        // Ship (~3 units long) = ~300m - close to corvette scale
        // Formation spread (~30 units) = ~3 km
        // Engagement sphere (5000 units) = ~500 km
        const KM_PER_UNIT = 0.1;
        
        // Ship physics (corvette-class, ~200m, 50,000 tonnes)
        const MAX_FUEL = 500;               // 500 tonnes of propellant
        const FUEL_COST_PER_FRAME = 0.4;    // tonnes per thrust frame (accel or brake — same engine)
        const MAX_SPEED = 0.5;              // 0.5 units/frame = ~5 km/s
        const THRUST = 0.015;               // engine thrust as acceleration: ~0.15 km/s² (2 MN on 50kt)
        const SHIP_MASS = 50000;            // tonnes
        const WEAPON_CHARGES = 100;         // battery capacity (shields + weapons)
        const G_REAL = 6.674e-11;           // real gravitational constant (m³/(kg·s²))
        // Convert to game units: gu for distance (1gu=100m), tonnes for mass, frames for time (60fps)
        // G_game = G_real × (1000 kg/t) / (100 m/gu)³ / (60 frames/s)²
        //        = G_real × 1000 / 1e6 / 3600 = G_real × 2.778e-7
        const G_GAME = G_REAL * 1000 / 1e6 / 3600;  // ~1.854e-17 in game units
        let gravityMultiplier = 1;           // ratio of effective G to real G (tunable via HUD)
        const ROCK_DENSITY = 2500;          // kg/m³ — typical stony asteroid
        
        // Scene lighting (set in init, reconfigured per-scene in loadScene)
        let ambientLight, sunLight, blueLight, pinkLight;
        
        // Ship movement
        let targetPosition = null;
        let isMoving = false;
        
        // Camera control
        let cameraPosition = new THREE.Vector3(400, 300, 400);
        let cameraTarget = new THREE.Vector3(0, 0, 0);
        let cameraUpVector = new THREE.Vector3(0, 1, 0);  // Track up vector separately
        // Camera sphere system — same pole-free approach as cursor
        let camOrbitCenter = new THREE.Vector3(0, 0, 0);                 // orbit around this point (updated by strafe/look)
        let camSphereDir = new THREE.Vector3(1, 0.6, 1).normalize();   // direction from orbit center
        let camSphereUp = new THREE.Vector3(0, 1, 0);                   // local up for camera sphere
        let camSphereRadius = new THREE.Vector3(400, 300, 400).length(); // distance from orbit center
        let targetCameraPosition = new THREE.Vector3(40, 30, 40);
        let targetCameraTarget = new THREE.Vector3(0, 0, 0);
        let isCameraTransitioning = false;
        let cameraFollowTarget = null;  // object the camera orbit center tracks each frame
        const CAMERA_LERP_SPEED = 0.04;
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let cameraDistance = 60;
        
        
        
        // Keyboard controls

            // Helper function to generate position far from existing bodies
            function generateSpacedPosition(minRadius, maxRadius, minSeparation) {
                let position, radius, theta, phi;
                let attempts = 0;
                const maxAttempts = 50;
                
                do {
                    radius = minRadius + Math.random() * (maxRadius - minRadius);
                    theta = Math.random() * Math.PI * 2;

                    position = new THREE.Vector3(

                    );
                    
                    // Check if far enough from all existing bodies
                    let farEnough = true;
                    for (const existingPos of celestialPositions) {
                        if (position.distanceTo(existingPos) < minSeparation) {
                            farEnough = false;
                            break;
                        }
                    }
                    
                    if (farEnough) {
                        celestialPositions.push(position);
                        return position;
                    }
                    
                    attempts++;

                // Fallback: just return the last position even if not ideal
                celestialPositions.push(position);
                return position;

            // ── Shader-based stars ──
            // Vertex/fragment shaders for realistic stellar surface
            const starVertexShader = `
                varying vec3 vNormal;
                varying vec3 vPosition;
                varying vec2 vUv;
                void main() {
                    vNormal = normalize(normalMatrix * normal);
                    vPosition = (modelViewMatrix * vec4(position, 1.0)).xyz;
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `;
            const starFragmentShader = `
                uniform float uTime;
                uniform vec3 uColorCore;    // hot center color (white-ish)
                uniform vec3 uColorMid;     // mid-limb color
                uniform vec3 uColorEdge;    // limb/chromosphere color
                varying vec3 vNormal;
                varying vec3 vPosition;
                varying vec2 vUv;

                // Simplex-style 3D noise (compact)
                vec3 mod289(vec3 x){ return x - floor(x * (1.0/289.0)) * 289.0; }
                vec4 mod289(vec4 x){ return x - floor(x * (1.0/289.0)) * 289.0; }
                vec4 permute(vec4 x){ return mod289(((x*34.0)+1.0)*x); }
                vec4 taylorInvSqrt(vec4 r){ return 1.79284291400159 - 0.85373472095314 * r; }
                float snoise(vec3 v){
                    const vec2 C = vec2(1.0/6.0, 1.0/3.0);
                    const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
                    vec3 i = floor(v + dot(v, C.yyy));
                    vec3 x0 = v - i + dot(i, C.xxx);
                    vec3 g = step(x0.yzx, x0.xyz);
                    vec3 l = 1.0 - g;
                    vec3 i1 = min(g.xyz, l.zxy);
                    vec3 i2 = max(g.xyz, l.zxy);
                    vec3 x1 = x0 - i1 + C.xxx;
                    vec3 x2 = x0 - i2 + C.yyy;
                    vec3 x3 = x0 - D.yyy;
                    i = mod289(i);
                    vec4 p = permute(permute(permute(
                        i.z + vec4(0.0, i1.z, i2.z, 1.0))
                      + i.y + vec4(0.0, i1.y, i2.y, 1.0))
                      + i.x + vec4(0.0, i1.x, i2.x, 1.0));
                    float n_ = 0.142857142857;
                    vec3 ns = n_ * D.wyz - D.xzx;
                    vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
                    vec4 x_ = floor(j * ns.z);
                    vec4 y_ = floor(j - 7.0 * x_);
                    vec4 x = x_ * ns.x + ns.yyyy;
                    vec4 y = y_ * ns.x + ns.yyyy;
                    vec4 h = 1.0 - abs(x) - abs(y);
                    vec4 b0 = vec4(x.xy, y.xy);
                    vec4 b1 = vec4(x.zw, y.zw);
                    vec4 s0 = floor(b0)*2.0 + 1.0;
                    vec4 s1 = floor(b1)*2.0 + 1.0;
                    vec4 sh = -step(h, vec4(0.0));
                    vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
                    vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
                    vec3 p0 = vec3(a0.xy, h.x);
                    vec3 p1 = vec3(a0.zw, h.y);
                    vec3 p2 = vec3(a1.xy, h.z);
                    vec3 p3 = vec3(a1.zw, h.w);
                    vec4 norm = taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
                    p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
                    vec4 m = max(0.6 - vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)), 0.0);
                    m = m * m;
                    return 42.0 * dot(m*m, vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
                }

                float fbm(vec3 p) {
                    float v = 0.0;
                    float amp = 0.5;
                    vec3 shift = vec3(100.0);
                    for (int i = 0; i < 5; i++) {
                        v += amp * snoise(p);
                        p = p * 2.0 + shift;
                        amp *= 0.5;
                    }
                    return v;
                }

                void main() {
                    // View-space normal → limb factor (1 at center, 0 at edge)
                    vec3 viewDir = normalize(-vPosition);
                    float NdotV = dot(normalize(vNormal), viewDir);
                    float limb = clamp(NdotV, 0.0, 1.0);

                    // Surface noise — animated granulation / convection cells
                    vec3 noiseCoord = vUv.xyx * 4.0 + uTime * 0.08;
                    float n1 = fbm(noiseCoord);
                    float n2 = fbm(noiseCoord * 2.5 + vec3(5.2, 1.3, 2.8));
                    float turbulence = 0.5 + 0.5 * n1;
                    float detail = 0.5 + 0.5 * n2;

                    // Color gradient: core → mid → edge  with noise variation
                    // Limb darkening + color shift
                    float limbPow = pow(limb, 0.6); // gentle darkening curve
                    vec3 baseColor = mix(uColorEdge, uColorMid, smoothstep(0.0, 0.5, limbPow));
                    baseColor = mix(baseColor, uColorCore, smoothstep(0.4, 1.0, limbPow));

                    // Noise-driven brightness variation (granulation)
                    float brightness = 0.85 + 0.15 * turbulence;
                    // Hot spots / sunspots
                    float spots = smoothstep(0.55, 0.7, detail) * 0.3;
                    brightness += spots;

                    // Subtle pulsing
                    brightness *= 0.97 + 0.03 * sin(uTime * 0.5);

                    vec3 finalColor = baseColor * brightness;
                    // Slight over-bright at dead center for that "blinding" feel
                    finalColor += uColorCore * 0.15 * smoothstep(0.85, 1.0, limbPow);

                    gl_FragColor = vec4(finalColor, 1.0);
                }

            // Star type palettes  [core, mid, edge, light hex]

                const edgeCSS = `rgb(${Math.round(palette.edge.r*255)},${Math.round(palette.edge.g*255)},${Math.round(palette.edge.b*255)})`;
                const gradient = glowCtx.createRadialGradient(cx, cy, 0, cx, cy, 256);

                gradient.addColorStop(0.10, coreCSS.replace('rgb', 'rgba').replace(')', ',0.85)'));
                // Transition to star's characteristic mid color
                gradient.addColorStop(0.18, midCSS.replace('rgb', 'rgba').replace(')', ',0.55)'));
                gradient.addColorStop(0.28, midCSS.replace('rgb', 'rgba').replace(')', ',0.3)'));
                // Outer glow fades through edge color
                gradient.addColorStop(0.40, edgeCSS.replace('rgb', 'rgba').replace(')', ',0.15)'));

            // Create 2-5 planets outside the boundary

            // Realistic planet types with varied colors

        // Check if a position overlaps with any occupied position
        function isPositionFree(pos, radius) {
            for (const occ of window.occupiedPositions) {
                const dist = pos.distanceTo(occ.pos);
                if (dist < radius + occ.radius) {
                    return false;
                }
            }
            return true;
        }
        
        function registerPosition(pos, radius) {
            window.occupiedPositions.push({ pos: pos.clone(), radius: radius });
        }
        
        // ─── Scene System ───────────────────────────────────────────
        let currentScene = null;
        
        function clearGameObjects() {
            // Deselect everything
            deselectAll();
            selectedShipIndex = -1;
            cameraFollowTarget = null;
            
            // Remove ships and their trails
            spaceships.forEach(ship => {
                if (ship.userData.trail && ship.userData.trail.line) {
                    scene.remove(ship.userData.trail.line);
                    ship.userData.trail.line.geometry.dispose();
                    ship.userData.trail.line.material.dispose();
                }
                scene.remove(ship);
            });
            spaceships.length = 0;
            
            // Remove asteroids
            asteroids.forEach(a => {
                scene.remove(a);
                a.geometry.dispose();
                a.material.dispose();
            });
            asteroids.length = 0;
            
            // Remove lasers
            lasers.forEach(l => {
                scene.remove(l.line);
                l.line.geometry.dispose();
                l.line.material.dispose();
            });
            lasers.length = 0;
            
            // Remove dust particles
            dustParticles.forEach(p => {
                scene.remove(p);
                p.geometry.dispose();
                p.material.dispose();
            });
            dustParticles.length = 0;
            
            // Remove boundary sphere
            const boundary = scene.getObjectByName('boundarySphere');
            if (boundary) scene.remove(boundary);
            
            // Clear selection indicators
            document.getElementById('selection-indicators').innerHTML = '';
            
            // Reset occupied positions
            window.occupiedPositions = [];
            
            // Reset camera near plane
            camera.near = 0.1;
            camera.updateProjectionMatrix();
        }
        
        function loadScene(sceneName) {

                cameraUpVector.set(0, 1, 0);
                updateCameraPosition();
            } else if (sceneName === 'solo-explorer') {
                // One player ship at origin
                const config = {

                const ship = createSingleSpaceship(config, 0);

                registerPosition(new THREE.Vector3(config.x, config.y, config.z), 3);
                spaceships.push(ship);

                // Create trail for the ship
                const TRAIL_LENGTH = 60;

                const trailGeometry = new THREE.BufferGeometry();
                trailGeometry.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
                trailGeometry.setAttribute('customColor', new THREE.BufferAttribute(trailColors, 4));
                const trailMaterial = new THREE.ShaderMaterial({
                    vertexShader: `

                            vColor = customColor;

                    fragmentShader: `
                        varying vec4 vColor;
                        void main() {
                            gl_FragColor = vColor;
                        }
                    `,
                    transparent: true,
                    depthWrite: false,

                });
                const trailLine = new THREE.Line(trailGeometry, trailMaterial);
                trailLine.frustumCulled = false;
                scene.add(trailLine);
                ship.userData.trail = {
                    line: trailLine,
                    positions: [],

                selectShip(0);

                cameraTarget.copy(camOrbitCenter);
                cameraUpVector.set(0, 1, 0);
                updateCameraPosition();
            } else if (sceneName === 'lunar-orbit') {
                // Moon as a smooth sphere (radius ~1,737 km)
                const moonRadius = 1737 / KM_PER_UNIT;
                const moonGeo = new THREE.SphereGeometry(1, 1024, 512);
                // Procedural moon texture with craters and maria
                const moonTexSize = 4096;
                const moonCanvas = document.createElement('canvas');
                moonCanvas.width = moonTexSize;
                moonCanvas.height = moonTexSize;
                const mCtx = moonCanvas.getContext('2d');
                
                // Base grey highland
                mCtx.fillStyle = '#888';
                mCtx.fillRect(0, 0, moonTexSize, moonTexSize);
                
                // Dark maria (basalt plains) - organic blob clusters
                [
                    { x: 1200, y: 1400, sz: 600 },

                    { x: 2000, y: 2400, sz: 550 },
                    { x: 600, y: 2800, sz: 480 },

                ].forEach(m => {

                        const by = m.y + (Math.random() - 0.5) * m.sz * 0.9;
                        const br = m.sz * (0.15 + Math.random() * 0.45);

                        const g = mCtx.createRadialGradient(bx, by, br * 0.1, bx, by, br);

                        g.addColorStop(1, 'rgba(0,0,0,0)');
                        mCtx.fillStyle = g;
                        mCtx.beginPath();

                });
                
                // Craters - power-law distribution, drawn largest-first (oldest)
                const craters = [];

                    craters.push({
                        x: Math.random() * moonTexSize,

                    fg.addColorStop(0, `rgb(${fs},${fs},${fs})`);
                    fg.addColorStop(0.85, `rgb(${fs + 15},${fs + 15},${fs + 15})`);
                    fg.addColorStop(1, `rgb(${fs + 15},${fs + 15},${fs + 15})`);
                    mCtx.fillStyle = fg;

                    mCtx.arc(c.x, c.y, c.r, 0, Math.PI * 2);

                    // Shadow crescent (sunlight from upper-left)
                    if (c.r > 6) {

                        mCtx.lineWidth = Math.max(1, c.r * 0.18);
                        mCtx.beginPath();
                        mCtx.arc(c.x, c.y, c.r * 0.88, 2.2, 4.2);
                        mCtx.stroke();
                    }
                    // Central peak for larger craters
                    if (c.r > 18 && Math.random() > 0.4) {
                        const ps = Math.floor(105 + Math.random() * 30);
                        mCtx.fillStyle = `rgb(${ps},${ps},${ps})`;
                        mCtx.beginPath();
                        mCtx.arc(c.x, c.y, c.r * 0.08 + 1, 0, Math.PI * 2);
                        mCtx.fill();
                    }
                    // Ejecta rays for biggest craters
                    if (c.r > 35) {
                        const nR = 3 + Math.floor(Math.random() * 5);
                        for (let r = 0; r < nR; r++) {
                            const ra = Math.random() * Math.PI * 2;
                            const rl = c.r * (1.5 + Math.random() * 2.5);
                            mCtx.strokeStyle = `rgba(155,155,155,${0.08 + Math.random() * 0.1})`;
                            mCtx.lineWidth = c.r * (0.04 + Math.random() * 0.06);
                            mCtx.beginPath();
                            mCtx.moveTo(c.x + Math.cos(ra) * c.r, c.y + Math.sin(ra) * c.r);
                            mCtx.lineTo(c.x + Math.cos(ra) * (c.r + rl), c.y + Math.sin(ra) * (c.r + rl));
                            mCtx.stroke();
                        }
                    }
                });
                
                // Fine noise
                const imgData = mCtx.getImageData(0, 0, moonTexSize, moonTexSize);
                for (let i = 0; i < imgData.data.length; i += 4) {
                    const noise = (Math.random() - 0.5) * 16;
                    imgData.data[i] = Math.max(0, Math.min(255, imgData.data[i] + noise));
                    imgData.data[i+1] = Math.max(0, Math.min(255, imgData.data[i+1] + noise));
                    imgData.data[i+2] = Math.max(0, Math.min(255, imgData.data[i+2] + noise));
                }
                mCtx.putImageData(imgData, 0, 0);
                
                const moonTexture = new THREE.CanvasTexture(moonCanvas);
                moonTexture.wrapS = THREE.RepeatWrapping;
                moonTexture.wrapT = THREE.RepeatWrapping;
                moonTexture.anisotropy = renderer.capabilities.getMaxAnisotropy();
                moonTexture.minFilter = THREE.LinearMipmapLinearFilter;
                moonTexture.magFilter = THREE.LinearFilter;
                
                const moonMat = new THREE.MeshStandardMaterial({
                    map: moonTexture,
                    roughness: 0.95,
                    metalness: 0.0,
                    flatShading: false,
                    fog: false,
                    side: THREE.DoubleSide
                });
                const moon = new THREE.Mesh(moonGeo, moonMat);
                moon.scale.set(moonRadius, moonRadius, moonRadius);
                moon.position.set(0, 0, 0);

                // Mass from volume and density (tonnes)
                const radiusM = moonRadius * 100; // meters
                const volumeM3 = (4 / 3) * Math.PI * radiusM * radiusM * radiusM;
                const moonMass = volumeM3 * ROCK_DENSITY / 1000;
                
                moon.userData = {
                    type: 'asteroid',
                    selectable: true,
                    shapeType: 1.0,
                    name: 'Moon',
                    rotationSpeed: { x: 0, y: 0.0001, z: 0 },
                    mass: moonMass,
                    velocity: new THREE.Vector3(0, 0, 0)
                };
                asteroids.push(moon);
                scene.add(moon);
                registerPosition(new THREE.Vector3(0, 0, 0), moonRadius * 1.5);
                
                // Lunar lighting — directional "sun" from far away so moon has
                // a realistic day/night terminator. Low ambient for dark side.
                sunLight.position.set(1, 0.3, 0.5).normalize().multiplyScalar(50000);
                sunLight.intensity = 3;
                ambientLight.color.set(0x111111);
                ambientLight.intensity = 0.4;
                // Disable the small-range colored point lights (irrelevant at lunar scale)
                blueLight.intensity = 0;
                pinkLight.intensity = 0;
                // Disable fog for lunar scene (moon is huge, fog washes it out)
                scene.fog = null;
                
                // === EARTH — 384,400 km away, radius 6,371 km ===
                const earthRadius = 6371 / KM_PER_UNIT; // 63,710 scene units
                const earthDistance = 384400 / KM_PER_UNIT; // 3,844,000 scene units
                
                // Procedural Earth texture
                const earthCanvas = document.createElement('canvas');
                earthCanvas.width = 512;
                earthCanvas.height = 256;
                const ectx = earthCanvas.getContext('2d');
                
                // Deep ocean base
                ectx.fillStyle = '#0a2a5a';
                ectx.fillRect(0, 0, 512, 256);
                
                // Continents — simplified shapes using ellipses and rects
                ectx.fillStyle = '#2a6e2a';
                const drawContinent = (cx, cy, w, h, rot) => {
                    ectx.save();
                    ectx.translate(cx, cy);
                    ectx.rotate(rot || 0);
                    ectx.beginPath();
                    ectx.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
                    ectx.fill();
                    ectx.restore();
                };
                // Africa + Europe
                drawContinent(280, 110, 30, 55, 0.1);
                drawContinent(270, 70, 25, 20, -0.2);
                // Asia
                drawContinent(340, 70, 60, 35, 0.1);
                drawContinent(370, 110, 25, 25, 0);
                // North America
                drawContinent(110, 70, 40, 30, -0.2);
                drawContinent(95, 100, 20, 15, 0.3);
                // South America
                drawContinent(140, 150, 18, 40, 0.15);
                // Australia
                drawContinent(410, 160, 22, 14, 0.1);
                // Antarctica
                drawContinent(256, 240, 80, 15, 0);
                
                // Add some noise / variation to land
                const eid = ectx.getImageData(0, 0, 512, 256);
                const epx = eid.data;
                for (let i = 0; i < epx.length; i += 4) {
                    const nr = (Math.random() - 0.5) * 20;
                    epx[i] = Math.max(0, Math.min(255, epx[i] + nr));
                    epx[i + 1] = Math.max(0, Math.min(255, epx[i + 1] + nr));
                    epx[i + 2] = Math.max(0, Math.min(255, epx[i + 2] + nr));
                }
                ectx.putImageData(eid, 0, 0);
                
                // Cloud wisps (semi-transparent white ellipses)
                ectx.globalAlpha = 0.25;
                ectx.fillStyle = '#ffffff';
                for (let c = 0; c < 40; c++) {
                    const cx2 = Math.random() * 512;
                    const cy2 = Math.random() * 256;
                    ectx.beginPath();
                    ectx.ellipse(cx2, cy2, 15 + Math.random() * 40, 3 + Math.random() * 8, Math.random() * Math.PI, 0, Math.PI * 2);
                    ectx.fill();
                }
                ectx.globalAlpha = 1;
                
                const earthTexture = new THREE.CanvasTexture(earthCanvas);
                const earthGeo = new THREE.SphereGeometry(1, 48, 32);
                const earthMat = new THREE.MeshStandardMaterial({
                    map: earthTexture,
                    roughness: 0.7,
                    metalness: 0.0,
                    fog: false
                });
                const earth = new THREE.Mesh(earthGeo, earthMat);
                earth.scale.set(earthRadius, earthRadius, earthRadius);
                // Place Earth along +X axis from moon
                earth.position.set(earthDistance, 0, 0);
                
                // Mass: 5.972e24 kg = 5.972e21 tonnes
                earth.userData = {
                    type: 'asteroid',
                    selectable: true,
                    shapeType: 1.0,
                    name: 'Earth',
                    rotationSpeed: { x: 0, y: 0.0002, z: 0 },
                    mass: 5.972e21,
                    velocity: new THREE.Vector3(0, 0, 0)
                };
                asteroids.push(earth);
                scene.add(earth);
                
                // Ship in low orbit ~100 km above surface
                const orbitRadius = 1837 / KM_PER_UNIT;
                const config = {
                    x: orbitRadius, y: 0, z: 0,
                    color: 0x44aaff,
                    team: 'player',
                    name: 'Orbiter-01'
                };
                const ship = createSingleSpaceship(config, 0);
                ship.position.set(config.x, config.y, config.z);
                registerPosition(new THREE.Vector3(config.x, config.y, config.z), 3);
                spaceships.push(ship);
                scene.add(ship);
                
                // Create trail for the ship
                const TRAIL_LENGTH = 60;
                const trailPositions = new Float32Array(TRAIL_LENGTH * 3);
                const trailColors = new Float32Array(TRAIL_LENGTH * 4);
                const trailGeometry = new THREE.BufferGeometry();
                trailGeometry.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
                trailGeometry.setAttribute('customColor', new THREE.BufferAttribute(trailColors, 4));
                const trailMaterial = new THREE.ShaderMaterial({
                    vertexShader: `
                        attribute vec4 customColor;
                        varying vec4 vColor;
                        void main() {
                            vColor = customColor;
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                        }
                    `,
                    fragmentShader: `
                        varying vec4 vColor;
                        void main() {
                            gl_FragColor = vColor;
                        }
                    `,
                    transparent: true,
                    depthWrite: false,
                    blending: THREE.AdditiveBlending
                });
                const trailLine = new THREE.Line(trailGeometry, trailMaterial);
                trailLine.frustumCulled = false;
                scene.add(trailLine);
                ship.userData.trail = {
                    line: trailLine,
                    positions: [],
                    maxLength: TRAIL_LENGTH,
                };
                
                // Set ship to orbit the moon
                ship.userData.behavior = {
                    type: 'orbit',
                    body: moon,
                    radius: orbitRadius,
                    phase: 'freefall'
                };
                // Initial orbital velocity: tangent to orbit (ship at +X, velocity in +Z)
                const G_eff = G_GAME * gravityMultiplier;
                const orbitalSpeed = Math.sqrt(G_eff * moonMass / orbitRadius);
                ship.userData.velocity = new THREE.Vector3(0, 0, orbitalSpeed);
                
                // === SPACE STATION (~5km diameter, city-sized) ===
                {
                    const stGrp = new THREE.Group();
                    
                    // Procedural window texture (color map + emissive map)
                    const TX = 512;
                    const stWins = [];
                    for (let gx = 0; gx < TX; gx += 24) {
                        for (let gy = 0; gy < TX; gy += 24) {
                            if (Math.random() > 0.3) {
                                stWins.push({
                                    x: gx + 4 + Math.random() * 10,
                                    y: gy + 4 + Math.random() * 10,
                                    w: 3 + Math.random() * 7,
                                    h: 2 + Math.random() * 5,
                                    c: ['#ffd700','#ffe8b0','#fff','#80d0ff','#ff8040','#e8d870'][Math.floor(Math.random() * 6)]
                                });
                            }
                        }
                    }
                    
                    function stTexFn(isColor) {
                        const cv = document.createElement('canvas');
                        cv.width = TX; cv.height = TX;
                        const cx = cv.getContext('2d');
                        cx.fillStyle = isColor ? '#181c22' : '#000';
                        cx.fillRect(0, 0, TX, TX);
                        if (isColor) {
                            cx.strokeStyle = '#22272e';
                            cx.lineWidth = 1;
                            for (let i = 0; i < TX; i += 24) {
                                cx.beginPath(); cx.moveTo(i, 0); cx.lineTo(i, TX); cx.stroke();
                                cx.beginPath(); cx.moveTo(0, i); cx.lineTo(TX, i); cx.stroke();
                            }
                        }
                        stWins.forEach(w => {
                            cx.fillStyle = isColor ? w.c : '#fff';
                            cx.fillRect(w.x, w.y, w.w, w.h);
                        });
                        const t = new THREE.CanvasTexture(cv);
                        t.wrapS = THREE.RepeatWrapping;
                        t.wrapT = THREE.RepeatWrapping;
                        return t;
                    }
                    
                    const stColTex = stTexFn(true);
                    const stEmTex = stTexFn(false);
                    
                    // Materials
                    const stWinMat = new THREE.MeshStandardMaterial({
                        map: stColTex, emissiveMap: stEmTex,
                        emissive: new THREE.Color(1, 0.9, 0.7),
                        emissiveIntensity: 2.0,
                        roughness: 0.6, metalness: 0.4, fog: false
                    });
                    const stHullMat = new THREE.MeshStandardMaterial({
                        color: 0x3a3e45, roughness: 0.5, metalness: 0.7, fog: false
                    });
                    const stDarkMat = new THREE.MeshStandardMaterial({
                        color: 0x1a1d22, roughness: 0.4, metalness: 0.8, fog: false
                    });
                    const stSolarMat = new THREE.MeshStandardMaterial({
                        color: 0x0a1040, roughness: 0.3, metalness: 0.5,
                        emissive: new THREE.Color(0.02, 0.02, 0.08), fog: false
                    });
                    
                    const SR = 25, SRr = 2.5; // Main ring: 2.5km major radius, 250m tube
                    
                    // Main habitat ring (torus with tiled window texture)
                    const rColT = stColTex.clone(); rColT.repeat.set(60, 8);
                    const rEmT = stEmTex.clone(); rEmT.repeat.set(60, 8);
                    const sRing = new THREE.Mesh(
                        new THREE.TorusGeometry(SR, SRr, 24, 128),
                        new THREE.MeshStandardMaterial({
                            map: rColT, emissiveMap: rEmT,
                            emissive: new THREE.Color(1, 0.9, 0.7),
                            emissiveIntensity: 2.0,
                            roughness: 0.6, metalness: 0.4, fog: false
                        })
                    );
                    sRing.rotation.x = Math.PI / 2;
                    stGrp.add(sRing);
                    
                    // Inner structural ring (1.2km radius, 150m tube)
                    const iColT = stColTex.clone(); iColT.repeat.set(30, 5);
                    const iEmT = stEmTex.clone(); iEmT.repeat.set(30, 5);
                    const sIRing = new THREE.Mesh(
                        new THREE.TorusGeometry(12, 1.5, 16, 64),
                        new THREE.MeshStandardMaterial({
                            map: iColT, emissiveMap: iEmT,
                            emissive: new THREE.Color(1, 0.9, 0.7),
                            emissiveIntensity: 1.5,
                            roughness: 0.6, metalness: 0.4, fog: false
                        })
                    );
                    sIRing.rotation.x = Math.PI / 2;
                    stGrp.add(sIRing);
                    
                    // Central hub cylinder (700m diameter, 2.2km long)
                    stGrp.add(new THREE.Mesh(
                        new THREE.CylinderGeometry(3.5, 3.5, 22, 32), stHullMat
                    ));
                    
                    // Hub end caps (flared)
                    const capG = new THREE.CylinderGeometry(5, 3.5, 3, 32);
                    const cap1 = new THREE.Mesh(capG, stDarkMat);
                    cap1.position.y = 12.5;
                    stGrp.add(cap1);
                    const cap2 = new THREE.Mesh(capG.clone(), stDarkMat);
                    cap2.position.y = -12.5;
                    cap2.rotation.x = Math.PI;
                    stGrp.add(cap2);
                    
                    // Hub detail rings
                    for (let i = -8; i <= 8; i += 4) {
                        const dr = new THREE.Mesh(
                            new THREE.TorusGeometry(3.8, 0.25, 8, 32), stDarkMat
                        );
                        dr.position.y = i;
                        stGrp.add(dr);
                    }
                    
                    // Outer spokes (hub to main ring, 8)
                    for (let i = 0; i < 8; i++) {
                        const a = (i / 8) * Math.PI * 2;
                        const len = SR - 5;
                        const sp = new THREE.Mesh(
                            new THREE.BoxGeometry(len, 0.6, 0.6), stHullMat
                        );
                        sp.position.set(Math.cos(a) * (5 + len / 2), 0, Math.sin(a) * (5 + len / 2));
                        sp.rotation.y = -a;
                        stGrp.add(sp);
                    }
                    
                    // Inner spokes (hub to inner ring, 8, offset)
                    for (let i = 0; i < 8; i++) {
                        const a = (i / 8) * Math.PI * 2 + Math.PI / 8;
                        const len = 12 - 5;
                        const sp = new THREE.Mesh(
                            new THREE.BoxGeometry(len, 0.4, 0.4), stDarkMat
                        );
                        sp.position.set(Math.cos(a) * (5 + len / 2), 0, Math.sin(a) * (5 + len / 2));
                        sp.rotation.y = -a;
                        stGrp.add(sp);
                    }
                    
                    // Building clusters on outer ring (24 clusters, city skyline)
                    for (let ci = 0; ci < 24; ci++) {
                        const theta = (ci / 24) * Math.PI * 2;
                        const nb = 3 + Math.floor(Math.random() * 6);
                        for (let b = 0; b < nb; b++) {
                            const bw = 0.3 + Math.random() * 0.7;
                            const bh = 0.4 + Math.random() * 2.8;
                            const bd = 0.3 + Math.random() * 0.7;
                            const tOff = ((Math.random() - 0.5) * 2.5) / SR;
                            const t = theta + tOff;
                            const ct = Math.cos(t), st = Math.sin(t);
                            const bR = SR + SRr + bh / 2;
                            const bld = new THREE.Mesh(
                                new THREE.BoxGeometry(bw, bh, bd), stWinMat
                            );
                            bld.position.set(ct * bR, 0, st * bR);
                            bld.quaternion.setFromUnitVectors(
                                new THREE.Vector3(0, 1, 0),
                                new THREE.Vector3(ct, 0, st)
                            );
                            stGrp.add(bld);
                        }
                    }
                    
                    // Solar panel arrays (4, extending from hub top/bottom)
                    for (let i = 0; i < 4; i++) {
                        const a = (i / 4) * Math.PI * 2 + Math.PI / 4;
                        const yS = (i % 2 === 0) ? 1 : -1;
                        const px = Math.cos(a) * 5.5, pz = Math.sin(a) * 5.5;
                        const arm = new THREE.Mesh(
                            new THREE.CylinderGeometry(0.15, 0.15, 10, 6), stDarkMat
                        );
                        arm.position.set(px, yS * 16, pz);
                        stGrp.add(arm);
                        const pan = new THREE.Mesh(
                            new THREE.BoxGeometry(14, 0.08, 7), stSolarMat
                        );
                        pan.position.set(px, yS * 21, pz);
                        pan.rotation.y = -a;
                        stGrp.add(pan);
                    }
                    
                    // Communication dishes (top of hub)
                    for (let i = 0; i < 3; i++) {
                        const a = (i / 3) * Math.PI * 2 + 0.3;
                        const dx = Math.cos(a) * 7, dz = Math.sin(a) * 7;
                        const dish = new THREE.Mesh(
                            new THREE.SphereGeometry(1.5, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2),
                            stHullMat
                        );
                        dish.position.set(dx, 13, dz);
                        dish.rotation.x = Math.PI;
                        stGrp.add(dish);
                        const rod = new THREE.Mesh(
                            new THREE.CylinderGeometry(0.06, 0.06, 3, 4), stDarkMat
                        );
                        rod.position.set(dx, 15, dz);
                        stGrp.add(rod);
                    }
                    
                    // Docking port (extending arm + bay)
                    const dArm = new THREE.Mesh(
                        new THREE.BoxGeometry(10, 0.7, 0.7), stHullMat
                    );
                    dArm.position.set(SR + 7, 0, 0);
                    stGrp.add(dArm);
                    const dBay = new THREE.Mesh(
                        new THREE.BoxGeometry(4, 2.5, 4), stWinMat
                    );
                    dBay.position.set(SR + 13, 0, 0);
                    stGrp.add(dBay);
                    
                    // Navigation lights
                    const nlGeo = new THREE.SphereGeometry(0.25, 8, 8);
                    [
                        [[SR + SRr + 1, 0, 0], 0xff0000],
                        [[-(SR + SRr + 1), 0, 0], 0x00ff00],
                        [[0, 14, 0], 0xffffff],
                        [[0, -14, 0], 0xffffff],
                        [[0, 0, SR + SRr + 1], 0xff4400],
                        [[0, 0, -(SR + SRr + 1)], 0x0044ff],
                    ].forEach(([p, c]) => {
                        const nl = new THREE.Mesh(nlGeo, new THREE.MeshBasicMaterial({ color: c }));
                        nl.position.set(p[0], p[1], p[2]);
                        stGrp.add(nl);
                    });
                    
                    // Position ~9km ahead of ship in orbit (same altitude)
                    const stA = 0.005;
                    const stPos = new THREE.Vector3(
                        orbitRadius * Math.cos(stA),
                        0,
                        orbitRadius * Math.sin(stA)
                    );
                    stGrp.position.copy(stPos);
                    
                    stGrp.userData = {
                        type: 'asteroid',
                        selectable: true,
                        shapeType: 1.0,
                        name: 'Station',
                        rotationSpeed: { x: 0, y: 0.001, z: 0 }, // ~1 RPM spin for artificial gravity
                        mass: 1e6, // ~1 Mt (negligible gravity)
                        velocity: new THREE.Vector3(0, 0, 0),
                        // Compound collision shapes — tori are rotated PI/2 so center
                        // circles lie in XZ plane (tube extends Y) in group-local frame.
                        // Torus: R = center-circle radius, r = tube radius (scene units).
                        // Cylinder: radius + halfHeight along Y axis.
                        collisionShapes: [
                            { type: 'torus', R: SR, r: SRr },        // Main ring: R=25 (2.5km), r=2.5 (250m)
                            { type: 'torus', R: 12, r: 1.5 },        // Inner ring: R=12 (1.2km), r=1.5 (150m)
                            { type: 'cylinder', radius: 3.5, halfHeight: 11 } // Hub core (350m radius, 2.2km tall)
                        ],
                        // Bounding sphere for quick rejection (avoidance, proximity, etc.)
                        collisionSize: new THREE.Vector3(28, 22, 28)
                    };
                    asteroids.push(stGrp);
                    scene.add(stGrp);
                    registerPosition(stPos, 30);
                }
                
                selectShip(0);
                
                // Engagement zone encompasses the moon (~1,737km radius) plus ~800km margin
                WORLD_RADIUS = 25000; // 2,500 km
                createBoundarySphere();
                
                // Adjust clip planes for this scene (distances up to ~4M scene units for Earth)
                camera.near = 1;
                camera.far = 5000000;
                camera.updateProjectionMatrix();
                
                // Camera above ship looking down at moon surface
                camOrbitCenter.copy(ship.position);
                camSphereRadius = 200;
                camSphereDir.set(0, 0.5, -1).normalize();
                camSphereUp.set(0, 1, 0);
                cameraPosition.copy(camOrbitCenter).addScaledVector(camSphereDir, camSphereRadius);
                cameraTarget.copy(camOrbitCenter);
                cameraUpVector.set(0, 1, 0);
                updateCameraPosition();
            }
            
            addChatMsg(`Scene: ${sceneName.replace(/-/g, ' ')}`, 'system');
        }
        
        function createSpaceships() {
            createFleet('player', 0x44aaff, 'Alpha', new THREE.Vector3(0, 0, 1500));
            createFleet('enemy', 0xff4444, 'Omega', new THREE.Vector3(0, 0, -1500));
            
            // Select first player ship by default
            const firstPlayerShip = spaceships.findIndex(s => s.userData.team === 'player');
            if (firstPlayerShip >= 0) {
                selectShip(firstPlayerShip);
            }
        }
        
        function createFleet(team, color, prefix, offset) {
            const shipCount = 10;
            
            // 3D spherical shell formation
            let shipIndex = 0;
            
            const shells = [
                { radius: 0, count: 1 },
                { radius: 15, count: 9 }
            ];
            
            for (const shell of shells) {
                const count = Math.min(shell.count, shipCount - shipIndex);
                
                for (let i = 0; i < count; i++) {
                    let x, y, z;
                    
                    if (shell.radius === 0) {
                        x = 0; y = 0; z = 0;
                    } else {
                        // Fibonacci sphere distribution
                        const goldenRatio = (1 + Math.sqrt(5)) / 2;
                        const theta = 2 * Math.PI * i / goldenRatio;
                        const phi = Math.acos(1 - 2 * (i + 0.5) / count);
                        
                        x = shell.radius * Math.sin(phi) * Math.cos(theta);
                        y = shell.radius * Math.cos(phi);
                        z = shell.radius * Math.sin(phi) * Math.sin(theta);
                    }
                    
                    // Jitter and offset
                    x += (Math.random() - 0.5) * 2 + offset.x;
                    y += (Math.random() - 0.5) * 2 + offset.y;
                    z += (Math.random() - 0.5) * 2 + offset.z;
                    
                    const config = {
                        x: x,
                        z: z,
                        y: y,
                        color: color,
                        team: team,
                        name: `${prefix}-${String(shipIndex + 1).padStart(2, '0')}`
                    };
                    
                    const ship = createSingleSpaceship(config, spaceships.length);
                    ship.position.set(config.x, config.y, config.z);
                    
                    // Register position to prevent asteroid overlap
                    registerPosition(new THREE.Vector3(config.x, config.y, config.z), 3);
                    
                    // Face outward from center
                    if (shell.radius > 0) {
                        ship.lookAt(offset.x, offset.y, offset.z);
                    }
                    
                    spaceships.push(ship);
                    scene.add(ship);
                    
                    // Create motion trail
                    const TRAIL_LENGTH = 60; // number of trail points
                    const trailPositions = new Float32Array(TRAIL_LENGTH * 3);
                    const trailColors = new Float32Array(TRAIL_LENGTH * 4); // RGBA
                    const trailGeometry = new THREE.BufferGeometry();
                    trailGeometry.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
                    trailGeometry.setAttribute('customColor', new THREE.BufferAttribute(trailColors, 4));
                    const trailMaterial = new THREE.ShaderMaterial({
                        vertexShader: `
                            attribute vec4 customColor;
                            varying vec4 vColor;
                            void main() {
                                vColor = customColor;
                                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                            }
                        `,
                        fragmentShader: `
                            varying vec4 vColor;
                            void main() {
                                gl_FragColor = vColor;
                            }
                        `,
                        transparent: true,
                        depthWrite: false,
                        blending: THREE.AdditiveBlending
                    });
                    const trailLine = new THREE.Line(trailGeometry, trailMaterial);
                    trailLine.frustumCulled = false;
                    scene.add(trailLine);
                    ship.userData.trail = {
                        line: trailLine,
                        positions: [], // array of Vector3
                        maxLength: TRAIL_LENGTH,
                    };
                    
                    shipIndex++;
                }
            }
        }
        
        function createShipExplosion(position) {
            const count = 50;
            for (let i = 0; i < count; i++) {
                const geo = new THREE.SphereGeometry(1.5, 4, 4);
