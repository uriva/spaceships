        function fireLaser(target) {
            if (selectedShipIndex < 0 || !spaceships[selectedShipIndex]) return;
            
            const ship = spaceships[selectedShipIndex];
            const shipData = ship.userData;
            
            // Check if ship has enough weapons energy
            const WEAPON_COST = 8;
            if (shipData.weapons < WEAPON_COST) {
                // Not enough weapons energy - can't fire
                return;
            }
            
            // Deplete weapons
            shipData.weapons = Math.max(0, shipData.weapons - WEAPON_COST);
            
            // Toast when weapons run out
            if (shipData.weapons <= 0 && !shipData.weaponsDepleted) {
                shipData.weaponsDepleted = true;
                showToast(`${shipData.name} — WEAPONS DEPLETED`, 'danger');
            }
            
            // Create laser beam
            const startPos = ship.position.clone();
            const endPos = target.position.clone();
            const distance = startPos.distanceTo(endPos);
            
            // Create laser geometry
            const laserGeometry = new THREE.CylinderGeometry(0.1, 0.1, distance, 8);
            const laserMaterial = new THREE.MeshBasicMaterial({
                color: 0xff0050,
                transparent: true,
                opacity: 0.8
            });
            const laser = new THREE.Mesh(laserGeometry, laserMaterial);
            
            // Position and orient laser
            const midPoint = startPos.clone().add(endPos).multiplyScalar(0.5);
            laser.position.copy(midPoint);
            laser.lookAt(endPos);
            laser.rotateX(Math.PI / 2);
            
            scene.add(laser);
            lasers.push({ mesh: laser, created: Date.now() });
            
            // Muzzle flash
            const flashGeometry = new THREE.SphereGeometry(0.5, 8, 8);
            const flashMaterial = new THREE.MeshBasicMaterial({
                color: 0xff0050,
                transparent: true,
                opacity: 1
            });
            const flash = new THREE.Mesh(flashGeometry, flashMaterial);
            flash.position.copy(startPos);
            scene.add(flash);
            lasers.push({ mesh: flash, created: Date.now(), isFlash: true });
            
            // No recoil for laser weapons - they don't have kickback
            
            // Target hit effect
            setTimeout(() => {
                const hitFlash = new THREE.Mesh(
                    new THREE.SphereGeometry(1, 8, 8),
                    new THREE.MeshBasicMaterial({
                        color: 0xffaa00,
                        transparent: true,
                        opacity: 0.8
                    })
                );
                hitFlash.position.copy(endPos);
                scene.add(hitFlash);
                lasers.push({ mesh: hitFlash, created: Date.now(), isFlash: true });
            }, distance * 5);
            
            // Update HUD to show weapons depletion
            updateShipHUD();
        }
        
        function updateSpaceships() {
            spaceships.forEach((ship, index) => {
                if (!ship) return;
                
                const data = ship.userData;
                const isSelected = index === selectedShipIndex;
                const hasFuel = data.fuel > 0;
                
                // Get current velocity magnitude
                const speed = data.velocity.length();
                const targetSpeed = data.targetVelocity.length();
                
                // Determine if ship is changing velocity (accelerating or braking)
                const isChangingVelocity = data.isAccelerating || data.isBraking;
                // Engine particles only when actively thrusting (not gravity drift)
                if (isChangingVelocity && hasFuel) {
                    // Reuse pooled particle or create new (shared geo + cached material)
                    let particle;
                    if (particlePool.length > 0) {
                        particle = particlePool.pop();
                        // Swap material if color changed
                        if (particle.material.color.getHex() !== data.teamColor) {
                            if (!particleMaterialCache[data.teamColor]) {
                                particleMaterialCache[data.teamColor] = new THREE.MeshBasicMaterial({
                                    color: data.teamColor, transparent: true, opacity: 0.6
                                });
                            }
                            particle.material = particleMaterialCache[data.teamColor];
                        }
                        particle.material.opacity = 0.6;
                        particle.scale.setScalar(1);
                        particle.visible = true;
                    } else {
                        if (!particleMaterialCache[data.teamColor]) {
                            particleMaterialCache[data.teamColor] = new THREE.MeshBasicMaterial({
                                color: data.teamColor, transparent: true, opacity: 0.6
                            });
                        }
                        particle = new THREE.Mesh(sharedParticleGeo, particleMaterialCache[data.teamColor]);
                        scene.add(particle);
                    }
                    
                    // Get ship's forward direction
                    const forward = new THREE.Vector3(0, 0, 1).applyAxisAngle(
                        new THREE.Vector3(0, 1, 0), 
                        ship.rotation.y
                    );
                    
                    particle.position.copy(ship.position);
                    particle.position.sub(forward.multiplyScalar(2.5));
                    
                    particle.userData = {
                        velocity: new THREE.Vector3(
                            (Math.random() - 0.5) * 0.1,
                            (Math.random() - 0.5) * 0.1,
                            0.2 + Math.random() * 0.2
                        ),
                        life: 1.0
                    };
                    engineParticles.push(particle);
                }
                
                
                // Apply gravity from all asteroids (free — no fuel cost)
                const G_eff = G_GAME * gravityMultiplier;
                const gravAccel = new THREE.Vector3(0, 0, 0);
                asteroids.forEach(asteroid => {
                    const toBody = asteroid.position.clone().sub(ship.position);
                    const distSq = toBody.lengthSq();
                    const dist = Math.sqrt(distSq);
                    if (dist < 3) return; // avoid singularity at overlap
                    // F = G * M / r², applied as acceleration (ship mass cancels)
                    const strength = G_eff * asteroid.userData.mass / distSq;
                    gravAccel.add(toBody.normalize().multiplyScalar(strength));
                });
                data.gravityMag = gravAccel.length(); // Save for HUD
                data.velocity.add(gravAccel);
                
                // Apply physics: accelerate toward target velocity
                if (data.isAccelerating && hasFuel) {
                    // Check if we actually need thrust (not already at cruise speed)
                    const velDiff = data.targetVelocity.clone().sub(data.velocity);
                    if (velDiff.length() > THRUST * 0.5) {
                        // Thrust toward target velocity — burns fuel
                        const acceleration = velDiff.normalize().multiplyScalar(THRUST);
                        data.velocity.add(acceleration);
                        if (data.velocity.length() > MAX_SPEED) {
                            data.velocity.normalize().multiplyScalar(MAX_SPEED);
                        }
                        data.fuel = Math.max(0, data.fuel - FUEL_COST_PER_FRAME);
                    } else {
                        // At cruise speed — coast for free (no fuel burn, no engine particles)
                        data.velocity.copy(data.targetVelocity);
                        data.isAccelerating = false;
                    }
                } else if (data.isBraking && hasFuel) {
                    // Reverse thrust — same engine, same power, same fuel cost
                    if (speed <= THRUST) {
                        // Would overshoot zero — clamp (physically correct: cut engines at zero)
                        data.velocity.set(0, 0, 0);
                    } else {
                        const brakeDir = data.velocity.clone().normalize().multiplyScalar(-THRUST);
                        data.velocity.add(brakeDir);
                    }
                    data.fuel = Math.max(0, data.fuel - FUEL_COST_PER_FRAME);
                } else {
                    // No thrust — in space, velocity is preserved (no drag)
                }
                
                // Toast when fuel runs out
                if (data.fuel <= 0 && !data.fuelDepleted) {
                    data.fuelDepleted = true;
                    showToast(`${data.name} — FUEL DEPLETED`, 'danger');
                }
                
                // Move ship based on velocity
                if (speed > 0.001) {
                    ship.position.add(data.velocity);
                    
                    // Face direction of movement
                    if (speed > 0.05) {
                        const moveDir = data.velocity.clone().normalize();
                        const targetRotation = Math.atan2(moveDir.x, moveDir.z);
                        ship.rotation.y = targetRotation;
                    }
                }
                
                // Elastic collision with asteroids — ellipsoid-aware, respects rotation
                const shipRadius = 2;
                for (const asteroid of asteroids) {
                    // Vector from asteroid center to ship (world space)
                    const toShip = ship.position.clone().sub(asteroid.position);
                    // Rotate into asteroid's local frame (rotation only — NOT scale)
                    const invQuat = asteroid.quaternion.clone().invert();
                    const localPos = toShip.applyQuaternion(invQuat);
                    // In local frame, asteroid is ellipsoid with semi-axes = scale (game units)
                    // Pad by shipRadius so we detect when the ship surface touches
                    const sx = asteroid.scale.x + shipRadius;
                    const sy = asteroid.scale.y + shipRadius;
                    const sz = asteroid.scale.z + shipRadius;
                    // Ellipsoid test: (x/sx)² + (y/sy)² + (z/sz)² < 1 means inside
                    const ex = localPos.x / sx;
                    const ey = localPos.y / sy;
                    const ez = localPos.z / sz;
                    const ellipDist = ex * ex + ey * ey + ez * ez;
                    
                    if (ellipDist < 1 && ellipDist > 0.0001) {
                        // Ellipsoid surface normal in local frame: gradient (x/sx²,y/sy²,z/sz²)
                        const localNormal = new THREE.Vector3(
                            localPos.x / (sx * sx),
                            localPos.y / (sy * sy),
                            localPos.z / (sz * sz)
                        ).normalize();
                        
                        // Rotate normal back to world space
                        const worldNormal = localNormal.applyQuaternion(asteroid.quaternion).normalize();
                        
                        const vDotN = data.velocity.dot(worldNormal);
                        if (vDotN < 0) { // only act if moving into the surface
                            // Push ship to ellipsoid surface: scale localPos so it lands on the surface
                            const pushFactor = 1 / Math.sqrt(ellipDist);
                            const surfaceLocal = localPos.clone().multiplyScalar(pushFactor);
                            // Rotate surface point back to world and offset from asteroid center
                            ship.position.copy(asteroid.position).add(surfaceLocal.applyQuaternion(asteroid.quaternion));
                            // Reflect velocity: v' = v - 2(v·n)n, then dampen
                            data.velocity.sub(worldNormal.clone().multiplyScalar(2 * vDotN));
                            data.velocity.multiplyScalar(0.7); // 30% energy loss
                            // Clear move behavior so it doesn't ram back in
                            if (data.behavior && data.behavior.type === 'move') {
                                data.behavior = null;
                            }
                        }
                    }
                }
                
                // Update motion trail
                const trail = data.trail;
                if (trail) {
                    const currentSpeed = data.velocity.length();
                    // Only record trail points when actually moving
                    if (currentSpeed > 0.01) {
                        trail.positions.push(ship.position.clone());
                        if (trail.positions.length > trail.maxLength) {
                            trail.positions.shift();
                        }
                    } else if (trail.positions.length > 0) {
                        // Fade out: remove oldest point each frame when stopped
                        trail.positions.shift();
                    }
                    
                    // Update trail geometry
                    const posAttr = trail.line.geometry.getAttribute('position');
                    const colAttr = trail.line.geometry.getAttribute('color');
                    const len = trail.positions.length;
                    
                    // Extract team color components
                    const r = ((data.teamColor >> 16) & 0xFF) / 255;
                    const g = ((data.teamColor >> 8) & 0xFF) / 255;
                    const b = (data.teamColor & 0xFF) / 255;
                    
                    for (let j = 0; j < trail.maxLength; j++) {
                        if (j < len) {
                            const p = trail.positions[j];
                            posAttr.array[j * 3] = p.x;
                            posAttr.array[j * 3 + 1] = p.y;
                            posAttr.array[j * 3 + 2] = p.z;
                            // Fade: oldest = 0 opacity, newest = 0.6 opacity
                            const alpha = (j / len) * 0.6;
                            colAttr.array[j * 4] = r;
                            colAttr.array[j * 4 + 1] = g;
                            colAttr.array[j * 4 + 2] = b;
                            colAttr.array[j * 4 + 3] = alpha;
                        } else {
                            // Hide unused points by zeroing alpha
                            colAttr.array[j * 4 + 3] = 0;
                        }
                    }
                    posAttr.needsUpdate = true;
                    colAttr.needsUpdate = true;
                    trail.line.geometry.setDrawRange(0, len);
                }
                
                // Reset flags for next frame
                data.isAccelerating = false;
                data.isBraking = false;
                data.targetVelocity.set(0, 0, 0);
                
                // Hover animation (only when stopped) - offset from base Y, don't overwrite
                if (!data.baseY && data.baseY !== 0) {
                    data.baseY = ship.position.y;  // Store initial Y on first frame
                }
                if (speed < 0.01) {
                    ship.position.y = data.baseY + Math.sin(Date.now() * 0.002 + index) * 0.2;
                }
                
                // Nav light pulsation - soft smooth glow
                const navNames = ['navTop', 'navBottom', 'navRight', 'navLeft', 'navFront', 'navRear'];
                const time = Date.now() * 0.001;
                
                navNames.forEach((name, lightIndex) => {
                    const mesh = ship.getObjectByName(name);
                    if (mesh) {
                        // Each light has unique phase and slow frequency
                        const phase = index * 0.37 + lightIndex * 0.83;
                        const freq = 0.3 + lightIndex * 0.07;  // Very slow: 0.3-0.72 Hz
                        
                        // Smooth sine wave pulsation
                        const glow = (Math.sin(time * freq * Math.PI * 2 + phase) + 1) * 0.5;  // 0 to 1
                        
                        mesh.material.opacity = 0.2 + glow * 0.8;
                        mesh.scale.setScalar(1.0 + glow * 1.5);
                    }
                });
            });
            
            // Update engine particles
            for (let i = engineParticles.length - 1; i >= 0; i--) {
                const p = engineParticles[i];
                p.position.add(p.userData.velocity);
                p.userData.life -= 0.02;
                p.material.opacity = p.userData.life * 0.6;
                p.scale.multiplyScalar(0.95);
                
                if (p.userData.life <= 0) {
                    p.visible = false;
                    particlePool.push(p);
                    engineParticles.splice(i, 1);
                }
            }
            
            // Update fuel display
            updateFuelDisplay();
        }
        
        function formatDist(units) {
            const km = Math.round(units * KM_PER_UNIT);
            if (km >= 10000) return (km / 1000).toFixed(1) + 'Kkm';
            return km + 'km';
        }
        
        function updateFuelDisplay() {
            const display = document.getElementById('mode-display');
            if (selectedObjects.length === 0) {
                display.innerHTML = 'NO SELECTION';
                return;
            }
            
            if (selectedObjects.length === 1) {
                const obj = selectedObjects[0];
                const dist = formatDist(obj.position.distanceTo(cameraPosition));
                
                if (obj.userData.type === 'spaceship') {
                    const fuelPct = Math.round(obj.userData.fuel / obj.userData.maxFuel * 100);
                    const fuelT = Math.round(obj.userData.fuel);
                    const wpnPct = Math.round(obj.userData.weapons / obj.userData.maxWeapons * 100);
                    const speed = Math.round(obj.userData.velocity.length() * KM_PER_UNIT * 60);  // km/s (assuming 60fps)
                    const avgScale = (obj.scale.x + obj.scale.y + obj.scale.z) / 3;
                    const sizeM = Math.round(avgScale * KM_PER_UNIT * 1000);
                    const gForce = obj.userData.gravityMag ? (obj.userData.gravityMag * 360000).toFixed(2) : "0.00";
                    display.innerHTML = `${obj.userData.name} <span style="color:#888">${sizeM}m</span> <span style="color:${fuelPct > 20 ? '#00ff00' : '#ff0000'}">FUEL:${fuelT}t(${fuelPct}%)</span> <span style="color:${wpnPct > 20 ? '#ffaa00' : '#ff0000'}">WPN:${wpnPct}%</span> <span style="color:#bb88ff">G:${gForce}m/s²</span> <span style="color:#888">${dist} ${speed}km/s</span>`;
                } else if (obj.userData.type === 'asteroid') {
                    const shape = obj.userData.shapeType < 0.15 ? 'Potato' : 
                                  obj.userData.shapeType < 0.30 ? 'Elongated' :
                                  obj.userData.shapeType < 0.40 ? 'Lumpy' : 'Rock';
                    const avgScale = (obj.scale.x + obj.scale.y + obj.scale.z) / 3;
                    const radiusKm = (avgScale * KM_PER_UNIT);
                    const radiusStr = radiusKm >= 1 ? radiusKm.toFixed(1) + 'km' : Math.round(radiusKm * 1000) + 'm';
                    const mass = obj.userData.mass;
                    const massStr = mass >= 1e12 ? (mass / 1e12).toFixed(1) + 'Tt' :
                                   mass >= 1e9 ? (mass / 1e9).toFixed(1) + 'Gt' :
                                   mass >= 1e6 ? (mass / 1e6).toFixed(1) + 'Mt' :
                                   mass >= 1000 ? (mass / 1000).toFixed(1) + 'kt' : Math.round(mass) + 't';
                    const massColor = obj.userData.mass >= 1e9 ? '#ff6600' : '#aaaaaa';
                    display.innerHTML = `ASTEROID <span style="color:#aaaaaa">${shape} | r=${radiusStr}</span> <span style="color:${massColor}">MASS:${massStr}</span> <span style="color:#888">${dist}</span>`;
                }
            } else {
                // Multiple objects selected - show avg distance
                const avgDist = formatDist(selectedObjects.reduce((sum, o) => sum + o.position.distanceTo(cameraPosition), 0) / selectedObjects.length);
                
                const ships = selectedObjects.filter(o => o.userData.type === 'spaceship');
                const asteroidCount = selectedObjects.filter(o => o.userData.type === 'asteroid').length;
                
                let parts = [];
                if (ships.length > 0) {
                    if (ships.length <= 4) {
                        parts.push(ships.map(s => s.userData.name).join(', '));
                    } else {
                        parts.push(`${ships.length} Ships`);
                    }
                }
                if (asteroidCount > 0) {
                    parts.push(`${asteroidCount} Asteroid${asteroidCount > 1 ? 's' : ''}`);
                }
                
                display.innerHTML = `<span style="color:#44aaff">${selectedObjects.length} Selected</span> ${parts.join(' + ')} <span style="color:#888">AVG ${avgDist}</span>`;
            }
        }
        
        function updateShipHUD() {
            // Update group dots — show groups 1/2/3 status
            for (let i = 0; i < 3; i++) {
                const dot = document.getElementById(`ship-${i}`);
                if (!dot) continue;
                const groupNum = i + 1;
                const group = controlGroups[groupNum];
                
                if (group && group.length > 0) {
                    // Filter dead objects
                    controlGroups[groupNum] = group.filter(obj => obj.parent);
                    const liveGroup = controlGroups[groupNum];
                    
                    if (liveGroup.length > 0) {
                        dot.style.display = 'flex';
                        dot.textContent = groupNum;
                        
                        // Check if this group is currently selected (all members selected)
                        const allSelected = liveGroup.every(obj => selectedObjects.includes(obj));
                        if (allSelected && selectedObjects.length === liveGroup.length) {
                            dot.classList.add('active');
                            dot.classList.remove('inactive');
                        } else {
                            dot.classList.remove('active');
                            dot.classList.add('inactive');
                        }
                        
                        // Color: use first ship's team color, or blue for mixed/asteroid groups
                        const firstShip = liveGroup.find(o => o.userData.type === 'spaceship');
                        if (firstShip) {
                            dot.style.borderColor = '#' + firstShip.userData.teamColor.toString(16).padStart(6, '0');
                            dot.style.color = '#' + firstShip.userData.teamColor.toString(16).padStart(6, '0');
                        } else {
                            dot.style.borderColor = '#44aaff';
                            dot.style.color = '#44aaff';
                        }
                    } else {
                        dot.style.display = 'none';
                    }
                } else {
                    dot.style.display = 'none';
                }
            }
            
            // Update ship name display
            const nameDisplay = document.getElementById('ship-name');
            if (selectedShipIndex >= 0 && spaceships[selectedShipIndex]) {
                const ship = spaceships[selectedShipIndex];
                nameDisplay.textContent = ship.userData.name;
                nameDisplay.classList.remove('no-ship');
            } else {
                nameDisplay.textContent = 'No Ship Selected';
                nameDisplay.classList.add('no-ship');
            }
        }
        
        function updateAsteroids() {
            const G_eff = G_GAME * gravityMultiplier;
            
            asteroids.forEach((asteroid, i) => {
                // Spin
                asteroid.rotation.x += asteroid.userData.rotationSpeed.x;
                asteroid.rotation.y += asteroid.userData.rotationSpeed.y;
                asteroid.rotation.z += asteroid.userData.rotationSpeed.z;
                
                // Gravitational acceleration from all other asteroids
                const gravAccel = new THREE.Vector3(0, 0, 0);
                for (let j = 0; j < asteroids.length; j++) {
                    if (i === j) continue;
                    const other = asteroids[j];
                    const toOther = other.position.clone().sub(asteroid.position);
                    const distSq = toOther.lengthSq();
                    const dist = Math.sqrt(distSq);
                    const minDist = (asteroid.scale.x + other.scale.x) * 0.5;
                    if (dist < minDist) continue; // avoid singularity at overlap
                    const strength = G_eff * other.userData.mass / distSq;
                    gravAccel.add(toOther.normalize().multiplyScalar(strength));
                }
                asteroid.userData.velocity.add(gravAccel);
                
                // Move asteroid
                asteroid.position.add(asteroid.userData.velocity);
            });
            
            // Elastic collisions between asteroids
            for (let i = 0; i < asteroids.length; i++) {
                for (let j = i + 1; j < asteroids.length; j++) {
                    const a = asteroids[i], b = asteroids[j];
                    const diff = a.position.clone().sub(b.position);
                    const dist = diff.length();
                    const avgRadA = (a.scale.x + a.scale.y + a.scale.z) / 3;
                    const avgRadB = (b.scale.x + b.scale.y + b.scale.z) / 3;
                    const minDist = avgRadA + avgRadB;
                    if (dist < minDist && dist > 0.01) {
                        const normal = diff.normalize();
                        const relVel = a.userData.velocity.clone().sub(b.userData.velocity);
                        const vDotN = relVel.dot(normal);
                        if (vDotN < 0) { // approaching
                            const totalMass = a.userData.mass + b.userData.mass;
                            // Elastic impulse with 30% energy loss
                            const impulse = vDotN * 0.7;
                            a.userData.velocity.sub(normal.clone().multiplyScalar(impulse * b.userData.mass / totalMass * 2));
                            b.userData.velocity.add(normal.clone().multiplyScalar(impulse * a.userData.mass / totalMass * 2));
                            // Separate so they don't overlap
                            const overlap = (minDist - dist) * 0.5 + 0.1;
                            a.position.add(normal.clone().multiplyScalar(overlap));
                            b.position.sub(normal.clone().multiplyScalar(overlap));
                        }
                    }
                }
            }
        }
        
        function updateLasers() {
            const now = Date.now();
            for (let i = lasers.length - 1; i >= 0; i--) {
                const laser = lasers[i];
                const age = now - laser.created;
                
                if (laser.isFlash) {
                    laser.mesh.scale.multiplyScalar(1.1);
                    laser.mesh.material.opacity = Math.max(0, 1 - age / 300);
                    if (age > 300) {
                        scene.remove(laser.mesh);
                        lasers.splice(i, 1);
                    }
                } else {
                    laser.mesh.material.opacity = Math.max(0, 0.8 - age / 200);
                    if (age > 200) {
                        scene.remove(laser.mesh);
                        lasers.splice(i, 1);
                    }
                }
            }
        }
        
        function updateStarField() {
            if (starField) {
                if (starField.field1) starField.field1.rotation.y += 0.0002;
                if (starField.field2) starField.field2.rotation.y += 0.00015;
                if (starField.nebula) starField.nebula.rotation.y -= 0.0001;
                
                // Rotate celestial bodies (suns and planets)
                if (starField.celestialBodies) {
                    starField.celestialBodies.forEach(body => {
                        if (body.userData.rotationSpeed) {
                            body.rotation.y += body.userData.rotationSpeed;
                            body.rotation.x += body.userData.rotationSpeed * 0.5;
                        }
                        
                        // Update sun shader uniforms
                        if (body.userData.type === 'sun') {
                            const time = Date.now() * 0.001;
                            // Drive surface shader time
                            if (body.userData.starMaterial) {
                                body.userData.starMaterial.uniforms.uTime.value = time;
                            }
                            // Subtle sprite pulse
                            if (body.userData.sprite) {
                                const pulse = 1.0 + Math.sin(time * 0.4 + body.id) * 0.06;
                                body.userData.sprite.material.opacity = pulse;
                            }
                        }
                    });
                }
            }
        }
        
        function updateBoundarySphere() {
            const boundarySphere = scene.getObjectByName('boundarySphere');
            if (boundarySphere && boundarySphere.userData) {
                const data = boundarySphere.userData;
                
                // Slow rotation of wireframe
                boundarySphere.rotation.y += 0.0003;
                if (data.gridSphere) data.gridSphere.rotation.y -= 0.0005;
                
                // Pulse effect on equator ring
                if (data.equatorRing) {
                    const time = Date.now() * 0.001;
                    data.equatorRing.material.opacity = 0.2 + Math.sin(time) * 0.1;
                }
                
                // Rotate vertical rings
                if (data.vertRings) {
                    data.vertRings[0].rotation.x += 0.0002;
                    data.vertRings[1].rotation.y += 0.0002;
                }
            }
        }
        
        function updateKeyboardControls() {
            // Any WASD/ZX input cancels camera transition
            if (keys.w || keys.a || keys.s || keys.d || keys.z || keys.x) {
                isCameraTransitioning = false;
            }
            
            // Shift+keys: move crosshair — rotate direction vector using local up, passes through poles
            // W/S → pitch (rotate around local right axis), A/D → yaw (rotate around cursorUp)
            // Z/X → radius in/out
            if (keys.shift && !keys.space && (keys.w || keys.a || keys.s || keys.d || keys.z || keys.x)) {
                const angularSpeed = 0.025;  // radians per frame
                const radialSpeed = 30;       // units per frame
                
                // W/S: pitch — rotate cursorDir and cursorUp around local right axis
                if (keys.w || keys.s) {
                    const right = new THREE.Vector3().crossVectors(cursorDir, cursorUp).normalize();
                    const angle = keys.w ? angularSpeed : -angularSpeed;
                    cursorDir.applyAxisAngle(right, angle).normalize();
                    cursorUp.applyAxisAngle(right, angle).normalize();
                }
                
                // A/D: yaw — rotate cursorDir around cursorUp
                if (keys.a || keys.d) {
                    const angle = keys.a ? angularSpeed : -angularSpeed;
                    cursorDir.applyAxisAngle(cursorUp, angle).normalize();
                }
                
                if (keys.z) cursorRadius += radialSpeed * cursorRadialDir;
                if (keys.x) cursorRadius -= radialSpeed * cursorRadialDir;
                // Pass through sphere boundary or center: flip direction and reverse radial control
                if (cursorRadius > WORLD_RADIUS) {
                    cursorRadius = 2 * WORLD_RADIUS - cursorRadius;
                    cursorDir.negate();
                    cursorUp.negate();
                    cursorRadialDir *= -1;
                }
                if (cursorRadius < 0) {
                    cursorRadius = -cursorRadius;
                    cursorDir.negate();
                    cursorUp.negate();
                    cursorRadialDir *= -1;
                }
                cursorRadius = Math.max(0, Math.min(WORLD_RADIUS, cursorRadius)); // safety clamp
                
                // Update Cartesian position
                cursorPos3D.copy(cursorDir).multiplyScalar(cursorRadius);
                return; // don't move camera
            }
            
            if (keys.space) {
                // Polar look rotation — W/S pitch, A/D yaw, using cameraUpVector (no worldY, no pole lock)
                isCameraTransitioning = false;
                if (keys.w || keys.a || keys.s || keys.d) {
                    cameraMoveHeldFrames++;
                } else {
                    cameraMoveHeldFrames = 0;
                }
                const t = Math.min(cameraMoveHeldFrames / 150, 1);
                const lookSpeed = 0.003 + t * 0.027;
                const lookDir = new THREE.Vector3().subVectors(cameraTarget, cameraPosition).normalize();
                
                // W/S: pitch — rotate lookDir and cameraUpVector around local right axis
                if (keys.w || keys.s) {
                    const right = new THREE.Vector3().crossVectors(lookDir, cameraUpVector).normalize();
                    const angle = keys.w ? -lookSpeed : lookSpeed;
                    lookDir.applyAxisAngle(right, angle);
                    cameraUpVector.applyAxisAngle(right, angle).normalize();
                }
                
                // A/D: yaw — rotate lookDir around cameraUpVector
                if (keys.a || keys.d) {
                    const angle = keys.a ? lookSpeed : -lookSpeed;
                    lookDir.applyAxisAngle(cameraUpVector, angle);
                }
                
                // Keep cameraTarget at a fixed distance from camera
                const dist = cameraPosition.distanceTo(cameraTarget) || 100;
                cameraTarget.copy(cameraPosition).addScaledVector(lookDir, dist);
                // Sync orbit system so orbit mode orbits around where we're now looking
                camOrbitCenter.copy(cameraTarget);
                camSphereRadius = cameraPosition.distanceTo(camOrbitCenter) || 1;
                camSphereDir.copy(cameraPosition).sub(camOrbitCenter).normalize();
                camSphereUp.copy(cameraUpVector);
                updateCameraPosition();
                
            } else if (keys.alt) {
                // Alt+keys: Strafe — linear fly in camera-relative directions
                let cameraMove = new THREE.Vector3(0, 0, 0);
                
                const cameraForward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                const cameraRight = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                const cameraUp = new THREE.Vector3(0, 1, 0).applyQuaternion(camera.quaternion);
                
                if (keys.w) cameraMove.add(cameraUp);
                if (keys.s) cameraMove.sub(cameraUp);
                if (keys.d) cameraMove.add(cameraRight);
                if (keys.a) cameraMove.sub(cameraRight);
                if (keys.z) cameraMove.add(cameraForward);
                if (keys.x) cameraMove.sub(cameraForward);
                
                if (cameraMove.length() > 0) {
                    cameraMoveHeldFrames++;
                    const t = Math.min(cameraMoveHeldFrames / CAMERA_ACCEL_FRAMES, 1);
                    const speed = CAMERA_MOVE_SPEED_MIN + t * (CAMERA_MOVE_SPEED_MAX - CAMERA_MOVE_SPEED_MIN);
                    cameraMove.normalize().multiplyScalar(speed);
                    
                    cameraPosition.add(cameraMove);
                    cameraTarget.add(cameraMove);
                    // Sync orbit system — orbit center is where we're looking
                    camOrbitCenter.copy(cameraTarget);
                    camSphereRadius = cameraPosition.distanceTo(camOrbitCenter) || 1;
                    camSphereDir.copy(cameraPosition).sub(camOrbitCenter).normalize();
                    camSphereUp.copy(cameraUpVector);
                    updateCameraPosition();
                } else {
                    cameraMoveHeldFrames = 0;
                }
            } else {
                // Default: Orbit mode — camera moves on sphere surface, same principle as cursor
                // W/S = pitch (up/down on sphere), A/D = yaw (clockwise/counter), Z/X = radius
                // Only applies when orbit keys are pressed — otherwise camera stays put
                if (keys.w || keys.a || keys.s || keys.d || keys.z || keys.x) {
                    isCameraTransitioning = false;
                    cameraMoveHeldFrames++;
                    const angularSpeed = 0.015;
                    const radialSpeed = 2;
                    const t = Math.min(cameraMoveHeldFrames / 120, 1);
                    const aSpeed = angularSpeed + t * angularSpeed * 3;  // ramp angular
                    const rSpeed = radialSpeed + t * 38;    // ramp radial: 2 → 40
                    
                    // W/S: pitch — rotate camSphereDir and camSphereUp around local right axis
                    if (keys.w || keys.s) {
                        const right = new THREE.Vector3().crossVectors(camSphereDir, camSphereUp).normalize();
                        const angle = keys.w ? aSpeed : -aSpeed;
                        camSphereDir.applyAxisAngle(right, angle).normalize();
                        camSphereUp.applyAxisAngle(right, angle).normalize();
                    }
                    
                    // A/D: yaw — rotate camSphereDir around camSphereUp
                    if (keys.a || keys.d) {
                        const angle = keys.a ? aSpeed : -aSpeed;
                        camSphereDir.applyAxisAngle(camSphereUp, angle).normalize();
                    }
                    
                    // Z/X: radius
                    if (keys.z) camSphereRadius -= rSpeed;
                    if (keys.x) camSphereRadius += rSpeed;
                    camSphereRadius = Math.max(1, camSphereRadius);  // don't go through origin
                    
                    // Update camera position from sphere coords, orbiting around camOrbitCenter
                    cameraPosition.copy(camOrbitCenter).addScaledVector(camSphereDir, camSphereRadius);
                    // Camera looks toward orbit center
                    cameraTarget.copy(camOrbitCenter);
                    cameraUpVector.copy(camSphereUp);
                    updateCameraPosition();
                } else {
                    cameraMoveHeldFrames = 0;
                }
            }
        }
        
        function updateProximityWireframe() {
            // Check all objects - if camera is inside, switch to wireframe
            const allObjects = [...asteroids];
            
            allObjects.forEach(obj => {
                if (!obj.geometry) return;
                
                // Calculate bounding radius (accounting for scale)
                obj.geometry.computeBoundingSphere();
                const geoRadius = obj.geometry.boundingSphere.radius;
                const maxScale = Math.max(obj.scale.x, obj.scale.y, obj.scale.z);
                const worldRadius = geoRadius * maxScale;
                
                const dist = cameraPosition.distanceTo(obj.position);
                const isInside = dist < worldRadius * 1.1;  // Slightly larger threshold
                
                if (isInside && !obj.userData._isWireframe) {
                    // Switch to wireframe
                    obj.userData._origMaterial = obj.material;
                    obj.material = new THREE.MeshBasicMaterial({
                        color: obj.userData._origMaterial.color || 0x44aaff,
                        wireframe: true,
                        transparent: true,
                        opacity: 0.3
                    });
                    obj.userData._isWireframe = true;
                } else if (!isInside && obj.userData._isWireframe) {
                    // Restore original material
                    obj.material = obj.userData._origMaterial;
                    obj.userData._isWireframe = false;
                }
            });
            
            // Also handle ships
            spaceships.forEach(ship => {
                const dist = cameraPosition.distanceTo(ship.position);
                const isInside = dist < 2;  // Ship radius ~2 units
                
                if (isInside && !ship.userData._isWireframe) {
                    ship.children.forEach(child => {
                        if (child.material && !child.name.includes('nav') && !child.name.includes('selection') && !child.name.includes('antenna')) {
                            child.userData._origMaterial = child.material;
                            child.material = new THREE.MeshBasicMaterial({
                                color: 0x44aaff,
                                wireframe: true,
                                transparent: true,
                                opacity: 0.3
                            });
                        }
                    });
                    ship.userData._isWireframe = true;
                } else if (!isInside && ship.userData._isWireframe) {
                    ship.children.forEach(child => {
                        if (child.userData._origMaterial) {
                            child.material = child.userData._origMaterial;
                        }
                    });
                    ship.userData._isWireframe = false;
                }
            });
        }
        
        // Update cursor beams — L-shape from crosshair to positive sphere edge, plus orbs
        function updateCursorBeams() {
            const cx = cursorPos3D.x, cy = cursorPos3D.y, cz = cursorPos3D.z;
            const R2 = WORLD_RADIUS * WORLD_RADIUS;
            
            // X beam: full cross from -X to +X sphere edge
            const xExtent = R2 - cy * cy - cz * cz;
            if (xExtent > 0) {
                const xMax = Math.sqrt(xExtent);
                const posX = cursorBeamX.geometry.attributes.position;
                posX.setXYZ(0, -xMax, cy, cz);
                posX.setXYZ(1,  xMax, cy, cz);
                posX.needsUpdate = true;
                cursorBeamX.visible = true;
                cursorOrbX.position.set(xMax, cy, cz);
                cursorOrbXn.position.set(-xMax, cy, cz);
                cursorOrbX.visible = true;
                cursorOrbXn.visible = true;
            } else {
                cursorBeamX.visible = false;
                cursorOrbX.visible = false;
                cursorOrbXn.visible = false;
            }
            
            // Z beam: full cross from -Z to +Z sphere edge
            const zExtent = R2 - cx * cx - cy * cy;
            if (zExtent > 0) {
                const zMax = Math.sqrt(zExtent);
                const posZ = cursorBeamZ.geometry.attributes.position;
                posZ.setXYZ(0, cx, cy, -zMax);
                posZ.setXYZ(1, cx, cy,  zMax);
                posZ.needsUpdate = true;
                cursorBeamZ.visible = true;
                cursorOrbZ.position.set(cx, cy, zMax);
                cursorOrbZn.position.set(cx, cy, -zMax);
                cursorOrbZ.visible = true;
                cursorOrbZn.visible = true;
            } else {
                cursorBeamZ.visible = false;
                cursorOrbZ.visible = false;
                cursorOrbZn.visible = false;
            }
            
            // Y beam: full cross from -Y to +Y sphere edge
            const yExtent = R2 - cx * cx - cz * cz;
            if (yExtent > 0) {
                const yMax = Math.sqrt(yExtent);
                const posY = cursorBeamY.geometry.attributes.position;
                posY.setXYZ(0, cx, -yMax, cz);
                posY.setXYZ(1, cx,  yMax, cz);
                posY.needsUpdate = true;
                cursorBeamY.visible = true;
                cursorOrbY.position.set(cx, yMax, cz);
                cursorOrbYn.position.set(cx, -yMax, cz);
                cursorOrbY.visible = true;
                cursorOrbYn.visible = true;
            } else {
                cursorBeamY.visible = false;
                cursorOrbY.visible = false;
                cursorOrbYn.visible = false;
            }
            
            // Inner orb at crosshair (cursorPos3D)
            cursorOrb.position.copy(cursorPos3D);
            
            // Surface orb — same direction, radius = WORLD_RADIUS
            cursorOrbSurface.position.copy(cursorDir).multiplyScalar(WORLD_RADIUS);
            // Opposite surface orb — antipodal point
            cursorOrbSurfaceBack.position.copy(cursorDir).multiplyScalar(-WORLD_RADIUS);
            
            // Constant screen-size scaling for all orbs
            const orbRefDist = 300;
            function scaleOrb(orb) {
                if (!orb.visible) return;
                const d = cameraPosition.distanceTo(orb.position) || 1;
                orb.scale.setScalar(d / orbRefDist);
            }
            scaleOrb(cursorOrb);
            scaleOrb(cursorOrbSurface);
            scaleOrb(cursorOrbSurfaceBack);
            scaleOrb(cursorOrbX); scaleOrb(cursorOrbXn);
            scaleOrb(cursorOrbZ); scaleOrb(cursorOrbZn);
            scaleOrb(cursorOrbY); scaleOrb(cursorOrbYn);
            
            // Beam between the two surface orbs — shift only
            const showSurfBeam = keys.shift && !keys.space;
            cursorSurfaceBeam.visible = showSurfBeam;
            if (showSurfBeam) {
                const sbPos = cursorSurfaceBeam.geometry.attributes.position;
                const frontP = cursorOrbSurface.position;
                const backP = cursorOrbSurfaceBack.position;
                sbPos.setXYZ(0, frontP.x, frontP.y, frontP.z);
                sbPos.setXYZ(1, backP.x, backP.y, backP.z);
                sbPos.needsUpdate = true;
            }
            
            // Key direction arrows — only visible when Shift held, constant screen size
            const showArrows = keys.shift && !keys.space;
            const allArrows = [...Object.values(cursorKeyArrows), ...Object.values(cursorKeyArrowsBack)];
            if (!showArrows) {
                allArrows.forEach(a => a.visible = false);
            } else {
                allArrows.forEach(a => a.visible = true);
                const surfPos = cursorOrbSurface.position;
                const backPos = cursorOrbSurfaceBack.position;
                const arrowRight = new THREE.Vector3().crossVectors(cursorDir, cursorUp).normalize();
                const arrowUp = cursorUp.clone().normalize();
                const zPushDir = cursorDir.clone().normalize();
                const baseOffset = 8;
                const yUp = new THREE.Vector3(0, 1, 0);
                // Scale arrows so they stay constant size on screen
                const distFront = cameraPosition.distanceTo(surfPos) || 1;
                const distBack = cameraPosition.distanceTo(backPos) || 1;
                const refDist = 300;  // distance at which arrows are "normal" size
                const scaleFront = distFront / refDist;
                const scaleBack = distBack / refDist;
                function orientArrow(arrow, origin, dir, s) {
                    const offset = baseOffset * s;
                    arrow.position.copy(origin).addScaledVector(dir, offset);
                    arrow.quaternion.setFromUnitVectors(yUp, dir);
                    arrow.scale.setScalar(s);
                }
                // Primary orb arrows
                orientArrow(cursorKeyArrows.W, surfPos, arrowUp, scaleFront);
                orientArrow(cursorKeyArrows.S, surfPos, arrowUp.clone().negate(), scaleFront);
                orientArrow(cursorKeyArrows.D, surfPos, arrowRight, scaleFront);
                orientArrow(cursorKeyArrows.A, surfPos, arrowRight.clone().negate(), scaleFront);
                orientArrow(cursorKeyArrows.Z, surfPos, zPushDir, scaleFront);
                orientArrow(cursorKeyArrows.X, surfPos, zPushDir.clone().negate(), scaleFront);
                // Back orb arrows — all reversed (opposite hemisphere)
                orientArrow(cursorKeyArrowsBack.W, backPos, arrowUp.clone().negate(), scaleBack);
                orientArrow(cursorKeyArrowsBack.S, backPos, arrowUp, scaleBack);
                orientArrow(cursorKeyArrowsBack.D, backPos, arrowRight.clone().negate(), scaleBack);
                orientArrow(cursorKeyArrowsBack.A, backPos, arrowRight, scaleBack);
                orientArrow(cursorKeyArrowsBack.Z, backPos, zPushDir.clone().negate(), scaleBack);
                orientArrow(cursorKeyArrowsBack.X, backPos, zPushDir, scaleBack);
            }
        }
